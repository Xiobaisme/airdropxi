<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRDROPXI - Web3 Airdrop Aggregator</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { web3bg: '#0B0E14', primary: '#00FFA3', primaryHover: '#00cc82', danger: '#ff4d4f' } }
            }
        }
    </script>
    <style>
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
        .ticker-content { display: flex; gap: 2rem; animation: marquee 40s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 163, 0.2); background: rgba(11, 14, 20, 0.9); }
        .glass-nav { background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 255, 163, 0.3); }
        .hover-glow:hover { box-shadow: 0 0 20px rgba(0, 255, 163, 0.4); transform: translateY(-5px); border-color: #00FFA3; transition: all 0.3s ease; }
        .airdrop-card-pulse { animation: neon-pulse 3s infinite ease-in-out; }
        @keyframes neon-pulse { 0%, 100% { border-color: rgba(0, 255, 163, 0.2); } 50% { border-color: rgba(0, 255, 163, 0.6); } }
        .faq-card { background: #111827; border: 1px solid #374151; border-radius: 0.75rem; margin-bottom: 1rem; }
        details > summary { list-style: none; outline: none; cursor: pointer; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans antialiased min-h-screen relative overflow-x-hidden">

    <div id="login-modal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center hidden">
        <div class="glass-card p-10 rounded-2xl max-w-md w-full mx-4 text-center border-primary/50 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6">Restricted Access</h2>
            <div class="space-y-4">
                <button onclick="loginWithProvider('google')" class="w-full flex items-center justify-center bg-white text-black py-3 rounded-lg font-bold">Continue with Google</button>
                <button onclick="loginWithProvider('twitter')" class="w-full flex items-center justify-center bg-black border border-gray-600 text-white py-3 rounded-lg font-bold">Continue with X</button>
                <button onclick="loginWithEmail()" class="w-full flex items-center justify-center bg-gray-800 text-white py-3 rounded-lg font-bold">Continue with Email</button>
            </div>
        </div>
    </div>

    <canvas id="hacker-bg" class="fixed top-0 left-0 w-full h-full opacity-40" style="z-index: 0;"></canvas>

    <div class="relative z-10 w-full">
        <nav class="glass-nav sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                    <img src="logo.png" class="w-8 h-8 rounded-full border border-primary/50">
                    <h1 class="text-2xl font-black text-white tracking-widest uppercase">Airdrop<span class="text-primary">XI</span></h1>
                </div>
                <div id="user-profile" class="hidden group relative">
                    <button class="bg-primary/20 border border-primary text-primary px-4 py-1 rounded-full text-xs font-bold" id="user-display">User</button>
                    <div class="absolute right-0 mt-2 w-32 bg-black border border-gray-700 rounded-lg hidden group-hover:block overflow-hidden">
                        <button onclick="logout()" class="w-full p-2 text-red-400 text-sm hover:bg-red-500/10">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-12">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-black text-white mb-4 uppercase">Hunt Web3 <span class="text-primary">Airdrops</span></h2>
                <p class="text-gray-400 max-w-2xl mx-auto">Ultimate aggregator for crypto rewards and tasks.</p>
            </div>

            <div id="airdrops" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
                <div class="col-span-full text-center py-10">
                    <p class="text-primary animate-pulse font-mono">Connecting to Database...</p>
                </div>
            </div>

            <div id="news" class="mb-24">
                <h2 class="text-3xl font-bold text-white text-center mb-10">Global Crypto News</h2>
                <div id="news-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="calculator-section" class="mb-24 pt-10 border-t border-gray-800">
                <h2 class="text-3xl font-bold text-white text-center mb-10">Asset Hub</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass-card p-8 rounded-2xl">
                        <h3 class="text-xl font-bold mb-6 text-primary">Live Converter</h3>
                        <input type="number" id="calc-input1" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-lg text-white mb-4" value="1" oninput="calculateExchange()">
                        <select id="calc-currency1" class="w-full bg-gray-800 p-3 rounded border border-gray-700 text-white mb-4" onchange="calculateExchange()"></select>
                        <input type="text" id="calc-input2" class="w-full bg-gray-900 border border-gray-700 p-4 rounded-lg text-white mb-4" readonly>
                        <select id="calc-currency2" class="w-full bg-gray-800 p-3 rounded border border-gray-700 text-white" onchange="calculateExchange()"></select>
                    </div>
                    <div class="glass-card p-8 rounded-2xl text-center">
                        <h3 class="text-xl font-bold mb-6 text-primary">Math Calculator</h3>
                        <input type="text" id="math-display" class="w-full bg-black border border-gray-700 p-4 mb-4 text-right text-2xl font-mono text-primary" readonly value="0">
                        <div class="grid grid-cols-4 gap-2" id="math-pad"></div>
                    </div>
                </div>
            </div>

            <div id="security" class="mb-24">
                <h2 class="text-3xl font-bold text-white text-center mb-10">Security Guide</h2>
                <div id="security-container" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            </div>

            <div id="faq" class="max-w-4xl mx-auto mb-24">
                <h2 class="text-3xl font-bold text-white text-center mb-10">FAQ</h2>
                <div id="faq-container"></div>
            </div>
        </main>

        <footer class="bg-black/90 py-10 border-t border-gray-800 text-center text-sm text-gray-500">
            <p>&copy; 2026 AIRDROPXI - regifrdm project.</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://hmjjujirktpqviayfehe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtamp1amlya3RwcXZpYXlmZWhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODE1NzQsImV4cCI6MjA4OTE1NzU3NH0.nmCK3b66fU8Zh-mwQw5YUS_I3dFJAYnvfWlO050doSY';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                document.getElementById('login-modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-display').innerText = session.user.email.split('@')[0];
            }
            fetchAirdrops(); fetchNews(); renderSecurity(); renderFAQ(); renderMathPad();
        }

        async function fetchAirdrops() {
            const { data, error } = await sb.from('airdrops').select('*');
            const container = document.getElementById('airdrops');
            if (error) return; container.innerHTML = '';
            data.forEach(item => {
                container.innerHTML += `
                    <div class="glass-card p-6 rounded-xl hover-glow airdrop-card-pulse">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-white">${item.name}</h3>
                            <span class="text-xs font-bold border border-primary px-2 py-1 rounded text-primary">${item.status}</span>
                        </div>
                        <p class="text-sm text-gray-400 mb-6">Tasks: ${item.tasksEN || 'Complete All Tasks'}</p>
                        <a href="${item.link}" target="_blank" class="block w-full text-center bg-primary text-black py-2 rounded font-bold hover:bg-white transition">EXECUTE</a>
                    </div>`;
            });
        }

        async function fetchNews() {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss');
            const data = await res.json();
            const container = document.getElementById('news-container');
            data.items.slice(0,3).forEach(item => {
                // Gunakan placeholder keren jika gambar asli diblokir
                const thumb = `https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=400&q=80`;
                container.innerHTML += `
                    <div class="glass-card rounded-xl overflow-hidden cursor-pointer hover-glow" onclick="window.open('${item.link}')">
                        <img src="${thumb}" class="w-full h-40 object-cover opacity-60">
                        <div class="p-4"><h4 class="text-sm font-bold text-white line-clamp-2">${item.title}</h4><p class="text-xs text-primary mt-2">Read More →</p></div>
                    </div>`;
            });
        }

        function renderSecurity() {
            const items = ["Burner Wallet", "Secret Phrase", "Phishing", "Revoke"];
            const container = document.getElementById('security-container');
            items.forEach(i => { container.innerHTML += `<div class="glass-card p-6 rounded-xl text-center"><h4 class="font-bold text-primary">${i}</h4></div>`; });
        }

        function renderFAQ() {
            const container = document.getElementById('faq-container');
            container.innerHTML = `<details class="faq-card p-4"><summary class="font-bold">What is Airdrop?</summary><div class="pt-2 text-gray-400">Free token distribution for early users.</div></details>`;
        }

        function renderMathPad() {
            const pad = document.getElementById('math-pad');
            const btns = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','C','='];
            btns.forEach(b => {
                let action = b === '=' ? 'calcRes()' : b === 'C' ? 'calcClear()' : `calcApp('${b}')`;
                pad.innerHTML += `<button onclick="${action}" class="bg-gray-800 p-4 rounded font-bold hover:bg-primary hover:text-black">${b}</button>`;
            });
        }

        let mExp = '0';
        function calcApp(v) { mExp = mExp === '0' ? v : mExp + v; document.getElementById('math-display').value = mExp; }
        function calcClear() { mExp = '0'; document.getElementById('math-display').value = '0'; }
        function calcRes() { try { mExp = eval(mExp).toString(); document.getElementById('math-display').value = mExp; } catch { calcClear(); } }

        async function loginWithProvider(p) { await sb.auth.signInWithOAuth({ provider: p, options: { redirectTo: window.location.origin } }); }
        async function logout() { await sb.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
