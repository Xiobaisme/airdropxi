<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRDROPXI - Web3 Airdrop Aggregator</title>
    <link rel="icon" href="logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { web3bg: '#0B0E14', primary: '#00FFA3', primaryHover: '#00cc82', danger: '#ff4d4f' } }
            }
        }
    </script>
    <style>
        .ticker-wrap { width: 100%; overflow: hidden; white-space: nowrap; display: flex; align-items: center; }
        .ticker-content { display: flex; gap: 2rem; animation: marquee 40s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 163, 0.2); background: rgba(11, 14, 20, 0.95); transition: all 0.3s ease; }
        .glass-nav { background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 255, 163, 0.3); }
        .hover-glow:hover { box-shadow: 0 0 20px rgba(0, 255, 163, 0.3); transform: translateY(-3px); border-color: #00FFA3; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans antialiased min-h-screen relative overflow-x-hidden">

    <div id="login-modal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center hidden">
        <div class="glass-card p-10 rounded-2xl max-w-md w-full mx-4 text-center border-primary/50">
            <h2 class="text-2xl font-bold text-white mb-6">Restricted Access</h2>
            <div class="space-y-4">
                <button onclick="loginWithProvider('google')" class="w-full bg-white text-black py-3 rounded-lg font-bold">Continue with Google</button>
                <button onclick="loginWithProvider('twitter')" class="w-full bg-blue-500 text-white py-3 rounded-lg font-bold">Continue with X</button>
                <button onclick="loginWithEmail()" class="w-full bg-gray-800 text-white py-3 rounded-lg font-bold">Continue with Email</button>
            </div>
        </div>
    </div>

    <canvas id="hacker-bg" class="fixed top-0 left-0 w-full h-full opacity-30" style="z-index: 0;"></canvas>

    <div class="relative z-10">
        <nav class="glass-nav sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="logo.png" class="w-8 h-8 rounded-full border border-primary">
                    <h1 class="text-xl font-black text-white">AIRDROP<span class="text-primary">XI</span></h1>
                </div>
                <div id="user-profile" class="hidden group relative">
                    <button class="bg-gray-800 border border-primary px-4 py-1.5 rounded-full text-xs" id="user-display">User</button>
                    <div class="absolute right-0 mt-2 w-32 bg-black border border-gray-700 rounded-lg hidden group-hover:block">
                        <button onclick="logout()" class="w-full p-2 text-red-400 text-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-12">
            <div id="airdrops" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
                <div class="col-span-full text-center py-10">
                    <p class="text-primary animate-pulse" id="db-status">Syncing Database...</p>
                </div>
            </div>

            <section id="news" class="mb-20">
                <h2 class="text-3xl font-bold text-white text-center mb-10">Global News</h2>
                <div id="news-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </section>

            <section id="security" class="mb-20">
                <h2 class="text-3xl font-bold text-white text-center mb-10">Security Guide</h2>
                <div id="security-container" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            </section>
        </main>

        <footer class="bg-black/90 py-10 border-t border-gray-800 text-center">
            <div class="flex justify-center gap-6 mb-4">
                <a href="https://x.com/xiobai06" class="text-gray-400 hover:text-primary">Twitter</a>
                <a href="https://t.me/Xiobaiishikii" class="text-gray-400 hover:text-primary">Telegram</a>
            </div>
            <p class="text-xs text-gray-600">&copy; 2026 AIRDROPXI</p>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = 'https://hmjjujirktpqviayfehe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtamp1amlya3RwcXZpYXlmZWhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODE1NzQsImV4cCI6MjA4OTE1NzU3NH0.nmCK3b66fU8Zh-mwQw5YUS_I3dFJAYnvfWlO050doSY';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            // Check Session
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                document.getElementById('login-modal').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-display').innerText = session.user.email.split('@')[0];
            }
            fetchAirdrops();
            fetchNews();
            renderSecurity();
        }

        async function fetchAirdrops() {
            const container = document.getElementById('airdrops');
            const { data, error } = await sb.from('airdrops').select('*');
            if (error) { 
                document.getElementById('db-status').innerText = "DB Error. Check RLS/CORS."; 
                return; 
            }
            container.innerHTML = '';
            data.forEach(item => {
                container.innerHTML += `
                    <div class="glass-card p-6 rounded-xl hover-glow">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-white">${item.name}</h3>
                            <span class="text-xs font-bold border border-primary px-2 py-1 rounded text-primary">${item.status}</span>
                        </div>
                        <p class="text-sm text-gray-400 mb-6 font-mono">Tasks: ${item.tasksEN || item.tasksID}</p>
                        <a href="${item.link}" target="_blank" class="block w-full text-center bg-primary/20 border border-primary text-primary py-2 rounded-lg font-bold hover:bg-primary hover:text-black transition">Execute</a>
                    </div>
                `;
            });
        }

        async function fetchNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://cointelegraph.com/rss');
                const data = await res.json();
                const container = document.getElementById('news-container');
                data.items.slice(0,3).forEach(item => {
                    const thumb = item.thumbnail || 'https://via.placeholder.com/600x400/0B0E14/00FFA3?text=AirdropXI+News';
                    container.innerHTML += `
                        <div class="glass-card rounded-xl overflow-hidden cursor-pointer hover-glow" onclick="window.open('${item.link}')">
                            <img src="${thumb}" class="w-full h-40 object-cover" onerror="this.src='https://via.placeholder.com/600x400/0B0E14/00FFA3?text=Web3+News'">
                            <div class="p-4">
                                <h4 class="text-sm font-bold text-white line-clamp-2">${item.title}</h4>
                                <p class="text-xs text-primary mt-3">Read Full News →</p>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { console.log("News fetch failed"); }
        }

        function renderSecurity() {
            const items = [
                {t:"Burner Wallet", d:"Use a secondary wallet for airdrops."},
                {t:"Secret Phrase", d:"Never share your seed phrase."},
                {t:"Phishing", d:"Always check the official link."},
                {t:"Revoke", d:"Revoke permissions after use."}
            ];
            const container = document.getElementById('security-container');
            items.forEach(i => {
                container.innerHTML += `
                    <div class="glass-card p-4 rounded-xl border-danger/30 text-center">
                        <h4 class="font-bold text-white mb-2">${i.t}</h4>
                        <p class="text-xs text-gray-400">${i.d}</p>
                    </div>
                `;
            });
        }

        async function loginWithProvider(p) { await sb.auth.signInWithOAuth({ provider: p }); }
        async function logout() { await sb.auth.signOut(); location.reload(); }
        
        // Hacker BG
        const c = document.getElementById('hacker-bg'); const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = '#00FFA3'; ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*16, y*16);
                if(y*16 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 33);

        init();
    </script>
</body>
</html>
