<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panduan — AirdropXI</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #07090b;
      --surface:  #0d1117;
      --surface2: #111820;
      --border:   #1c2733;
      --border2:  #243040;
      --accent:   #00e5a0;
      --adim:     rgba(0,229,160,0.08);
      --aborder:  rgba(0,229,160,0.18);
      --warn:     #f59e0b;
      --text:     #dce8f0;
      --text2:    #8aa0b4;
      --text3:    #4a6070;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
      --r:        12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,11,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
      color: var(--accent); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo img { width: 22px; height: 22px; border-radius: 4px; }
    .nav-back {
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--text2); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }

    /* LAYOUT */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* HERO SECTION */
    .hero {
      display: flex; gap: 1.5rem; align-items: flex-start;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .hero-logo {
      width: 72px; height: 72px; border-radius: 16px;
      object-fit: cover;
      background: var(--adim);
      border: 1px solid var(--aborder);
      flex-shrink: 0;
    }
    .hero-logo-placeholder {
      width: 72px; height: 72px; border-radius: 16px;
      background: var(--adim); border: 1px solid var(--aborder);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }
    .hero-info { flex: 1; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 0.62rem;
      color: var(--accent); letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }
    .hero-pill-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .hero-name {
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 0.6rem; line-height: 1.1;
    }
    .hero-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .badge {
      font-family: var(--mono); font-size: 0.6rem;
      padding: 0.25rem 0.65rem; border-radius: 20px;
    }
    .st-active   { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.25); }
    .st-waitlist { background: rgba(245,158,11,0.12); color: var(--warn);  border: 1px solid rgba(245,158,11,0.25); }
    .st-default  { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

    .hero-meta {
      display: flex; gap: 1.25rem; flex-wrap: wrap;
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--text2); margin-bottom: 1rem;
    }
    .hero-meta span { color: var(--accent); }

    .hero-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .ext-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0.45rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--text2); text-decoration: none;
      transition: all 0.2s;
    }
    .ext-link:hover { border-color: var(--aborder); color: var(--accent); }

    /* BODY LAYOUT */
    .body-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.5rem;
      align-items: start;
    }

    /* SECTIONS */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .sec-head {
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .sec-head-bar {
      width: 3px; height: 14px; border-radius: 2px;
      background: var(--accent);
    }
    .sec-title {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--accent); letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sec-body { padding: 1.25rem; }

    /* DESCRIPTION */
    .desc-text {
      font-size: 0.9rem; color: var(--text2);
      line-height: 1.8;
    }
    .desc-text p + p { margin-top: 0.75rem; }

    /* KEY PARAMS */
    .kp-list { display: flex; flex-direction: column; gap: 0; }
    .kp-row {
      display: flex; align-items: flex-start;
      gap: 0.75rem; padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .kp-row:last-child { border-bottom: none; padding-bottom: 0; }
    .kp-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 6px;
    }
    .kp-key { color: var(--text2); min-width: 140px; }
    .kp-val { color: var(--text); font-weight: 600; }

    /* STEPS */
    .steps { display: flex; flex-direction: column; }
    .step {
      display: flex; gap: 1rem; align-items: flex-start;
      padding-bottom: 1.25rem; position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute; left: 12px; top: 26px; bottom: 0;
      width: 1px; background: var(--border2);
    }
    .step-num {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--adim); border: 1px solid var(--aborder);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--accent); font-weight: 700;
      flex-shrink: 0; z-index: 1;
    }
    .step-title {
      font-size: 0.9rem; font-weight: 700; margin-bottom: 4px;
    }
    .step-desc { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }

    /* TIPS */
    .tips { display: flex; flex-direction: column; gap: 0.6rem; }
    .tip {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.875rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .tip-bullet {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 6px;
    }
    .tip-text { font-size: 0.83rem; color: var(--text2); line-height: 1.6; }

    /* FAQ */
    .faqs { display: flex; flex-direction: column; gap: 0.6rem; }
    .faq {
      padding: 1rem 1.1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .faq-q {
      font-size: 0.88rem; font-weight: 700;
      color: var(--accent); margin-bottom: 0.4rem;
    }
    .faq-a { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: 68px; }

    .sdb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .sdb-head {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 0.6rem;
      color: var(--text3); letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .sdb-body { padding: 0.875rem 1rem; }

    .param-row {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 0.5rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .param-row:last-child { border-bottom: none; padding-bottom: 0; }
    .param-key { color: var(--text3); }
    .param-val { font-family: var(--mono); font-weight: 700; text-align: right; }
    .param-val.g { color: var(--accent); }
    .param-val.y { color: var(--warn); }

    .cta-btn {
      display: block; width: 100%;
      padding: 0.875rem;
      background: var(--adim);
      border: 1px solid var(--aborder);
      border-radius: 10px;
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--accent); font-weight: 700;
      letter-spacing: 0.06em; text-align: center;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }
    .cta-btn:hover {
      background: rgba(0,229,160,0.15);
      border-color: rgba(0,229,160,0.35);
    }

    /* LOADING / ERROR */
    .state-msg {
      text-align: center; padding: 5rem 2rem;
      font-family: var(--mono); color: var(--text3); font-size: 0.78rem;
    }
    .state-msg.err { color: #ff2d55; }

    @media (max-width: 800px) {
      .body-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 600px) {
      .wrap { padding: 1.25rem 1rem 4rem; }
      .hero { flex-direction: column; }
      .hero-name { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="AirdropXI" onerror="this.style.display='none'">
    ⚡ AirdropXI
  </a>
  <a href="index.html" class="nav-back">← Kembali ke Daftar</a>
</nav>

<div class="wrap" id="wrap">
  <div class="state-msg">⏳ Memuat panduan...</div>
</div>

<script>
  const id = new URLSearchParams(window.location.search).get('id');

  if (!id) {
    showError('ID project tidak ditemukan di URL.');
  } else {
    fetch(`/api/admin-airdrop?id=${encodeURIComponent(id)}`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(p => {
        if (!p || !p.name) throw new Error('Data project kosong');
        document.title = `${p.name} — AirdropXI`;
        render(p);
      })
      .catch(e => showError(e.message));
  }

  function render(p) {
    // ── Parse helpers ─────────────────────────────
    // tasksID → steps (format: "1. judul | deskripsi" atau "1. teks biasa")
    const steps = parseSteps(p.tasksID || p.tasksEN || '');

    // faqID → FAQ array (format "Q: ... \n A: ...")
    const faqs = parseFaq(p.faqID || p.faqEN || '');

    // Tips — baris yang dimulai dengan "TIP:" atau "💡" atau ditandai khusus
    // Fallback: ambil baris yang tidak cocok pattern steps/faq
    const tips = parseTips(p.tasksID || p.tasksEN || '');

    // Status class
    const stCls = getStCls(p.status);

    // Logo
    const logoHtml = p.logo_url
      ? `<img class="hero-logo" src="${x(p.logo_url)}" alt="${x(p.name)}" onerror="this.style.display='none';document.getElementById('logo-ph').style.display='flex'">`
      : '';
    const logoPlaceholder = `<div class="hero-logo-placeholder" id="logo-ph" ${p.logo_url ? 'style="display:none"' : ''}>🪂</div>`;

    // External links
    const links = [
      p.link     && `<a class="ext-link" href="${x(p.link)}" target="_blank" rel="noopener">🌐 Website</a>`,
      p.twitter  && `<a class="ext-link" href="${x(p.twitter)}" target="_blank" rel="noopener">𝕏 Twitter</a>`,
      p.discord  && `<a class="ext-link" href="${x(p.discord)}" target="_blank" rel="noopener">💬 Discord</a>`,
      p.telegram && `<a class="ext-link" href="${x(p.telegram)}" target="_blank" rel="noopener">✈️ Telegram</a>`,
    ].filter(Boolean).join('');

    // Description paragraphs
    const descHtml = (p.descriptionID || p.descriptionEN || 'Deskripsi belum tersedia.')
      .split('\n\n')
      .map(para => `<p>${x(para.trim())}</p>`)
      .join('');

    // Key params
    const keyParams = [
      p.ticker       && ['Ticker',         p.ticker],
      p.network      && ['Network / Chain', p.network],
      p.total_supply && ['Total Supply',    p.total_supply],
      p.tge_date     && ['TGE / Listing',   p.tge_date],
      p.RaisedID     && ['Dana Terkumpul',  p.RaisedID],
    ].filter(Boolean);

    document.getElementById('wrap').innerHTML = `
      <!-- HERO -->
      <div class="hero">
        ${logoHtml}${logoPlaceholder}
        <div class="hero-info">
          <div class="hero-pill"><div class="hero-pill-dot"></div>ONGOING</div>
          <div class="hero-name">${x(p.name)}</div>
          <div class="hero-badges">
            <span class="badge ${stCls}">${x(p.status || 'TBA')}</span>
            ${p.ticker ? `<span class="badge st-default">${x(p.ticker)}</span>` : ''}
            ${p.network ? `<span class="badge st-default">${x(p.network)}</span>` : ''}
          </div>
          <div class="hero-meta">
            ${p.tge_date ? `TGE: <span>${x(p.tge_date)}</span>` : ''}
            ${p.RaisedID ? `Dana: <span>${x(p.RaisedID)}</span>` : ''}
          </div>
          ${links ? `<div class="hero-links">${links}</div>` : ''}
        </div>
      </div>

      <!-- BODY GRID -->
      <div class="body-grid">
        <div class="main-col">

          <!-- DESKRIPSI -->
          <div class="section">
            <div class="sec-head"><div class="sec-head-bar"></div><div class="sec-title">Tentang Project</div></div>
            <div class="sec-body"><div class="desc-text">${descHtml}</div></div>
          </div>

          ${keyParams.length ? `
          <!-- KEY PARAMETERS -->
          <div class="section">
            <div class="sec-head"><div class="sec-head-bar"></div><div class="sec-title">Key Parameters</div></div>
            <div class="sec-body">
              <div class="kp-list">
                ${keyParams.map(([k,v]) => `
                  <div class="kp-row">
                    <div class="kp-dot"></div>
                    <div class="kp-key">${x(k)}</div>
                    <div class="kp-val">${x(v)}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${steps.length ? `
          <!-- CARA BERPARTISIPASI -->
          <div class="section">
            <div class="sec-head"><div class="sec-head-bar"></div><div class="sec-title">Cara Berpartisipasi</div></div>
            <div class="sec-body">
              <div class="steps">
                ${steps.map((s,i) => `
                  <div class="step">
                    <div class="step-num">${i+1}</div>
                    <div>
                      <div class="step-title">${x(s.title)}</div>
                      ${s.desc ? `<div class="step-desc">${x(s.desc)}</div>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${tips.length ? `
          <!-- TIPS -->
          <div class="section">
            <div class="sec-head"><div class="sec-head-bar"></div><div class="sec-title">Tips & Strategi</div></div>
            <div class="sec-body">
              <div class="tips">
                ${tips.map(t => `
                  <div class="tip">
                    <div class="tip-bullet"></div>
                    <div class="tip-text">${x(t)}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${faqs.length ? `
          <!-- FAQ -->
          <div class="section">
            <div class="sec-head"><div class="sec-head-bar"></div><div class="sec-title">FAQ</div></div>
            <div class="sec-body">
              <div class="faqs">
                ${faqs.map(f => `
                  <div class="faq">
                    <div class="faq-q">❓ ${x(f.q)}</div>
                    <div class="faq-a">${x(f.a)}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
          ${keyParams.length ? `
          <div class="sdb-card">
            <div class="sdb-head">Parameter Airdrop</div>
            <div class="sdb-body">
              <div class="param-row"><span class="param-key">Status</span><span class="param-val g">${x(p.status||'TBA')}</span></div>
              ${p.ticker       ? `<div class="param-row"><span class="param-key">Ticker</span><span class="param-val g">${x(p.ticker)}</span></div>` : ''}
              ${p.network      ? `<div class="param-row"><span class="param-key">Network</span><span class="param-val">${x(p.network)}</span></div>` : ''}
              ${p.tge_date     ? `<div class="param-row"><span class="param-key">TGE / Listing</span><span class="param-val y">${x(p.tge_date)}</span></div>` : ''}
              ${p.total_supply ? `<div class="param-row"><span class="param-key">Total Supply</span><span class="param-val">${x(p.total_supply)}</span></div>` : ''}
              ${p.RaisedID     ? `<div class="param-row"><span class="param-key">Dana Terkumpul</span><span class="param-val g">${x(p.RaisedID)}</span></div>` : ''}
            </div>
          </div>` : ''}

          ${p.link ? `<a class="cta-btn" href="${x(p.link)}" target="_blank" rel="noopener">⚡ GARAP SEKARANG</a>` : ''}
        </div>
      </div>
    `;
  }

  // ── PARSERS ──────────────────────────────────────────────

  // Format tasksID di admin:
  // "1. Judul langkah | Deskripsi panjang"
  // atau "1. Langkah biasa tanpa deskripsi"
  // atau tiap baris biasa
  function parseSteps(raw) {
    if (!raw) return [];
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const steps = [];
    for (const line of lines) {
      // Skip baris tip (dimulai TIP: atau 💡)
      if (/^(tip:|💡|tips?:)/i.test(line)) continue;
      // Skip baris FAQ
      if (/^[QA]:/i.test(line)) continue;

      // Strip nomor di awal: "1.", "1)", "Step 1:", dll
      const clean = line.replace(/^(\d+[\.\)]\s*|step\s*\d+[:\s]*)/i, '');

      // Pisah title | desc kalau ada pipe
      if (clean.includes(' | ')) {
        const [title, ...rest] = clean.split(' | ');
        steps.push({ title: title.trim(), desc: rest.join(' | ').trim() });
      } else {
        steps.push({ title: clean, desc: '' });
      }
    }
    return steps;
  }

  // Format faqID:
  // "Q: pertanyaan\nA: jawaban"
  // atau "Q: pertanyaan | A: jawaban" per baris
  function parseFaq(raw) {
    if (!raw) return [];
    const faqs = [];
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    let currentQ = '';
    for (const line of lines) {
      if (/^Q:/i.test(line)) {
        // Cek kalau ada | A: di baris yang sama
        if (line.includes(' | A:') || line.includes(' | a:')) {
          const [qPart, aPart] = line.split(/\s*\|\s*A:\s*/i);
          faqs.push({ q: qPart.replace(/^Q:\s*/i,'').trim(), a: aPart.trim() });
        } else {
          currentQ = line.replace(/^Q:\s*/i,'').trim();
        }
      } else if (/^A:/i.test(line) && currentQ) {
        faqs.push({ q: currentQ, a: line.replace(/^A:\s*/i,'').trim() });
        currentQ = '';
      }
    }
    return faqs;
  }

  // Tips — baris dimulai "TIP:", "💡", atau section khusus
  function parseTips(raw) {
    if (!raw) return [];
    return raw.split('\n')
      .map(l => l.trim())
      .filter(l => /^(tip:|💡|tips?:)/i.test(l))
      .map(l => l.replace(/^(tip:|💡|tips?:\s*)/i,'').trim())
      .filter(Boolean);
  }

  function getStCls(s) {
    const l = (s||'').toLowerCase();
    if (l.includes('active')) return 'st-active';
    if (l.includes('wait'))   return 'st-waitlist';
    return 'st-default';
  }

  function x(s) {
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showError(msg) {
    document.getElementById('wrap').innerHTML =
      `<div class="state-msg err">❌ ${msg}<br><br><a href="index.html" style="color:var(--accent)">← Kembali ke dashboard</a></div>`;
  }
</script>
</body>
</html>
