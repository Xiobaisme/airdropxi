<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panduan — AirdropXI</title>
  <link rel="icon" type="image/png" href="../logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #07090b;
      --s1:      #0d1117;
      --s2:      #111820;
      --s3:      #161e28;
      --border:  #1c2733;
      --border2: #243040;
      --accent:  #00e5a0;
      --adim:    rgba(0,229,160,0.08);
      --aborder: rgba(0,229,160,0.18);
      --warn:    #f59e0b;
      --blue:    #3b82f6;
      --bdim:    rgba(59,130,246,0.10);
      --bborder: rgba(59,130,246,0.25);
      --text:    #dce8f0;
      --text2:   #8aa0b4;
      --text3:   #4a6070;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Plus Jakarta Sans', sans-serif;
      --r:       12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,11,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--mono); font-size: 0.8rem; font-weight: 700;
      color: var(--accent); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo img { width: 22px; height: 22px; border-radius: 5px; }
    .nav-back {
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--text2); text-decoration: none;
      padding: 0.35rem 0.9rem;
      border: 1px solid var(--border2);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-back:hover { color: var(--accent); border-color: var(--aborder); }

    /* ── LAYOUT ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ── HERO ── */
    .hero {
      display: flex; gap: 1.5rem; align-items: flex-start;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .hero-logo {
      width: 76px; height: 76px; border-radius: 18px;
      object-fit: cover;
      background: var(--adim);
      border: 1px solid var(--aborder);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
    }
    .hero-logo img {
      width: 76px; height: 76px; border-radius: 18px;
      object-fit: cover;
    }
    .hero-info { flex: 1; }
    .ongoing-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 0.6rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em;
      margin-bottom: 0.6rem;
    }
    .ongoing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .hero-name {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .hero-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .badge {
      font-family: var(--mono); font-size: 0.6rem; font-weight: 700;
      padding: 0.25rem 0.7rem; border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .b-active   { background: rgba(0,229,160,0.12); color: var(--accent);  border: 1px solid rgba(0,229,160,0.3); }
    .b-waitlist { background: rgba(245,158,11,0.12); color: var(--warn);   border: 1px solid rgba(245,158,11,0.3); }
    .b-default  { background: var(--s2); color: var(--text3); border: 1px solid var(--border); }
    .b-blue     { background: var(--bdim); color: var(--blue); border: 1px solid var(--bborder); }

    .hero-meta {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-family: var(--mono); font-size: 0.68rem; color: var(--text2);
      margin-bottom: 1rem;
    }
    .hero-meta-val { color: var(--accent); font-weight: 700; }

    .hero-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .ext-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0.45rem 0.9rem;
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 6px;
      font-family: var(--mono); font-size: 0.65rem; color: var(--text2);
      text-decoration: none; transition: all 0.2s;
    }
    .ext-link:hover { border-color: var(--aborder); color: var(--accent); }

    /* ── BODY GRID ── */
    .body-grid {
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── SECTIONS ── */
    .sec {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .sec-head {
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .sec-bar { width: 3px; height: 14px; border-radius: 2px; background: var(--accent); flex-shrink: 0; }
    .sec-title {
      font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .sec-body { padding: 1.25rem; }

    /* Description */
    .desc-text { font-size: 0.9rem; color: var(--text2); line-height: 1.8; }
    .desc-text p + p { margin-top: 0.875rem; }

    /* Testnet links */
    .testnet-links { display: flex; flex-direction: column; gap: 0.6rem; }
    .testnet-link {
      display: flex; align-items: center; gap: 10px;
      padding: 0.75rem 1rem;
      background: var(--bdim);
      border: 1px solid var(--bborder);
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .testnet-link:hover {
      background: rgba(59,130,246,0.15);
      border-color: var(--blue);
      transform: translateX(3px);
    }
    .testnet-link-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(59,130,246,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .testnet-link-label { font-family: var(--mono); font-size: 0.72rem; color: var(--blue); font-weight: 700; }
    .testnet-link-url { font-size: 0.7rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .testnet-link-arrow { margin-left: auto; color: var(--blue); font-size: 0.8rem; flex-shrink: 0; }

    /* Key params */
    .kp-item {
      display: flex; align-items: flex-start;
      gap: 10px; padding: 0.7rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .kp-item:last-child { border-bottom: none; padding-bottom: 0; }
    .kp-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 6px; }
    .kp-key { color: var(--text2); min-width: 140px; }
    .kp-val { color: var(--text); font-weight: 600; }

    /* Steps */
    .steps { display: flex; flex-direction: column; }
    .step {
      display: flex; gap: 1rem;
      padding-bottom: 1.25rem; position: relative;
    }
    .step:not(:last-child)::after {
      content: ''; position: absolute;
      left: 12px; top: 26px; bottom: 0;
      width: 1px; background: var(--border2);
    }
    .step-num {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--adim); border: 1px solid var(--aborder);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 0.65rem; color: var(--accent); font-weight: 700;
      flex-shrink: 0; z-index: 1;
    }
    .step-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .step-desc { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }
    /* link biru di dalam step desc */
    .step-desc a { color: var(--blue); text-decoration: underline; }

    /* Tips */
    .tips { display: flex; flex-direction: column; gap: 0.6rem; }
    .tip {
      display: flex; gap: 10px;
      padding: 0.875rem 1rem;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px;
    }
    .tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
    .tip-text { font-size: 0.83rem; color: var(--text2); line-height: 1.6; }

    /* FAQ */
    .faqs { display: flex; flex-direction: column; gap: 0.6rem; }
    .faq {
      padding: 1rem 1.1rem;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px;
    }
    .faq-q { font-size: 0.88rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
    .faq-a { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }

    /* ── SIDEBAR ── */
    .sidebar { position: sticky; top: 68px; }
    .sdb-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; margin-bottom: 1rem;
    }
    .sdb-head {
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      font-family: var(--mono); font-size: 0.6rem; font-weight: 700;
      color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .sdb-body { padding: 0.875rem 1rem; }
    .param-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 0.5rem; padding: 0.6rem 0;
      border-bottom: 1px solid var(--border); font-size: 0.78rem;
    }
    .param-row:last-child { border-bottom: none; padding-bottom: 0; }
    .param-key { color: var(--text3); }
    .param-val { font-family: var(--mono); font-weight: 700; text-align: right; }
    .param-val.g { color: var(--accent); }
    .param-val.y { color: var(--warn); }

    .cta-btn {
      display: block; width: 100%;
      padding: 0.9rem; text-align: center;
      background: var(--adim); border: 1px solid var(--aborder);
      border-radius: 10px;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.06em;
      text-decoration: none; transition: all 0.2s;
    }
    .cta-btn:hover { background: rgba(0,229,160,0.15); border-color: rgba(0,229,160,0.4); }

    /* ── STATE ── */
    .state-msg {
      text-align: center; padding: 6rem 2rem;
      font-family: var(--mono); color: var(--text3); font-size: 0.78rem;
    }
    .state-msg.err { color: #ff2d55; }
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 800px) {
      .body-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
    @media (max-width: 600px) {
      .wrap { padding: 1.25rem 1rem 4rem; }
      .hero { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">
    <img src="../logo.png" alt="AirdropXI" onerror="this.style.display='none'">
    ⚡ AirdropXI
  </a>
  <a href="../index.html" class="nav-back">← Kembali ke Daftar</a>
</nav>

<div class="wrap" id="wrap">
  <div class="state-msg">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span>Memuat panduan...</span>
    </div>
  </div>
</div>

<script>
  // Ambil ID dari URL: /guide/blockchain-com ATAU guide.html?id=xxx
  function getProjectId() {
    // Coba dari path: /guide/SLUG
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const guideIdx = pathParts.indexOf('guide');
    if (guideIdx !== -1 && pathParts[guideIdx + 1]) {
      return pathParts[guideIdx + 1];
    }
    // Fallback dari query param
    return new URLSearchParams(window.location.search).get('id');
  }

  const projectId = getProjectId();

  if (!projectId) {
    showError('ID project tidak ditemukan di URL.');
  } else {
    fetch(`/api/admin-airdrop?id=${encodeURIComponent(projectId)}`)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(p => {
        if (!p || !p.name) throw new Error('Data project tidak ditemukan');
        document.title = `${p.name} — AirdropXI`;
        render(p);
      })
      .catch(e => showError(e.message));
  }

  function render(p) {
    const stCls = getStCls(p.status);

    // ── Logo ──
    const logoHtml = p.logo_url
      ? `<div class="hero-logo"><img src="${x(p.logo_url)}" alt="${x(p.name)}" onerror="this.parentElement.innerHTML='🪂'"></div>`
      : `<div class="hero-logo">🪂</div>`;

    // ── Ext links ──
    const extLinks = [
      p.link     && `<a class="ext-link" href="${x(p.link)}" target="_blank" rel="noopener">🌐 Website</a>`,
      p.twitter  && `<a class="ext-link" href="${x(p.twitter)}" target="_blank" rel="noopener">𝕏 Twitter</a>`,
      p.discord  && `<a class="ext-link" href="${x(p.discord)}" target="_blank" rel="noopener">💬 Discord</a>`,
      p.telegram && `<a class="ext-link" href="${x(p.telegram)}" target="_blank" rel="noopener">✈️ Telegram</a>`,
    ].filter(Boolean).join('');

    // ── Description ──
    const desc = (p.descriptionID || p.descriptionEN || 'Deskripsi belum tersedia.');
    const descHtml = desc.split('\n\n')
      .map(para => `<p>${autoLink(x(para.trim()))}</p>`)
      .join('');

    // ── Testnet links ──
    // Bisa dari kolom testnet_links (JSON string) atau parse dari tasksID
    let testnetLinks = [];
    if (p.testnet_links) {
      try {
        testnetLinks = typeof p.testnet_links === 'string'
          ? JSON.parse(p.testnet_links)
          : p.testnet_links;
      } catch(e) { testnetLinks = []; }
    }

    // ── Steps (parse dari tasksID) ──
    const steps = parseSteps(p.tasksID || p.tasksEN || '');

    // ── Tips (baris dimulai TIP: atau 💡) ──
    const tips = parseTips(p.tasksID || p.tasksEN || '');

    // ── FAQ ──
    const faqs = parseFaq(p.faqID || p.faqEN || '');

    // ── Key params ──
    const kpRows = [
      p.ticker       && ['Ticker',        p.ticker],
      p.network      && ['Network/Chain',  p.network],
      p.total_supply && ['Total Supply',   p.total_supply],
      p.tge_date     && ['TGE / Listing',  p.tge_date],
      p.RaisedID     && ['Dana Terkumpul', p.RaisedID],
    ].filter(Boolean);

    document.getElementById('wrap').innerHTML = `

      <!-- HERO -->
      <div class="hero">
        ${logoHtml}
        <div class="hero-info">
          <div class="ongoing-pill"><div class="ongoing-dot"></div>ONGOING</div>
          <div class="hero-name">${x(p.name)}</div>
          <div class="hero-badges">
            <span class="badge ${stCls}">${x(p.status || 'TBA')}</span>
            ${p.ticker  ? `<span class="badge b-blue">${x(p.ticker)}</span>` : ''}
            ${p.network ? `<span class="badge b-default">${x(p.network)}</span>` : ''}
          </div>
          <div class="hero-meta">
            ${p.tge_date  ? `<span>TGE: <span class="hero-meta-val">${x(p.tge_date)}</span></span>` : ''}
            ${p.RaisedID  ? `<span>Raised: <span class="hero-meta-val">${x(p.RaisedID)}</span></span>` : ''}
            ${p.network   ? `<span>Chain: <span class="hero-meta-val">${x(p.network)}</span></span>` : ''}
          </div>
          ${extLinks ? `<div class="hero-links">${extLinks}</div>` : ''}
        </div>
      </div>

      <div class="body-grid">
        <div>

          <!-- DESKRIPSI -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">Tentang Project</div></div>
            <div class="sec-body"><div class="desc-text">${descHtml}</div></div>
          </div>

          ${testnetLinks.length ? `
          <!-- TESTNET LINKS -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">🔗 Testnet / Link Penting</div></div>
            <div class="sec-body">
              <div class="testnet-links">
                ${testnetLinks.map((t,i) => `
                  <a class="testnet-link" href="${x(t.url)}" target="_blank" rel="noopener">
                    <div class="testnet-link-icon">🔗</div>
                    <div>
                      <div class="testnet-link-label">${x(t.label || `Link ${i+1}`)}</div>
                      <div class="testnet-link-url">${x(t.url)}</div>
                    </div>
                    <div class="testnet-link-arrow">↗</div>
                  </a>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${kpRows.length ? `
          <!-- KEY PARAMETERS -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">Key Parameters</div></div>
            <div class="sec-body">
              ${kpRows.map(([k,v]) => `
                <div class="kp-item">
                  <div class="kp-dot"></div>
                  <div class="kp-key">${x(k)}</div>
                  <div class="kp-val">${x(v)}</div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          ${steps.length ? `
          <!-- GUIDE STEPS -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">📋 Cara Berpartisipasi</div></div>
            <div class="sec-body">
              <div class="steps">
                ${steps.map((s,i) => `
                  <div class="step">
                    <div class="step-num">${i+1}</div>
                    <div>
                      <div class="step-title">${x(s.title)}</div>
                      ${s.desc ? `<div class="step-desc">${autoLink(x(s.desc))}</div>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${tips.length ? `
          <!-- TIPS -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">💡 Tips & Strategi</div></div>
            <div class="sec-body">
              <div class="tips">
                ${tips.map(t => `
                  <div class="tip">
                    <div class="tip-dot"></div>
                    <div class="tip-text">${autoLink(x(t))}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

          ${faqs.length ? `
          <!-- FAQ -->
          <div class="sec">
            <div class="sec-head"><div class="sec-bar"></div><div class="sec-title">❓ FAQ</div></div>
            <div class="sec-body">
              <div class="faqs">
                ${faqs.map(f => `
                  <div class="faq">
                    <div class="faq-q">${x(f.q)}</div>
                    <div class="faq-a">${autoLink(x(f.a))}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>` : ''}

        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
          ${kpRows.length ? `
          <div class="sdb-card">
            <div class="sdb-head">Parameter Airdrop</div>
            <div class="sdb-body">
              <div class="param-row"><span class="param-key">Status</span><span class="param-val g">${x(p.status||'TBA')}</span></div>
              ${p.ticker       ? `<div class="param-row"><span class="param-key">Ticker</span><span class="param-val g">${x(p.ticker)}</span></div>` : ''}
              ${p.network      ? `<div class="param-row"><span class="param-key">Network</span><span class="param-val">${x(p.network)}</span></div>` : ''}
              ${p.tge_date     ? `<div class="param-row"><span class="param-key">TGE / Listing</span><span class="param-val y">${x(p.tge_date)}</span></div>` : ''}
              ${p.total_supply ? `<div class="param-row"><span class="param-key">Total Supply</span><span class="param-val">${x(p.total_supply)}</span></div>` : ''}
              ${p.RaisedID     ? `<div class="param-row"><span class="param-key">Dana Terkumpul</span><span class="param-val g">${x(p.RaisedID)}</span></div>` : ''}
            </div>
          </div>` : ''}

          ${testnetLinks.length ? `
          <div class="sdb-card">
            <div class="sdb-head">Testnet Links (${testnetLinks.length})</div>
            <div class="sdb-body" style="display:flex;flex-direction:column;gap:6px">
              ${testnetLinks.map((t,i) => `
                <a href="${x(t.url)}" target="_blank" rel="noopener"
                   style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bdim);border:1px solid var(--bborder);border-radius:7px;text-decoration:none;font-family:var(--mono);font-size:0.65rem;color:var(--blue);font-weight:700;transition:all .2s"
                   onmouseover="this.style.background='rgba(59,130,246,.15)'"
                   onmouseout="this.style.background='var(--bdim)'">
                  🔗 ${x(t.label || `Link ${i+1}`)} ↗
                </a>
              `).join('')}
            </div>
          </div>` : ''}

          ${p.link ? `<a class="cta-btn" href="${x(p.link)}" target="_blank" rel="noopener">⚡ GARAP SEKARANG</a>` : ''}
        </div>
      </div>
    `;
  }

  // ── PARSERS ──────────────────────────────────────────────

  // Format tasksID:
  // "1. Judul | Deskripsi panjang"
  // "1. Teks biasa"
  function parseSteps(raw) {
    if (!raw) return [];
    return raw.split('\n')
      .map(l => l.trim())
      .filter(l => l && !/^(tip:|💡|Q:|A:)/i.test(l))
      .map(l => {
        const clean = l.replace(/^(\d+[\.\)]\s*|step\s*\d+[:\s]*)/i, '').trim();
        if (!clean) return null;
        if (clean.includes(' | ')) {
          const [title, ...rest] = clean.split(' | ');
          return { title: title.trim(), desc: rest.join(' | ').trim() };
        }
        return { title: clean, desc: '' };
      })
      .filter(Boolean);
  }

  // Format faqID:
  // "Q: pertanyaan | A: jawaban"
  // "Q: pertanyaan\nA: jawaban"
  function parseFaq(raw) {
    if (!raw) return [];
    const faqs = [];
    let q = '';
    for (const line of raw.split('\n').map(l => l.trim()).filter(Boolean)) {
      if (/^Q:/i.test(line)) {
        // Inline: "Q: ... | A: ..."
        if (/ \| A:/i.test(line)) {
          const [qp, ap] = line.split(/ \| A:/i);
          faqs.push({ q: qp.replace(/^Q:\s*/i,'').trim(), a: ap.trim() });
        } else {
          q = line.replace(/^Q:\s*/i,'').trim();
        }
      } else if (/^A:/i.test(line) && q) {
        faqs.push({ q, a: line.replace(/^A:\s*/i,'').trim() });
        q = '';
      }
    }
    return faqs;
  }

  // Tips: baris dimulai "TIP:", "💡"
  function parseTips(raw) {
    if (!raw) return [];
    return raw.split('\n')
      .map(l => l.trim())
      .filter(l => /^(tip:|💡)/i.test(l))
      .map(l => l.replace(/^(tip:\s*|💡\s*)/i,'').trim())
      .filter(Boolean);
  }

  // Auto-link URL di teks jadi clickable biru
  function autoLink(text) {
    return text.replace(
      /(https?:\/\/[^\s<"']+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline">$1</a>'
    );
  }

  function getStCls(s) {
    const l = (s||'').toLowerCase();
    if (l.includes('active')) return 'b-active';
    if (l.includes('wait'))   return 'b-waitlist';
    return 'b-default';
  }

  function x(s) {
    return String(s||'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showError(msg) {
    document.getElementById('wrap').innerHTML =
      `<div class="state-msg err">❌ ${msg}<br><br><a href="../index.html" style="color:var(--accent)">← Kembali ke dashboard</a></div>`;
  }
</script>
