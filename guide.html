<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/logo.png">
<title>Guide — AirdropXI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --g: #00e87a;
    --c: #00c8f0;
    --accent: #7c6dfa;
    --bg: #080e14;
    --surface: #0d1520;
    --surface2: #111e2c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8f0f8;
    --text2: #6b8499;
    --text3: #4a6070;
    --radius: 14px;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACK NAV ── */
  .guide-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,14,20,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text2);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .05em;
    transition: color .2s;
  }
  .back-btn:hover { color: var(--g); }
  .back-btn svg { transition: transform .2s; }
  .back-btn:hover svg { transform: translateX(-3px); }

  .nav-logo-sm {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--text);
    font-weight: 800;
    font-size: 15px;
  }
  .nav-logo-sm img { width: 24px; height: 24px; border-radius: 6px; }
  .nav-logo-sm span { color: var(--g); }

  /* ── MAIN LAYOUT ── */
  .guide-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── LOADING / ERROR ── */
  .state-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 13px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--g);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HEADER CARD ── */
  .project-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .project-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(0,232,122,.06), transparent 60%);
    pointer-events: none;
  }

  .project-logo {
    width: 64px; height: 64px;
    border-radius: 14px;
    object-fit: cover;
    border: 1px solid var(--border2);
    background: var(--surface2);
    flex-shrink: 0;
  }
  .project-logo-fallback {
    width: 64px; height: 64px;
    border-radius: 14px;
    background: rgba(0,232,122,.08);
    border: 1px solid rgba(0,232,122,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }

  .project-meta { flex: 1; min-width: 0; }
  .project-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 14px;
  }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .badge-active   { background: rgba(0,229,160,.12); color: #00e5a0; border: 1px solid rgba(0,229,160,.3); }
  .badge-waitlist { background: rgba(245,158,11,.12); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
  .badge-listing  { background: rgba(124,109,250,.12); color: #7c6dfa; border: 1px solid rgba(124,109,250,.3); }
  .badge-default  { background: rgba(255,255,255,.06); color: var(--text2); border: 1px solid var(--border); }
  .badge-tag      { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

  .social-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .social-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    text-decoration: none;
    transition: all .2s;
  }
  .social-btn:hover { border-color: var(--g); color: var(--g); }

  /* ── INFO GRID ── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .info-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-value {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
  }
  .info-value.green { color: var(--g); }
  .info-value.cyan  { color: var(--c); }

  /* ── SECTION BLOCK ── */
  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .section-block-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--g);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-block-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── DESCRIPTION ── */
  .desc-text {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
  }

  /* ── TASKS ── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    transition: border-color .2s;
  }
  .task-item:hover { border-color: rgba(0,232,122,.25); }
  .task-num {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--g);
    background: rgba(0,232,122,.1);
    border: 1px solid rgba(0,232,122,.2);
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── FAQ ── */
  .faq-list { display: flex; flex-direction: column; gap: 10px; }
  .faq-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .faq-q {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface2);
    user-select: none;
    gap: 12px;
    transition: background .2s;
  }
  .faq-q:hover { background: rgba(0,232,122,.05); }
  .faq-arrow {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--g);
    transition: transform .25s;
    flex-shrink: 0;
  }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }
  .faq-a {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease, padding .3s;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    background: var(--surface);
    padding: 0 16px;
  }
  .faq-item.open .faq-a {
    max-height: 400px;
    padding: 14px 16px;
  }

  /* ── CTA BUTTONS ── */
  .cta-wrap {
    position: sticky;
    bottom: 0;
    background: rgba(8,14,20,0.92);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    z-index: 90;
  }

  .btn-main {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--g), var(--c));
    color: #000;
    font-weight: 800;
    font-size: 13px;
    font-family: var(--mono);
    border-radius: 10px;
    text-decoration: none;
    letter-spacing: .04em;
    transition: opacity .2s, transform .15s;
    border: none;
    cursor: pointer;
    position: relative;
  }
  .btn-main:hover { opacity: .9; transform: translateY(-1px); }

  /* Dropdown multi-link */
  .btn-dropdown-wrap {
    position: relative;
  }
  .btn-dropdown-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--g), var(--c));
    color: #000;
    font-weight: 800;
    font-size: 13px;
    font-family: var(--mono);
    border-radius: 10px;
    cursor: pointer;
    border: none;
    letter-spacing: .04em;
    transition: opacity .2s;
    user-select: none;
  }
  .btn-dropdown-toggle:hover { opacity: .9; }
  .btn-arrow-ico {
    font-size: 10px;
    transition: transform .2s;
  }
  .btn-dropdown-wrap.open .btn-arrow-ico { transform: rotate(180deg); }

  .btn-dropdown-menu {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 0;
    min-width: 260px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    box-shadow: 0 -8px 32px rgba(0,0,0,.5);
    z-index: 200;
  }
  .btn-dropdown-wrap.open .btn-dropdown-menu { display: block; }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: rgba(0,232,122,.07); }
  .dropdown-item-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: rgba(0,232,122,.1);
    border: 1px solid rgba(0,232,122,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .dropdown-item-label { font-weight: 600; font-size: 12px; }
  .dropdown-item-url {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }

  .btn-ghost-sm {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text2);
    font-size: 12px;
    font-family: var(--mono);
    text-decoration: none;
    transition: all .2s;
    cursor: pointer;
  }
  .btn-ghost-sm:hover { border-color: var(--g); color: var(--g); }

  /* ── FADE IN ── */
  .fade-in {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp .4s ease forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in:nth-child(1) { animation-delay: .05s; }
  .fade-in:nth-child(2) { animation-delay: .1s; }
  .fade-in:nth-child(3) { animation-delay: .15s; }
  .fade-in:nth-child(4) { animation-delay: .2s; }
  .fade-in:nth-child(5) { animation-delay: .25s; }
  .fade-in:nth-child(6) { animation-delay: .3s; }

  @media (max-width: 600px) {
    .project-header { flex-direction: column; gap: 14px; }
    .project-name { font-size: 20px; }
    .guide-wrap { padding: 24px 16px 100px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    .cta-wrap { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav class="guide-nav">
  <a href="/" class="back-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Kembali
  </a>
  <a href="/" class="nav-logo-sm">
    <img src="/logo.png" alt="AirdropXI">
    Airdrop<span>XI</span>
  </a>
</nav>

<!-- Content -->
<div class="guide-wrap" id="guide-wrap">
  <div class="state-center" id="loading-state">
    <div class="spinner"></div>
    <span>Memuat data project...</span>
  </div>
  <div class="state-center" id="error-state" style="display:none">
    <span style="font-size:32px">⚠️</span>
    <span id="error-msg" style="color:#ff2d55">Project tidak ditemukan</span>
    <a href="/" style="color:var(--g);font-size:12px">← Kembali ke daftar</a>
  </div>
  <div id="project-content" style="display:none"></div>
</div>

<!-- CTA Bar (sticky bottom) -->
<div class="cta-wrap" id="cta-wrap" style="display:none">
  <div id="cta-buttons"></div>
  <a href="/" class="btn-ghost-sm">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Lihat Airdrop Lain
  </a>
</div>

<script>
// ── UTILS ──────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function getStatusClass(s) {
  if (!s) return 'badge-default';
  const l = s.toLowerCase();
  if (l.includes('waitlist')) return 'badge-waitlist';
  if (l.includes('listed') || l.includes('ended') || l.includes('selesai')) return 'badge-listing';
  return 'badge-active';
}

// ── GET ID FROM URL ────────────────────────────────────────
// URL: /guide/32  → pathname = /guide/32
const pathId = window.location.pathname.split('/').filter(Boolean).pop();

// ── FETCH ─────────────────────────────────────────────────
async function loadProject() {
  if (!pathId) return showError('ID project tidak ditemukan');

  try {
    const res = await fetch(`/api/guide?id=${encodeURIComponent(pathId)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const p = await res.json();
    if (!p || !p.name) throw new Error('Data kosong');
    render(p);
  } catch(e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  const err = document.getElementById('error-state');
  err.style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

// ── RENDER ────────────────────────────────────────────────
function render(p) {
  document.title = `${p.name} — AirdropXI`;
  document.getElementById('loading-state').style.display = 'none';

  const lang = localStorage.getItem('axi-lang') || 'id';
  const isID = lang === 'id';

  // Description
  const desc = isID
    ? (p.descriptionID || p.descriptionEN || '')
    : (p.descriptionEN || p.descriptionID || '');

  // Tasks
  const tasksRaw = isID
    ? (p.tasksID || p.tasksEN || '')
    : (p.tasksEN || p.tasksID || '');

  const tasks = tasksRaw
    .split('\n')
    .map(l => l.trim())
    .filter(l => l && !/^(tip:|💡|Q:|A:)/i.test(l))
    .map(l => l.replace(/^(\d+[\.\)]\s*)/, ''));

  // FAQ
  const faqRaw = isID
    ? (p.faqID || p.faqEN || '')
    : (p.faqEN || p.faqID || '');

  const faqs = parseFaq(faqRaw);

  // Tags
  const tags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);

  // Logo
  const logoHtml = p.logo_url
    ? `<img src="${esc(p.logo_url)}" class="project-logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${esc(p.name)}">
       <div class="project-logo-fallback" style="display:none">🪂</div>`
    : `<div class="project-logo-fallback">🪂</div>`;

  // Social links
  const socials = [];
  if (p.twitter)  socials.push(`<a href="${esc(p.twitter)}" target="_blank" rel="noopener" class="social-btn">𝕏 Twitter</a>`);
  if (p.discord)  socials.push(`<a href="${esc(p.discord)}" target="_blank" rel="noopener" class="social-btn">💬 Discord</a>`);
  if (p.telegram) socials.push(`<a href="${esc(p.telegram)}" target="_blank" rel="noopener" class="social-btn">✈️ Telegram</a>`);

  // Info grid items
  const infoItems = [];
  if (p.RaisedID || p.RaisedEN) infoItems.push({ label: 'Dana Terkumpul', value: isID ? (p.RaisedID || p.RaisedEN) : (p.RaisedEN || p.RaisedID), cls: 'green' });
  if (p.ticker)       infoItems.push({ label: 'Ticker', value: '$' + p.ticker, cls: 'cyan' });
  if (p.network)      infoItems.push({ label: 'Network', value: p.network, cls: '' });
  if (p.total_supply) infoItems.push({ label: 'Total Supply', value: p.total_supply, cls: '' });
  if (p.tge_date)     infoItems.push({ label: 'TGE Date', value: p.tge_date, cls: 'green' });

  const infoHTML = infoItems.length ? `
    <div class="info-grid fade-in">
      ${infoItems.map(i => `
        <div class="info-card">
          <div class="info-label">${esc(i.label)}</div>
          <div class="info-value ${i.cls}">${esc(i.value)}</div>
        </div>
      `).join('')}
    </div>` : '';

  // Description block
  const descHTML = desc ? `
    <div class="section-block fade-in">
      <div class="section-block-title">📋 Tentang Project</div>
      <p class="desc-text">${esc(desc).replace(/\n/g,'<br>')}</p>
    </div>` : '';

  // Tasks block
  const tasksHTML = tasks.length ? `
    <div class="section-block fade-in">
      <div class="section-block-title">⚡ Langkah-langkah</div>
      <div class="task-list">
        ${tasks.map((t, i) => `
          <div class="task-item">
            <span class="task-num">${String(i+1).padStart(2,'0')}</span>
            <span>${esc(t)}</span>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  // FAQ block
  const faqHTML = faqs.length ? `
    <div class="section-block fade-in">
      <div class="section-block-title">❓ FAQ</div>
      <div class="faq-list">
        ${faqs.map((f, i) => `
          <div class="faq-item" id="faq-${i}">
            <div class="faq-q" onclick="toggleFaq(${i})">
              <span>${esc(f.q)}</span>
              <span class="faq-arrow">▼</span>
            </div>
            <div class="faq-a">${esc(f.a).replace(/\n/g,'<br>')}</div>
          </div>
        `).join('')}
      </div>
    </div>` : '';

  // Render content
  const content = document.getElementById('project-content');
  content.innerHTML = `
    <!-- Header -->
    <div class="project-header fade-in">
      ${logoHtml}
      <div class="project-meta">
        <div class="project-name">${esc(p.name)}</div>
        <div class="badge-row">
          <span class="badge ${getStatusClass(p.status)}">${esc(p.status || 'TBA')}</span>
          ${tags.map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join('')}
        </div>
        ${socials.length ? `<div class="social-row">${socials.join('')}</div>` : ''}
      </div>
    </div>

    ${infoHTML}
    ${descHTML}
    ${tasksHTML}
    ${faqHTML}
  `;
  content.style.display = 'block';

  // ── CTA BUTTONS ────────────────────────────────────────
  renderCTA(p);
}

function renderCTA(p) {
  const ctaWrap = document.getElementById('cta-wrap');
  const ctaBtns = document.getElementById('cta-buttons');
  ctaWrap.style.display = 'flex';

  // Parse testnet_links
  let links = [];
  if (p.testnet_links) {
    try {
      const parsed = typeof p.testnet_links === 'string'
        ? JSON.parse(p.testnet_links)
        : p.testnet_links;
      if (Array.isArray(parsed) && parsed.length > 0) links = parsed;
    } catch(e) {
      // testnet_links bukan JSON valid, skip
    }
  }

  if (links.length > 0) {
    // Multi-link dropdown
    const dropdownItems = links.map((l, i) => `
      <a href="${esc(l.url)}" target="_blank" rel="noopener noreferrer" class="dropdown-item">
        <div class="dropdown-item-icon">⚡</div>
        <div>
          <div class="dropdown-item-label">${esc(l.label || 'Link ' + (i+1))}</div>
          <div class="dropdown-item-url">${esc(l.url)}</div>
        </div>
      </a>
    `).join('');

    ctaBtns.innerHTML = `
      <div class="btn-dropdown-wrap" id="dropdown-wrap">
        <button class="btn-dropdown-toggle" onclick="toggleDropdown()">
          ⚡ Garap Sekarang
          <span class="btn-arrow-ico">▲</span>
        </button>
        <div class="btn-dropdown-menu">
          ${dropdownItems}
        </div>
      </div>
    `;
  } else if (p.link) {
    // Single link
    ctaBtns.innerHTML = `
      <a href="${esc(p.link)}" target="_blank" rel="noopener noreferrer" class="btn-main">
        ⚡ Garap Sekarang
      </a>
    `;
  } else {
    ctaBtns.innerHTML = `
      <button class="btn-main" style="opacity:.5;cursor:not-allowed" disabled>
        ⚡ Link belum tersedia
      </button>
    `;
  }

  // Close dropdown kalau klik di luar
  document.addEventListener('click', function(e) {
    const wrap = document.getElementById('dropdown-wrap');
    if (wrap && !wrap.contains(e.target)) {
      wrap.classList.remove('open');
    }
  });
}

function toggleDropdown() {
  const wrap = document.getElementById('dropdown-wrap');
  if (wrap) wrap.classList.toggle('open');
}

// ── FAQ TOGGLE ────────────────────────────────────────────
function toggleFaq(i) {
  const item = document.getElementById('faq-' + i);
  if (item) item.classList.toggle('open');
}

// ── FAQ PARSER ────────────────────────────────────────────
// Format: "Q: pertanyaan\nA: jawaban\n\nQ: ..."
function parseFaq(raw) {
  if (!raw || !raw.trim()) return [];
  const result = [];
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  for (const line of lines) {
    // Format: "Q: pertanyaan | A: jawaban"
    const match = line.match(/^Q:\s*(.+?)\s*\|\s*A:\s*(.+)$/i);
    if (match) {
      result.push({ q: match[1].trim(), a: match[2].trim() });
    }
  }
  return result;
}
