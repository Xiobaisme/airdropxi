<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐕</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* ─── RESET & ROOT ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .hidden {
            display: none !important;
        }

        :root {
            --bg: #0a0000;
            --s1: rgba(20, 4, 4, 0.88);
            --s2: rgba(32, 8, 8, 0.78);
            --s3: rgba(48, 12, 12, 0.62);
            --border: rgba(255, 40, 40, 0.12);
            --border2: rgba(255, 40, 40, 0.2);
            --glow-cyan: #ff2020;
            --glow-pink: #ff0044;
            --glow-purple: #9a0000;
            --glow-orange: #ffcc00;
            --glow-green: #39ff6a;
            --text: #fdeaea;
            --text2: #c98a8a;
            --text3: #6b3a3a;
            --mono: 'Orbitron', monospace;
            --sans: 'Inter', sans-serif;
            --meme: 'Bungee', cursive;
            --r: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.75);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            font-size: 15px;
            overflow-x: hidden;
        }

        /* ─── ANIMATED BG ORBS ─── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-orbs span {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.22;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }
        .bg-orbs span:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--glow-cyan);
            top: -10%;
            left: -10%;
            animation-duration: 22s;
        }
        .bg-orbs span:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--glow-pink);
            bottom: -10%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: -4s;
        }
        .bg-orbs span:nth-child(3) {
            width: 350px;
            height: 350px;
            background: var(--glow-purple);
            top: 40%;
            left: 60%;
            animation-duration: 20s;
            animation-delay: -8s;
        }
        .bg-orbs span:nth-child(4) {
            width: 300px;
            height: 300px;
            background: var(--glow-orange);
            top: 70%;
            left: 10%;
            animation-duration: 24s;
            animation-delay: -12s;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(80px, -60px) scale(1.1);
            }
            66% {
                transform: translate(-40px, 80px) scale(0.9);
            }
            100% {
                transform: translate(60px, 40px) scale(1.05);
            }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-cyan);
            border-radius: 999px;
            box-shadow: 0 0 20px var(--glow-cyan);
        }

        /* ─── LOGIN SECTION ─── */
        #login-section {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }
        .login-card {
            position: relative;
            z-index: 2;
            background: var(--s1);
            backdrop-filter: blur(24px);
            border: 1.5px solid rgba(255, 32, 32, 0.25);
            border-radius: 28px;
            padding: 3.2rem 2.8rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 60px rgba(255, 32, 32, 0.1), var(--shadow);
            animation: loginFade 0.9s ease forwards;
        }
        @keyframes loginFade {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-orange), var(--glow-pink));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .login-logo {
            font-family: var(--meme);
            font-size: 2rem;
            font-weight: 400;
            background: linear-gradient(135deg, var(--glow-orange), var(--glow-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.4rem;
            letter-spacing: 0.01em;
        }
        .login-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.3rem;
        }
        .login-sub {
            font-size: 0.9rem;
            color: var(--text2);
            margin-bottom: 2rem;
        }
        .login-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--glow-cyan), var(--glow-orange));
            border-radius: 999px;
            margin: 0 auto 2rem;
        }

        /* ─── NAV ─── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 0, 0, 0.9);
            backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border);
            height: 68px;
            padding: 0 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .nav-logo {
            font-family: var(--meme);
            font-size: 1rem;
            font-weight: 400;
            background: linear-gradient(135deg, var(--glow-orange), var(--glow-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: 0.01em;
        }
        .nav-badge {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 800;
            padding: 0.25rem 0.7rem;
            background: rgba(255, 0, 68, 0.15);
            border: 1.5px solid rgba(255, 0, 68, 0.35);
            border-radius: 999px;
            color: var(--glow-pink);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-btn {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.5rem 1.1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid rgba(255, 32, 32, 0.35);
            background: rgba(255, 32, 32, 0.08);
            color: var(--glow-cyan);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover {
            background: rgba(255, 32, 32, 0.18);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 32, 32, 0.12);
        }
        .nav-btn.pink {
            border-color: rgba(255, 0, 68, 0.35);
            background: rgba(255, 0, 68, 0.08);
            color: var(--glow-pink);
        }
        .nav-btn.pink:hover {
            background: rgba(255, 0, 68, 0.18);
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.12);
        }

        /* ─── MAIN CONTENT ─── */
        #admin-content {
            position: relative;
            z-index: 1;
        }

        /* ─── PROJECT LINKS SECTION ─── */
        #proj-links-section {
            position: relative;
            z-index: 1;
            max-width: 1360px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 4rem;
        }

        .section-card {
            background: var(--s1);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .section-header {
            padding: 1.3rem 1.8rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: linear-gradient(105deg, rgba(255, 32, 32, 0.06), transparent);
        }
        .section-header .icon-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--glow-cyan);
            box-shadow: 0 0 24px var(--glow-cyan);
            flex-shrink: 0;
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%,
            100% {
                box-shadow: 0 0 24px var(--glow-cyan);
                opacity: 1;
            }
            50% {
                box-shadow: 0 0 48px var(--glow-cyan), 0 0 80px rgba(255, 32, 32, 0.25);
                opacity: 0.8;
            }
        }
        .section-header .title-group {
            flex: 1;
        }
        .section-header .title-group .label {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text3);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .section-header .title-group .main {
            font-family: var(--meme);
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text);
            letter-spacing: 0.01em;
        }
        .section-header .count-badge {
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--glow-cyan);
            background: rgba(255, 32, 32, 0.1);
            padding: 0.25rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 32, 32, 0.2);
        }
        .section-header .add-btn {
            border-color: rgba(255, 204, 0, 0.4);
            color: var(--glow-orange);
            background: rgba(255, 204, 0, 0.08);
        }
        .section-header .add-btn:hover {
            background: rgba(255, 204, 0, 0.18);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.12);
        }

        /* ─── STATUS SUMMARY ─── */
        #status-summary {
            padding: 1.1rem 1.8rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            background: rgba(0, 0, 0, 0.35);
        }
        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0.7rem 0.9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            transition: border-color 0.2s, background 0.2s;
        }
        .stat-block:hover {
            border-color: rgba(255, 32, 32, 0.25);
            background: rgba(255, 32, 32, 0.05);
        }
        .stat-block .n {
            font-family: var(--mono);
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .stat-block .l {
            font-family: var(--mono);
            font-size: 0.58rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
        }

        /* ─── FILTER TABS ─── */
        .filter-bar {
            display: flex;
            gap: 6px;
            padding: 0.8rem 1.8rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.25);
        }
        .ftab {
            font-family: var(--mono);
            font-size: 0.62rem;
            font-weight: 700;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text3);
            transition: all 0.2s;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .ftab:hover {
            border-color: var(--border2);
            color: var(--text2);
            transform: translateY(-1px);
        }
        .ftab.active {
            background: rgba(255, 32, 32, 0.1);
            border-color: rgba(255, 32, 32, 0.35);
            color: var(--glow-cyan);
            box-shadow: 0 0 20px rgba(255, 32, 32, 0.06);
        }
        .ftab.haslink {
            border-color: rgba(57, 255, 106, 0.3);
            color: var(--glow-green);
        }
        .ftab.haslink.active {
            background: rgba(57, 255, 106, 0.1);
            border-color: rgba(57, 255, 106, 0.4);
            color: var(--glow-green);
        }
        .ftab.nolink {
            border-color: rgba(255, 0, 68, 0.25);
            color: var(--glow-pink);
        }
        .ftab.nolink.active {
            background: rgba(255, 0, 68, 0.1);
            border-color: rgba(255, 0, 68, 0.4);
            color: var(--glow-pink);
        }

        /* ─── PROJECT GRID ─── */
        #proj-links-list {
            padding: 1.5rem 1.8rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
        }
        .proj-card {
            background: var(--s2);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .proj-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 1.5px;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 32, 32, 0.08), transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .proj-card:hover::before {
            opacity: 1;
        }
        .proj-card:hover {
            border-color: rgba(255, 32, 32, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .proj-card.nolink {
            border-color: rgba(255, 0, 68, 0.18);
        }
        .proj-card.nolink:hover {
            border-color: rgba(255, 0, 68, 0.3);
        }

        .proj-card .top {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .proj-card .logo-wrap {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--s3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            font-size: 1.4rem;
        }
        .proj-card .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        .proj-card .info {
            flex: 1;
            min-width: 0;
        }
        .proj-card .info .name {
            font-size: 0.95rem;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .proj-card .info .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .proj-card .info .tags .tag {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .proj-card .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .badge-status {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 800;
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-width: 1.5px;
            border-style: solid;
        }
        .badge-status.st-a {
            background: rgba(57, 255, 106, 0.12);
            color: var(--glow-green);
            border-color: rgba(57, 255, 106, 0.3);
        }
        .badge-status.st-w {
            background: rgba(255, 204, 0, 0.12);
            color: var(--glow-orange);
            border-color: rgba(255, 204, 0, 0.3);
        }
        .badge-status.st-s {
            background: rgba(255, 32, 32, 0.1);
            color: var(--glow-cyan);
            border-color: rgba(255, 32, 32, 0.28);
        }
        .badge-status.st-c {
            background: rgba(154, 0, 0, 0.15);
            color: #ff6666;
            border-color: rgba(154, 0, 0, 0.35);
        }
        .badge-status.st-p {
            background: rgba(255, 0, 68, 0.1);
            color: var(--glow-pink);
            border-color: rgba(255, 0, 68, 0.28);
        }
        .badge-status.st-d {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text3);
            border-color: var(--border);
        }

        .badge-live {
            font-family: var(--mono);
            font-size: 0.55rem;
            font-weight: 800;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            letter-spacing: 0.04em;
            border: 1.5px solid;
        }
        .badge-live.on {
            background: rgba(57, 255, 106, 0.1);
            color: var(--glow-green);
            border-color: rgba(57, 255, 106, 0.3);
        }
        .badge-live.off {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text3);
            border-color: var(--border);
        }

        .badge-conf {
            font-family: var(--mono);
            font-size: 0.52rem;
            font-weight: 800;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border: 1.5px solid;
        }
        .badge-conf.confirmed {
            background: rgba(255, 32, 32, 0.1);
            color: var(--glow-cyan);
            border-color: rgba(255, 32, 32, 0.28);
        }
        .badge-conf.potential {
            background: rgba(255, 0, 68, 0.1);
            color: var(--glow-pink);
            border-color: rgba(255, 0, 68, 0.28);
        }
        .badge-conf.ended {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text3);
            border-color: var(--border);
        }

        .proj-card .actions {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            flex-wrap: wrap;
        }
        .proj-card .actions .link-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0.55rem;
            border-radius: 10px;
            border: 1.5px solid rgba(57, 255, 106, 0.25);
            background: rgba(57, 255, 106, 0.07);
            color: var(--glow-green);
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }
        .proj-card .actions .link-btn:hover {
            background: rgba(57, 255, 106, 0.14);
            border-color: rgba(57, 255, 106, 0.4);
            transform: translateY(-1px);
        }
        .proj-card .actions .link-btn.nolink {
            border-color: rgba(255, 0, 68, 0.18);
            background: rgba(255, 0, 68, 0.05);
            color: var(--text3);
            cursor: default;
        }
        .proj-card .actions .link-btn.nolink:hover {
            transform: none;
            background: rgba(255, 0, 68, 0.07);
        }
        .proj-card .actions .edit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            border: 1.5px solid rgba(255, 32, 32, 0.25);
            background: rgba(255, 32, 32, 0.07);
            color: var(--glow-cyan);
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .proj-card .actions .edit-btn:hover {
            background: rgba(255, 32, 32, 0.16);
            border-color: rgba(255, 32, 32, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(255, 32, 32, 0.08);
        }
        .proj-card .actions .delete-btn {
            border-color: rgba(255, 0, 68, 0.25);
            background: rgba(255, 0, 68, 0.07);
            color: var(--glow-pink);
        }
        .proj-card .actions .delete-btn:hover {
            background: rgba(255, 0, 68, 0.18);
            border-color: rgba(255, 0, 68, 0.4);
            box-shadow: 0 0 30px rgba(255, 0, 68, 0.08);
        }

        /* ─── MODAL ─── */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 1500;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: modalFade 0.25s ease;
        }
        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-box {
            background: var(--s1);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 580px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
        }

        }

            align-items: center;

            border-radius: 8px;

        }
        .modal-close:hover {
            color: var(--text);
            background: rgba(255, 32, 32, 0.08);
        }

        .modal-body {
            padding: 1.5rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .field label {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--text2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .field label .hint {
            text-transform: none;
            color: var(--text3);
            font-weight: 400;
            font-size: 0.6rem;
        }
        .field input,
        .field select,
        .field textarea {
            width: 100%;
            background: var(--s2);
            border: 1.5px solid var(--border2);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.85rem;
            padding: 0.7rem 0.9rem;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            resize: vertical;
        }
        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--glow-cyan);
            box-shadow: 0 0 0 3px rgba(255, 32, 32, 0.1);
        }
        .field textarea {
            min-height: 80px;
            line-height: 1.55;
            font-family: var(--sans);
        }
        .fg2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.9rem;
        }
        @media (max-width: 500px) {
            .fg2 {
                grid-template-columns: 1fr;
            }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 1.2rem 1.8rem;
            border-top: 1px solid var(--border);
        }
        .btn-save,
        .btn-cancel {
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            border: 1.5px solid var(--border2);
            background: var(--s2);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 800;
            letter-spacing: 0.04em;
        }
        .btn-save {
            background: rgba(255, 32, 32, 0.1);
            border-color: rgba(255, 32, 32, 0.3);
            color: var(--glow-cyan);
        }
        .btn-save:hover {
            background: rgba(255, 32, 32, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 32, 32, 0.08);
        }
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-cancel {
            background: transparent;
            border-color: var(--border);
            color: var(--text2);
        }
        .btn-cancel:hover {
            border-color: var(--border2);
            color: var(--text);
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            background: var(--s1);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-size: 0.85rem;
            color: var(--text);
            font-family: var(--mono);
            opacity: 0;
            transform: translateY(80px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            font-weight: 700;
            box-shadow: var(--shadow);
            max-width: 400px;

        .toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;

            border-color: rgba(57, 255, 106, 0.3);
            background: rgba(57, 255, 106, 0.08);

            border-color: rgba(255, 0, 68, 0.3);
            background: rgba(255, 0, 68, 0.08);
            color: var(--glow-pink);
        }

        /* ─── CALCULATOR ─── */
        #calc-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1600;
            width: 270px;
            background: var(--s1);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.6);
            animation: modalFade 0.3s ease;
        }
        .calc-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, rgba(255, 32, 32, 0.06), transparent);
        }
        .calc-head span.t {
            flex: 1;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text3);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 800;
        }
        .calc-close {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px 8px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .calc-close:hover {
            color: var(--text);
            background: rgba(255, 32, 32, 0.08);
        }
        .calc-body {
            padding: 0.9rem;

        #calc-display {
            width: 100%;
            background: var(--s2);
            border: 1.5px solid var(--border2);
            border-radius: 10px;
            color: var(--glow-cyan);
            font-family: var(--mono);
            font-size: 1.3rem;
            font-weight: 800;
            text-align: right;
            padding: 0.6rem 0.8rem;
            outline: none;
            margin-bottom: 10px;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .calc-key {
            padding: 0.65rem 0;
            border-radius: 10px;
            border: 1.5px solid var(--border2);
            background: var(--s2);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
        }
        .calc-key:hover {
            background: var(--s3);
            transform: translateY(-1px);
        }
        .calc-key.op {
            background: rgba(255, 32, 32, 0.08);
            color: var(--glow-cyan);
            border-color: rgba(255, 32, 32, 0.18);
        }
        .calc-key.op:hover {
            background: rgba(255, 32, 32, 0.18);
        }

            grid-column: span 2;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {

                padding: 2rem 1.5rem;
            }
            .login-logo {
                font-size: 1.5rem;
            }
            nav {
                padding: 0 1rem;

            }
            .nav-logo {
                font-size: 0.85rem;

            }

            }
            #calc-panel {
                width: 240px;
                bottom: 14px;
                right: 14px;
            }
            .toast {
                bottom: 14px;
                right: 14px;
                left: 14px;
                max-width: none;
                font-size: 0.75rem;
                padding: 0.6rem 1.2rem;
            }
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text3);
            grid-column: 1 / -1;

            padding: 3rem 0;
        }
        .empty-state .emoji {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 0.6rem;
        }
    </style>
</head>
<body>

                    </div>

    <script>
        // ─── STATUS OPTIONS ───
        const STATUS_OPTIONS = ['Active', 'Waitlist', 'Season 1', 'Season 2', 'Season 3', 'Season 4', 'Season 5',
            'Seed Round', 'Private Round', 'Potential', 'Confirmed', 'Testnet', 'Mainnet',
            'Listing / Selesai', 'Ended', 'TBA'
        ];

        // ─── STATE ───
        let projects = [];
        let _plFilter = 'all';
        let _editingId = null;

        // ─── HELPERS ───
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getStatusClass(s) {
            const l = (s || '').toLowerCase();
            if (l.includes('active') || l.includes('mainnet')) return 'st-a';
            if (l.includes('wait')) return 'st-w';
            if (l.includes('season')) return 'st-s';
            if (l.includes('confirmed') || l.includes('testnet')) return 'st-c';
            if (l.includes('potential')) return 'st-p';
            return 'st-d';
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            if (!t) return;
            t.textContent = msg;
            t.className = `toast ${type} show`;
            clearTimeout(t._hide);
            t._hide = setTimeout(() => t.classList.remove('show'), 3200);
        }

        // ─── LOAD PROJECTS ───
        async function loadProjects() {
            try {
                const res = await fetch('/api/admin-airdrop');
                if (!res.ok) throw new Error('Gagal fetch data');
                projects = await res.json();
                renderStatusSummary();
                renderProjectLinks();
            } catch (e) {
                const list = document.getElementById('proj-links-list');
                if (list) {
                    list.innerHTML =
                        `<div class="empty-state"><span class="emoji">🚫</span>${esc(e.message)}</div>`;
                }
            }
        }

        // ─── STATUS SUMMARY ───
        function renderStatusSummary() {
            const wrap = document.getElementById('status-summary');
            if (!wrap) return;

            const total = projects.length;
            const live = projects.filter(p => p.published === true).length;
            const draft = total - live;
            const active = projects.filter(p => (p.status || '').toLowerCase().includes('active')).length;
            const waitlist = projects.filter(p => (p.status || '').toLowerCase().includes('wait')).length;
            const ended = projects.filter(p => (p.status || '').toLowerCase().includes('end') || (p.confirmation_status || '')
                .toLowerCase().includes('ended')).length;
            const confirmed = projects.filter(p => (p.confirmation_status || '').toLowerCase().includes('confirmed')).length;
            const potential = projects.filter(p => (p.confirmation_status || '').toLowerCase().includes('potential')).length;
            const hasLink = projects.filter(p => !!p.link).length;
            const noLink = total - hasLink;

            const blocks = [
                ['Total', total, 'var(--glow-cyan)'],
                ['Live', live, 'var(--glow-green)'],
                ['Draft', draft, 'var(--glow-orange)'],
                ['Active', active, 'var(--glow-green)'],
                ['Waitlist', waitlist, 'var(--glow-orange)'],
                ['Confirmed', confirmed, 'var(--glow-cyan)'],
                ['Potential', potential, '#ff6666'],
                ['Ended', ended, 'var(--text3)'],
                ['Ada Link', hasLink, 'var(--glow-green)'],
                ['No Link', noLink, 'var(--glow-pink)'],
            ];

            wrap.innerHTML = blocks.map(([label, val, color]) =>
                `<div class="stat-block"><div class="n" style="color:${color}">${val}</div><div class="l">${esc(label)}</div></div>`
            ).join('');
        }

        // ─── FILTER ───
        function setPLFilter(mode, btn) {
            _plFilter = mode;
            document.querySelectorAll('#proj-links-section .ftab').forEach(t => t.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderProjectLinks();
        }

        // ─── RENDER PROJECT LINKS ───
        function renderProjectLinks() {
            const list = document.getElementById('proj-links-list');
            const count = document.getElementById('proj-links-count');
            if (!list) return;

            let filtered = [...projects];
            if (_plFilter === 'active') filtered = filtered.filter(p => (p.status || '').toLowerCase().includes('active'));
            if (_plFilter === 'waitlist') filtered = filtered.filter(p => (p.status || '').toLowerCase().includes('wait'));
            if (_plFilter === 'ended') filtered = filtered.filter(p => (p.status || '').toLowerCase().includes('end') || (p
                .confirmation_status || '').toLowerCase().includes('ended'));
            if (_plFilter === 'confirmed') filtered = filtered.filter(p => (p.confirmation_status || '').toLowerCase()
                .includes('confirmed'));
            if (_plFilter === 'potential') filtered = filtered.filter(p => (p.confirmation_status || '').toLowerCase()
                .includes('potential'));
            if (_plFilter === 'nolink') filtered = filtered.filter(p => !p.link);
            if (_plFilter === 'haslink') filtered = filtered.filter(p => !!p.link);

            if (count) count.textContent = `${filtered.length}/${projects.length}`;

            if (!filtered.length) {
                list.innerHTML =
                    `<div class="empty-state"><span class="emoji">🕳️</span>Tidak ada proyek dengan filter ini.</div>`;
                return;
            }

            list.innerHTML = filtered.map(p => {
                const hasLink = !!(p.link);
                const isLive = p.published === true;
                const confVal = (p.confirmation_status || '').toLowerCase();
                let confCls = '',
                    confLbl = '';
                if (confVal.includes('confirmed')) { confCls = 'confirmed';
                    confLbl = '✓ Conf'; } else if (confVal.includes('potential')) { confCls = 'potential';
                    confLbl = '◈ Pot'; } else if (confVal.includes('ended')) { confCls = 'ended';
                    confLbl = '✕ End'; }

                const tags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);

                return `
                <div class="proj-card ${hasLink?'':'nolink'}">
                    <div class="top">
                        <div class="logo-wrap">
                            ${p.logo_url ? `<img src="${esc(p.logo_url)}" onerror="this.parentElement.innerHTML='🐕'" />` : '🐕'}
                        </div>
                        <div class="info">
                            <div class="name">${esc(p.name)}</div>
                            ${tags.length ? `<div class="tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
                        </div>
                    </div>
                    <div class="badges">
                        <span class="badge-status ${getStatusClass(p.status)}">${esc(p.status||'TBA')}</span>
                        <span class="badge-live ${isLive?'on':'off'}">${isLive?'● LIVE':'○ DRAFT'}</span>
                        ${confCls ? `<span class="badge-conf ${confCls}">${confLbl}</span>` : ''}
                    </div>
                    <div class="actions">
                        ${hasLink
                            ? `<a href="${esc(p.link)}" target="_blank" rel="noopener" class="link-btn">🌐 Buka Website</a>`
                            : `<span class="link-btn nolink">✕ Belum ada link</span>`
                        }
                        <button class="edit-btn" onclick="openEditModal(${p.id})">✏️ Edit</button>
                        <button class="edit-btn delete-btn" onclick="deleteProject(${p.id})">🗑️ Hapus</button>
                    </div>
                </div>
            `;
            }).join('');
        }

        // ─── EDIT MODAL ───
        function openEditModal(id) {
            const p = projects.find(x => x.id === id);
            if (!p) return;
            _editingId = id;

            const statusSel = document.getElementById('e-status');
            statusSel.innerHTML = STATUS_OPTIONS.map(s =>
                `<option value="${esc(s)}" ${p.status===s?'selected':''}>${esc(s)}</option>`
            ).join('');

            document.getElementById('edit-modal-title').textContent = `✏️ Edit: ${p.name || '—'}`;
            // Isi field nama
            document.getElementById('e-name').value = p.name || '';
            document.getElementById('e-tags').value = p.tags || '';
            document.getElementById('e-raisedid').value = p.RaisedID || '';
            document.getElementById('e-raisedn').value = p.RaisedEN || '';
            document.getElementById('e-descid').value = p.descriptionID || '';
            document.getElementById('e-descen').value = p.descriptionEN || '';
            document.getElementById('e-link').value = p.link || '';

            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            _editingId = null;
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function saveEdit() {
            if (!_editingId) return;

            const name = document.getElementById('e-name')?.value?.trim() || null;
            if (!name) {
                showToast('Nama proyek wajib diisi!', 'error');
                return;
            }

            const payload = {
                name,
                status: document.getElementById('e-status')?.value || null,
                tags: document.getElementById('e-tags')?.value?.trim() || null,
                RaisedID: document.getElementById('e-raisedid')?.value?.trim() || null,
                RaisedEN: document.getElementById('e-raisedn')?.value?.trim() || null,
                descriptionID: document.getElementById('e-descid')?.value?.trim() || null,
                descriptionEN: document.getElementById('e-descen')?.value?.trim() || null,
                link: document.getElementById('e-link')?.value?.trim() || null,
            };

            const btn = document.getElementById('btn-save-edit');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Menyimpan...';
            }

            try {
                const res = await fetch(`/api/admin-airdrop?id=${_editingId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                showToast('✓ Perubahan tersimpan!', 'success');
                closeEditModal();
                await loadProjects();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '💾 Simpan';
                }
            }
        }

        // ─── TAMBAH PROYEK ─────────────────────────────────────
        function openAddModal() {
            document.getElementById('a-name').value = '';
            document.getElementById('a-status').value = 'Active';
            document.getElementById('a-tags').value = '';
            document.getElementById('a-raisedid').value = '';
            document.getElementById('a-raisedn').value = '';
            document.getElementById('a-descid').value = '';
            document.getElementById('a-descen').value = '';
            document.getElementById('a-link').value = '';
            document.getElementById('add-modal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        async function saveAdd() {
            const name = document.getElementById('a-name').value.trim();
            if (!name) {
                showToast('Nama proyek wajib diisi!', 'error');
                return;
            }

            const payload = {
                name,
                status: document.getElementById('a-status').value || null,
                tags: document.getElementById('a-tags').value.trim() || null,
                RaisedID: document.getElementById('a-raisedid').value.trim() || null,
                RaisedEN: document.getElementById('a-raisedn').value.trim() || null,
                descriptionID: document.getElementById('a-descid').value.trim() || null,
                descriptionEN: document.getElementById('a-descen').value.trim() || null,
                link: document.getElementById('a-link').value.trim() || null,
            };

            const btn = document.getElementById('btn-save-add');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Menyimpan...';
            }

            try {
                const res = await fetch('/api/admin-airdrop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                showToast('✅ Proyek berhasil ditambahkan!', 'success');
                closeAddModal();
                await loadProjects();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Tambah';
                }
            }
        }

        // ─── HAPUS PROYEK ─────────────────────────────────────
        async function deleteProject(id) {
            if (!confirm('Yakin ingin menghapus proyek ini? Tindakan ini tidak dapat dibatalkan.')) return;
            try {
                const res = await fetch(`/api/admin-airdrop?id=${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                showToast('✅ Proyek berhasil dihapus', 'success');
                loadProjects();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        }

        // ─── CALCULATOR ───
        const CALC_KEYS = ['C', '←', '%', '/', '7', '8', '9', '*', '4', '5', '6', '-', '1', '2', '3', '+', '0', '.', '='];
        let _calcExpr = '';

        function buildCalcGrid() {
            const grid = document.getElementById('calc-grid');
            if (!grid) return;
            grid.innerHTML = CALC_KEYS.map(k => {
                const isOp = '/*-+='.includes(k);
                const isZero = k === '0';
                return `<button class="calc-key ${isOp?'op':''} ${isZero?'zero':''}" onclick="calcPress('${k==='←'?'back':k}')">${k}</button>`;
            }).join('');
        }

        function calcPress(key) {
            const disp = document.getElementById('calc-display');
            if (!disp) return;
            if (key === 'C') { _calcExpr = '';
                disp.value = '0'; return; }
            if (key === 'back') { _calcExpr = _calcExpr.slice(0, -1);
                disp.value = _calcExpr || '0'; return; }
            if (key === '=') {
                try {
                    if (!/^[0-9+\-*/.%\s]+$/.test(_calcExpr)) throw new Error();
                    const result = Function(`"use strict"; return (${_calcExpr})`)();
                    disp.value = String(result);
                    _calcExpr = String(result);
                } catch (e) { disp.value = 'Error';
                    _calcExpr = ''; }
                return;
            }
            _calcExpr += key;
            disp.value = _calcExpr;
        }

        function toggleCalc() {
            const panel = document.getElementById('calc-panel');
            if (!panel) return;
            panel.classList.toggle('hidden');
        }

        // ─── GOOGLE LOGIN ───
        const YOUR_CLIENT_ID = '1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com';

        async function handleCredentialResponse(response) {
            try {
                const res = await fetch('/api/verify-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential }),
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-content').classList.remove('hidden');
                } else {
                    alert(`Akses ditolak: ${result.message || 'Unauthorized'}`);
                    google.accounts.id.disableAutoSelect();
                }
            } catch (err) {
                alert('Verifikasi gagal. Coba lagi nanti.');
            }
        }

        // ─── INIT ───
        window.onload = function() {
            // Populate status selects
            const statusSelects = ['e-status', 'a-status'];
            statusSelects.forEach(id => {
                const sel = document.getElementById(id);
                if (sel) {
                    sel.innerHTML = STATUS_OPTIONS.map(s => `<option value="${s}">${s}</option>`).join('');
                }
            });

            google.accounts.id.initialize({
                client_id: YOUR_CLIENT_ID,
                callback: handleCredentialResponse,
            });
            google.accounts.id.renderButton(document.getElementById('g_id_onload'), {
                theme: 'outline',
                size: 'large',
                text: 'signin_with',
                shape: 'pill',
                logo_alignment: 'left',
            });
            google.accounts.id.prompt();

            buildCalcGrid();
            loadProjects();
        };
    </script>
