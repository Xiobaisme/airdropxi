<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — AirdropXI</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }
    :root {
      --bg:      #07090b;
      --s1:      #0d1117;
      --s2:      #111820;
      --s3:      #161e28;
      --border:  #1c2733;
      --border2: #243040;
      --accent:  #00e5a0;
      --adim:    rgba(0,229,160,0.08);
      --aborder: rgba(0,229,160,0.2);
      --blue:    #3b82f6;
      --warn:    #f59e0b;
      --red:     #ef4444;
      --rdim:    rgba(239,68,68,0.08);
      --text:    #dce8f0;
      --text2:   #8aa0b4;
      --text3:   #4a6070;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Plus Jakarta Sans', sans-serif;
      --r:       10px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.015) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }

    /* ── LOGIN SCREEN ── */
    #login-section {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem; text-align: center;
      max-width: 380px; width: 90%;
    }
    .login-logo {
      font-family: var(--mono); font-size: 1.4rem;
      color: var(--accent); font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .login-title {
      font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem;
    }
    .login-sub {
      font-size: 0.82rem; color: var(--text2); margin-bottom: 1.5rem;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,11,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      font-family: var(--mono); font-size: 0.82rem; font-weight: 700;
      color: var(--accent); text-decoration: none;
    }
    .nav-badge {
      font-family: var(--mono); font-size: 0.58rem; font-weight: 700;
      padding: 0.2rem 0.55rem;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 4px; color: var(--red); letter-spacing: 0.08em;
    }
    .nav-back {
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--text2); text-decoration: none; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }

    /* ── LAYOUT ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1120px; margin: 0 auto;
      padding: 1.5rem 1.25rem 5rem;
      display: grid; grid-template-columns: 270px 1fr; gap: 1.25rem;
    }
    @media (max-width: 768px) { .wrap { grid-template-columns: 1fr; } }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .panel {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .panel-head {
      display: flex; align-items: center; gap: 8px;
      padding: 0.8rem 1rem; border-bottom: 1px solid var(--border);
    }
    .ph-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
    }
    .ph-title {
      font-family: var(--mono); font-size: 0.62rem; color: var(--text3);
      letter-spacing: 0.1em; text-transform: uppercase; flex: 1;
    }
    .ph-count { font-family: var(--mono); font-size: 0.65rem; color: var(--accent); }

    .proj-list { max-height: 500px; overflow-y: auto; }
    .proj-list::-webkit-scrollbar { width: 3px; }
    .proj-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .proj-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s; gap: 8px;
    }
    .proj-item:last-child { border-bottom: none; }
    .proj-item:hover { background: var(--s2); }
    .proj-item.active { background: var(--adim); }
    .proj-item-name {
      font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .proj-item-status {
      font-family: var(--mono); font-size: 0.52rem;
      padding: 0.15rem 0.4rem; border-radius: 3px;
      white-space: nowrap; flex-shrink: 0;
    }
    .st-a { background: rgba(0,229,160,0.1); color: var(--accent); }
    .st-w { background: rgba(245,158,11,0.1); color: var(--warn); }
    .st-d { background: var(--s3); color: var(--text3); }

    .btn-new {
      width: 100%; padding: 0.7rem;
      background: var(--adim); border: 1px dashed var(--aborder);
      border-radius: 8px; color: var(--accent);
      font-family: var(--mono); font-size: 0.7rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn-new:hover { background: rgba(0,229,160,0.14); }

    /* ── FORM ── */
    .form-area { display: flex; flex-direction: column; gap: 1rem; }
    .form-panel {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }
    .form-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;
    }
    .form-title {
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .edit-badge {
      font-family: var(--mono); font-size: 0.58rem;
      padding: 0.2rem 0.5rem;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
      border-radius: 4px; color: var(--blue);
    }
    .form-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .form-sec { padding: 1.25rem; border-bottom: 1px solid var(--border); }
    .form-sec:last-child { border-bottom: none; }
    .sec-lbl {
      font-family: var(--mono); font-size: 0.58rem; color: var(--text3);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .fg.c3 { grid-template-columns: 1fr 1fr 1fr; }
    .fg.c1 { grid-template-columns: 1fr; }
    @media (max-width: 600px) { .fg, .fg.c3 { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.s2 { grid-column: span 2; }
    .field.s3 { grid-column: span 3; }

    label {
      font-family: var(--mono); font-size: 0.6rem; color: var(--text2);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    label .req { color: var(--red); margin-left: 2px; }
    label .hint { color: var(--text3); font-size: 0.54rem; margin-left: 4px; text-transform: none; letter-spacing: 0; }

    input, select, textarea {
      width: 100%; background: var(--s2);
      border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 0.76rem;
      padding: 0.58rem 0.75rem; outline: none;
      transition: border-color 0.2s; resize: vertical;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    select option { background: var(--s2); }
    textarea { min-height: 90px; line-height: 1.5; }
    textarea.tall { min-height: 130px; }

    /* Testnet links builder */
    .testnet-builder { display: flex; flex-direction: column; gap: 8px; }
    .testnet-row {
      display: grid; grid-template-columns: 1fr 2fr auto;
      gap: 8px; align-items: center;
    }
    .testnet-row input { margin: 0; }
    .btn-remove-testnet {
      width: 30px; height: 30px; border-radius: 6px;
      background: var(--rdim); border: 1px solid rgba(239,68,68,0.2);
      color: var(--red); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-remove-testnet:hover { background: rgba(239,68,68,0.15); }
    .btn-add-testnet {
      padding: 0.5rem 1rem;
      background: transparent; border: 1px dashed var(--border2);
      border-radius: 6px; color: var(--text2);
      font-family: var(--mono); font-size: 0.65rem;
      cursor: pointer; transition: all 0.2s; align-self: flex-start;
    }
    .btn-add-testnet:hover { border-color: var(--accent); color: var(--accent); }

    /* Buttons */
    .btn-save {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.62rem 1.4rem;
      background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.06em; border: none; border-radius: 6px;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-delete {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.62rem 1rem;
      background: var(--rdim); color: var(--red);
      font-family: var(--mono); font-size: 0.68rem;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.15); }

    .btn-cancel {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.62rem 1rem; background: transparent; color: var(--text2);
      font-family: var(--mono); font-size: 0.68rem;
      border: 1px solid var(--border2); border-radius: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: 0.75rem 1.25rem; border-radius: 8px;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
      z-index: 999; pointer-events: none;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--accent); color: #000; }
    .toast.error   { background: var(--red); color: #fff; }

    /* Empty & loading */
    .empty-form {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 380px; gap: 1rem; text-align: center;
    }
    .empty-icon { font-size: 2.5rem; }
    .empty-text { color: var(--text3); font-family: var(--mono); font-size: 0.72rem; line-height: 1.6; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .list-loading {
      padding: 2rem; text-align: center;
      font-family: var(--mono); font-size: 0.68rem; color: var(--text3);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-section">
  <div class="login-card">
    <div class="login-logo">⚡ AirdropXI</div>
    <div class="login-title">🔐 Admin Access</div>
    <div class="login-sub">Login dengan akun Google yang diizinkan.</div>
    <div id="g_id_onload"></div>
  </div>
</div>

<!-- ADMIN CONTENT -->
<div id="admin-content" class="hidden">
  <nav>
    <div class="nav-left">
      <a href="index.html" class="nav-logo">⚡ AirdropXI</a>
      <span class="nav-badge">ADMIN</span>
    </div>
    <a href="index.html" class="nav-back">← Dashboard</a>
  </nav>

  <div class="wrap">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="btn-new" onclick="newForm()">＋ Tambah Airdrop Baru</button>
      <div class="panel">
        <div class="panel-head">
          <div class="ph-dot"></div>
          <span class="ph-title">Semua Proyek</span>
          <span class="ph-count" id="proj-count">—</span>
        </div>
        <div class="proj-list" id="proj-list">
          <div class="list-loading"><div class="spinner"></div><span>Memuat...</span></div>
        </div>
      </div>
    </div>

    <!-- FORM AREA -->
    <div class="form-area" id="form-area">
      <div class="panel">
        <div class="empty-form">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Pilih proyek di kiri untuk edit,<br>atau klik "Tambah Airdrop Baru"</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  let projects = [];
  let editingId = null;

  // ── LOAD LIST ─────────────────────────────────────────
  async function loadProjects() {
    try {
      const res = await fetch('/api/admin-airdrop');
      if (!res.ok) throw new Error('Gagal fetch');
      projects = await res.json();
      renderList();
    } catch(e) {
      document.getElementById('proj-list').innerHTML =
        `<div class="list-loading" style="color:var(--red)">${e.message}</div>`;
    }
  }

  function renderList() {
    const list = document.getElementById('proj-list');
    document.getElementById('proj-count').textContent = projects.length;
    if (!projects.length) {
      list.innerHTML = '<div class="list-loading">Belum ada proyek.</div>';
      return;
    }
    list.innerHTML = projects.map(p => `
      <div class="proj-item ${editingId === p.id ? 'active' : ''}" onclick="loadEdit('${p.id}')">
        <span class="proj-item-name">${esc(p.name)}</span>
        <span class="proj-item-status ${getStCls(p.status)}">${esc(p.status || 'TBA')}</span>
      </div>
    `).join('');
  }

  function getStCls(s) {
    const l = (s||'').toLowerCase();
    if (l.includes('active')) return 'st-a';
    if (l.includes('wait'))   return 'st-w';
    return 'st-d';
  }

  function newForm()      { editingId = null; renderList(); renderForm(null); }
  function loadEdit(id)   { editingId = id;   renderList(); renderForm(projects.find(p => p.id === id)); }

  // ── RENDER FORM ───────────────────────────────────────
  function renderForm(data) {
    const d = data || {};
    const isEdit = !!data;

    // Parse testnet_links
    let testnetLinks = [];
    if (d.testnet_links) {
      try {
        testnetLinks = typeof d.testnet_links === 'string'
          ? JSON.parse(d.testnet_links)
          : (Array.isArray(d.testnet_links) ? d.testnet_links : []);
      } catch(e) { testnetLinks = []; }
    }

    document.getElementById('form-area').innerHTML = `
      <div class="form-panel">
        <div class="form-header">
          <div class="form-title">
            ${isEdit ? `✏️ Edit: ${esc(d.name)}` : '➕ Tambah Airdrop Baru'}
            ${isEdit ? '<span class="edit-badge">EDITING</span>' : ''}
          </div>
          <div class="form-actions">
            ${isEdit ? `<button class="btn-delete" onclick="deleteProject('${d.id}')">🗑 Hapus</button>` : ''}
            <button class="btn-cancel" onclick="cancelForm()">✕ Batal</button>
            <button class="btn-save" id="btn-save" onclick="saveForm()">
              ${isEdit ? '💾 Simpan' : '➕ Tambah'}
            </button>
          </div>
        </div>

        <!-- INFO DASAR -->
        <div class="form-sec">
          <div class="sec-lbl">Info Dasar</div>
          <div class="fg">
            <div class="field"><label>Nama Proyek <span class="req">*</span></label><input id="f-name" type="text" placeholder="e.g. Blockchain.com" value="${esc(d.name||'')}"></div>
            <div class="field"><label>Status <span class="req">*</span></label>
              <select id="f-status">
                ${['Active','Waitlist','Seed Round','Potential','Confirmed','Listing / Selesai'].map(s =>
                  `<option value="${s}" ${d.status===s?'selected':''}>${s}</option>`
                ).join('')}
              </select>
            </div>
            <div class="field"><label>Link Official</label><input id="f-link" type="url" placeholder="https://..." value="${esc(d.link||'')}"></div>
            <div class="field"><label>Tags <span class="hint">pisah koma</span></label><input id="f-tags" type="text" placeholder="DeFi, AI, Layer2" value="${esc(d.tags||'')}"></div>
          </div>
        </div>

        <!-- FUNDING -->
        <div class="form-sec">
          <div class="sec-lbl">Funding</div>
          <div class="fg">
            <div class="field"><label>Total Raised (ID) <span class="hint">e.g. $600 Juta</span></label><input id="f-raisedid" type="text" placeholder="$600 Juta" value="${esc(d.RaisedID||'')}"></div>
            <div class="field"><label>Total Raised (EN) <span class="hint">e.g. $600M</span></label><input id="f-raiseden" type="text" placeholder="$600M" value="${esc(d.RaisedEN||'')}"></div>
          </div>
        </div>

        <!-- DESKRIPSI -->
        <div class="form-sec">
          <div class="sec-lbl">Deskripsi Proyek</div>
          <div class="fg c1">
            <div class="field"><label>Deskripsi (ID)</label><textarea id="f-descid" class="tall" placeholder="Jelaskan proyek ini...">${esc(d.descriptionID||'')}</textarea></div>
            <div class="field"><label>Description (EN)</label><textarea id="f-descen" class="tall" placeholder="Describe this project...">${esc(d.descriptionEN||'')}</textarea></div>
          </div>
        </div>

        <!-- TUGAS / GUIDE STEPS -->
        <div class="form-sec">
          <div class="sec-lbl">Tugas / Guide Steps <span style="color:var(--text3);font-size:0.55rem;text-transform:none;letter-spacing:0;font-weight:400">— Format: "1. Judul | Deskripsi" per baris. Tips: mulai dengan "💡 teks tip"</span></div>
          <div class="fg c1">
            <div class="field"><label>Tugas (ID)</label><textarea id="f-tasksid" class="tall" placeholder="1. Daftar di website | Kunjungi https://... dan klik Sign Up&#10;2. Connect wallet | Hubungkan MetaMask kamu&#10;💡 Gunakan burner wallet untuk keamanan">${esc(d.tasksID||'')}</textarea></div>
            <div class="field"><label>Tasks (EN)</label><textarea id="f-tasksen" class="tall" placeholder="1. Register | Visit https://... and click Sign Up&#10;2. Connect wallet | Connect your MetaMask">${esc(d.tasksEN||'')}</textarea></div>
          </div>
        </div>

        <!-- TESTNET LINKS -->
        <div class="form-sec">
          <div class="sec-lbl">Testnet / Link Penting <span style="color:var(--text3);font-size:0.55rem;text-transform:none;letter-spacing:0;font-weight:400">— Maksimal 5 link. Akan tampil biru & clickable di halaman guide.</span></div>
          <div class="testnet-builder" id="testnet-builder">
            ${testnetLinks.map((t,i) => testnetRow(i, t.label||'', t.url||'')).join('')}
          </div>
          ${testnetLinks.length < 5 ? `<button class="btn-add-testnet" onclick="addTestnetRow()" style="margin-top:8px">＋ Tambah Link</button>` : ''}
          <div id="testnet-add-wrap" style="${testnetLinks.length >= 5 ? 'display:none' : 'display:block'}"></div>
        </div>

        <!-- FAQ -->
        <div class="form-sec">
          <div class="sec-lbl">FAQ <span style="color:var(--text3);font-size:0.55rem;text-transform:none;letter-spacing:0;font-weight:400">— Format: "Q: pertanyaan | A: jawaban" (satu baris per Q&A)</span></div>
          <div class="fg c1">
            <div class="field"><label>FAQ (ID)</label><textarea id="f-faqid" class="tall" placeholder="Q: Apa itu airdrop ini? | A: Program distribusi token gratis.&#10;Q: Kapan token dibagikan? | A: Setelah TGE di Q3 2025.">${esc(d.faqID||'')}</textarea></div>
            <div class="field"><label>FAQ (EN)</label><textarea id="f-faqen" class="tall" placeholder="Q: What is this? | A: A free token distribution program.">${esc(d.faqEN||'')}</textarea></div>
          </div>
        </div>

        <!-- TOKENOMICS -->
        <div class="form-sec">
          <div class="sec-lbl">Tokenomics</div>
          <div class="fg c3">
            <div class="field"><label>Ticker</label><input id="f-ticker" type="text" placeholder="$BLC" value="${esc(d.ticker||'')}"></div>
            <div class="field"><label>Total Supply</label><input id="f-supply" type="text" placeholder="1,000,000,000" value="${esc(d.total_supply||'')}"></div>
            <div class="field"><label>Network</label><input id="f-network" type="text" placeholder="Ethereum / Solana" value="${esc(d.network||'')}"></div>
            <div class="field"><label>TGE / Listing Date</label><input id="f-tge" type="text" placeholder="Q3 2026 / TBA" value="${esc(d.tge_date||'')}"></div>
            <div class="field"><label>Logo URL</label><input id="f-logo" type="url" placeholder="https://..." value="${esc(d.logo_url||'')}"></div>
          </div>
        </div>

        <!-- SOSIAL MEDIA -->
        <div class="form-sec">
          <div class="sec-lbl">Sosial Media</div>
          <div class="fg">
            <div class="field"><label>Twitter / X</label><input id="f-twitter" type="url" placeholder="https://x.com/..." value="${esc(d.twitter||'')}"></div>
            <div class="field"><label>Discord</label><input id="f-discord" type="url" placeholder="https://discord.gg/..." value="${esc(d.discord||'')}"></div>
            <div class="field"><label>Telegram</label><input id="f-telegram" type="url" placeholder="https://t.me/..." value="${esc(d.telegram||'')}"></div>
          </div>
        </div>

        <!-- BOTTOM ACTIONS -->
        <div class="form-sec">
          <div class="form-actions">
            <button class="btn-save" id="btn-save-bottom" onclick="saveForm()">
              ${isEdit ? '💾 Simpan Perubahan' : '➕ Tambah Proyek'}
            </button>
            ${isEdit ? `<button class="btn-delete" onclick="deleteProject('${d.id}')">🗑 Hapus Proyek</button>` : ''}
          </div>
        </div>
      </div>
    `;

    // Tambah row pertama kalau kosong
    if (!testnetLinks.length) {
      const builder = document.getElementById('testnet-builder');
      if (builder) builder.innerHTML = testnetRow(0,'','');
    }
  }

  function testnetRow(i, label, url) {
    return `
      <div class="testnet-row" id="trow-${i}">
        <input type="text" placeholder="Label (e.g. Testnet App)" value="${esc(label)}" class="tnet-label">
        <input type="url"  placeholder="https://..." value="${esc(url)}" class="tnet-url">
        <button class="btn-remove-testnet" onclick="removeTestnetRow(${i})" title="Hapus">✕</button>
      </div>
    `;
  }

  function addTestnetRow() {
    const builder = document.getElementById('testnet-builder');
    if (!builder) return;
    const rows = builder.querySelectorAll('.testnet-row');
    if (rows.length >= 5) return;
    const i = Date.now(); // unique id
    builder.insertAdjacentHTML('beforeend', testnetRow(i,'',''));
  }

  function removeTestnetRow(i) {
    const row = document.getElementById(`trow-${i}`);
    if (row) row.remove();
  }

  function getTestnetLinks() {
    const builder = document.getElementById('testnet-builder');
    if (!builder) return null;
    const rows = builder.querySelectorAll('.testnet-row');
    const links = [];
    rows.forEach(row => {
      const label = row.querySelector('.tnet-label')?.value?.trim() || '';
      const url   = row.querySelector('.tnet-url')?.value?.trim()   || '';
      if (url) links.push({ label: label || url, url });
    });
    return links.length ? JSON.stringify(links) : null;
  }

  function cancelForm() {
    editingId = null;
    renderList();
    document.getElementById('form-area').innerHTML = `
      <div class="panel">
        <div class="empty-form">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Pilih proyek di kiri untuk edit,<br>atau klik "Tambah Airdrop Baru"</div>
        </div>
      </div>`;
  }

  // ── SAVE ──────────────────────────────────────────────
  async function saveForm() {
    const name = document.getElementById('f-name')?.value?.trim();
    if (!name) { showToast('Nama proyek wajib diisi!', 'error'); return; }

    const payload = {
      name,
      status:        document.getElementById('f-status')?.value,
      link:          document.getElementById('f-link')?.value?.trim()    || null,
      tags:          document.getElementById('f-tags')?.value?.trim()    || null,
      RaisedID:      document.getElementById('f-raisedid')?.value?.trim()|| null,
      RaisedEN:      document.getElementById('f-raiseden')?.value?.trim()|| null,
      tasksID:       document.getElementById('f-tasksid')?.value?.trim() || null,
      tasksEN:       document.getElementById('f-tasksen')?.value?.trim() || null,
      descriptionID: document.getElementById('f-descid')?.value?.trim()  || null,
      descriptionEN: document.getElementById('f-descen')?.value?.trim()  || null,
      ticker:        document.getElementById('f-ticker')?.value?.trim()  || null,
      total_supply:  document.getElementById('f-supply')?.value?.trim()  || null,
      network:       document.getElementById('f-network')?.value?.trim() || null,
      tge_date:      document.getElementById('f-tge')?.value?.trim()     || null,
      logo_url:      document.getElementById('f-logo')?.value?.trim()    || null,
      twitter:       document.getElementById('f-twitter')?.value?.trim() || null,
      discord:       document.getElementById('f-discord')?.value?.trim() || null,
      telegram:      document.getElementById('f-telegram')?.value?.trim()|| null,
      faqID:         document.getElementById('f-faqid')?.value?.trim()   || null,
      faqEN:         document.getElementById('f-faqen')?.value?.trim()   || null,
      testnet_links: getTestnetLinks(),
    };

    // Disable buttons
    ['btn-save','btn-save-bottom'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.disabled = true; el.innerHTML = '<span class="spinner"></span> Menyimpan...'; }
    });

    try {
      let res;
      if (editingId) {
        res = await fetch(`/api/admin-airdrop?id=${editingId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      } else {
        res = await fetch('/api/admin-airdrop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      }

      const result = await res.json();
      if (!res.ok) throw new Error(result.error || JSON.stringify(result));

      showToast(editingId ? '✓ Berhasil diupdate!' : '✓ Proyek ditambahkan!', 'success');
      await loadProjects();

      if (!editingId && Array.isArray(result) && result[0]) {
        editingId = result[0].id;
        renderList();
        renderForm(result[0]);
      } else if (editingId) {
        const updated = projects.find(p => p.id === editingId);
        if (updated) renderForm(updated);
      }
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
      ['btn-save','btn-save-bottom'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.disabled = false;
          el.innerHTML = editingId ? '💾 Simpan' : '➕ Tambah';
        }
      });
    }
  }

  // ── DELETE ─────────────────────────────────────────────
  async function deleteProject(id) {
    const p = projects.find(x => x.id === id);
    if (!confirm(`Hapus "${p?.name || id}"?\nTindakan ini tidak bisa dibatalkan.`)) return;
    try {
      const res = await fetch(`/api/admin-airdrop?id=${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Gagal hapus');
      showToast('✓ Proyek dihapus', 'success');
      editingId = null;
      await loadProjects();
      cancelForm();
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    }
  }

  // ── TOAST ──────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(s) {
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadProjects();
</script>

<!-- GOOGLE LOGIN SCRIPT -->
<script>
  const YOUR_CLIENT_ID = '1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com';

  async function handleCredentialResponse(response) {
    try {
      const res = await fetch('/api/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential }),
      });
      const result = await res.json();
      if (res.ok && result.success) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').classList.remove('hidden');
      } else {
        alert(`Akses ditolak: ${result.message || 'Unauthorized'}`);
        google.accounts.id.disableAutoSelect();
      }
    } catch(err) {
      alert('Verifikasi gagal. Coba lagi nanti.');
    }
  }

  window.onload = function() {
    google.accounts.id.initialize({
      client_id: YOUR_CLIENT_ID,
      callback: handleCredentialResponse,
    });
    google.accounts.id.renderButton(
      document.getElementById('g_id_onload'),
      { theme: 'outline', size: 'large' }
    );
    google.accounts.id.prompt();
  };
</script>
