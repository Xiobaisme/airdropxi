<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — AirdropXI</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }
    :root {
      --bg:      #07090b;
      --s1:      #0d1117;
      --s2:      #111820;
      --s3:      #161e28;
      --border:  #1c2733;
      --border2: #243040;
      --accent:  #00e5a0;
      --adim:    rgba(0,229,160,0.08);
      --aborder: rgba(0,229,160,0.2);
      --blue:    #3b82f6;
      --cyan:    #00c8f0;
      --purple:  #7c6dfa;
      --warn:    #f59e0b;
      --red:     #ef4444;
      --text:    #dce8f0;
      --text2:   #8aa0b4;
      --text3:   #4a6070;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Plus Jakarta Sans', sans-serif;
      --r:       10px;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.015) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }

    #login-section {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center; background: var(--bg);
      overflow: hidden;
    }
    .login-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem; text-align: center; max-width: 380px; width: 90%;
      animation: loginFadeIn 0.8s ease forwards; position: relative; z-index: 1;
    }
    @keyframes loginFadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .login-logo { font-family: var(--mono); font-size: 1.4rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; }
    .login-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .login-sub { font-size: 0.82rem; color: var(--text2); margin-bottom: 1.5rem; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,11,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .nav-badge {
      font-family: var(--mono); font-size: 0.58rem; font-weight: 700; padding: 0.2rem 0.55rem;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 4px; color: var(--red); letter-spacing: 0.08em;
    }

    /* filter tabs (reused inside Project Links section) */
    .ftab {
      font-family: var(--mono); font-size: 0.54rem; padding: 0.22rem 0.6rem; border-radius: 4px;
      cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text3);
      transition: all 0.15s; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .ftab:hover { border-color: var(--border2); color: var(--text2); }
    .ftab.active { background: var(--adim); border-color: var(--aborder); color: var(--accent); }

    /* status / live / confirm badges (used inside project link cards) */
    .proj-item-status { font-family: var(--mono); font-size: 0.5rem; padding: 0.12rem 0.42rem; border-radius: 3px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
    .st-a { background: rgba(0,229,160,0.1);  color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
    .st-w { background: rgba(245,158,11,0.1); color: var(--warn);   border: 1px solid rgba(245,158,11,0.2); }
    .st-s { background: rgba(59,130,246,0.1); color: var(--blue);   border: 1px solid rgba(59,130,246,0.2); }
    .st-c { background: rgba(0,200,240,0.1);  color: var(--cyan);   border: 1px solid rgba(0,200,240,0.2); }
    .st-p { background: rgba(124,109,250,0.1);color: var(--purple); border: 1px solid rgba(124,109,250,0.2); }
    .st-d { background: var(--s3); color: var(--text3); border: 1px solid var(--border); }
    .live-dot { font-family: var(--mono); font-size: 0.48rem; padding: 0.1rem 0.38rem; border-radius: 3px; }
    .live-dot.on  { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
    .live-dot.off { background: var(--s3); color: var(--text3); border: 1px solid var(--border); }
    .conf-badge { font-family: var(--mono); font-size: 0.46rem; padding: 0.1rem 0.38rem; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
    .conf-badge.confirmed { background: rgba(0,200,240,0.1);   color: var(--cyan);   border: 1px solid rgba(0,200,240,0.2); }
    .conf-badge.potential { background: rgba(124,109,250,0.1); color: var(--purple); border: 1px solid rgba(124,109,250,0.2); }
    .conf-badge.ended     { background: rgba(100,100,100,0.1); color: var(--text3);  border: 1px solid rgba(100,100,100,0.2); }

    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 2000;
      background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1.25rem; font-size: 0.8rem; color: var(--text);
      font-family: var(--mono); opacity: 0; transform: translateY(100px);
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show    { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.success { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.08); color: var(--accent); }
    .toast.error   { border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.08);  color: var(--red); }
  </style>
</head>
<body>

<div id="login-section">
  <canvas id="login-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;"></canvas>
  <div class="login-card">
    <div class="login-logo">AirdropXI</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Login dengan Google untuk akses</div>
    <div id="g_id_onload"
      data-client_id="1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com"
      data-callback="handleCredentialResponse">
    </div>
  </div>
</div>

<div id="admin-content" class="hidden">
  <nav>
    <div class="nav-left">
      <a href="#" class="nav-logo">AirdropXI</a>
      <span class="nav-badge">ADMIN</span>
    </div>
  </nav>

  <!-- ── PROJECT LINKS SECTION (only feature kept) ── -->
  <div id="proj-links-section" style="position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:1.25rem 1.25rem 4rem;">
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;">

      <!-- Header -->
      <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border);
                  background:linear-gradient(105deg,rgba(0,200,240,0.04),transparent);
                  display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--cyan);
                     box-shadow:0 0 8px var(--cyan);flex-shrink:0;display:inline-block"></span>
        <div style="flex:1">
          <div style="font-family:var(--mono);font-size:0.55rem;color:var(--text3);
                      letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.2rem">
            🔗 Project Links — Admin Only
          </div>
          <div style="font-size:0.92rem;font-weight:700">
            Quick Access — Website Resmi Project
          </div>
        </div>
        <span style="font-family:var(--mono);font-size:0.65rem;color:var(--cyan)" id="proj-links-count">0</span>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:4px;padding:10px 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;">
        <button class="ftab active" id="plf-all"       onclick="setPLFilter('all',this)">Semua</button>
        <button class="ftab"        id="plf-active"    onclick="setPLFilter('active',this)">Active</button>
        <button class="ftab"        id="plf-waitlist"  onclick="setPLFilter('waitlist',this)">Waitlist</button>
        <button class="ftab"        id="plf-ended"     onclick="setPLFilter('ended',this)">Ended</button>
        <button class="ftab"        id="plf-confirmed" onclick="setPLFilter('confirmed',this)">Confirmed</button>
        <button class="ftab"        id="plf-potential" onclick="setPLFilter('potential',this)">Potential</button>
        <button class="ftab"        id="plf-haslink"   onclick="setPLFilter('haslink',this)"
                style="border-color:rgba(0,229,160,0.2);color:var(--accent)">✓ Ada Link</button>
        <button class="ftab"        id="plf-nolink"    onclick="setPLFilter('nolink',this)"
                style="border-color:rgba(239,68,68,0.2);color:var(--red)">✕ No Link</button>
      </div>

      <!-- Grid cards -->
      <div id="proj-links-list" style="padding:1.25rem;
           display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">
        <div style="font-family:var(--mono);font-size:0.65rem;color:var(--text3);
                    grid-column:1/-1;text-align:center;padding:2rem">Loading...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ── STATE ─────────────────────────────────────────────
  let projects  = [];
  let _plFilter = 'all';

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getStCls(s) {
    const l = (s||'').toLowerCase();
    if (l.includes('active') || l.includes('mainnet')) return 'st-a';
    if (l.includes('wait'))       return 'st-w';
    if (l.includes('season'))     return 'st-s';
    if (l.includes('confirmed') || l.includes('testnet')) return 'st-c';
    if (l.includes('potential'))  return 'st-p';
    return 'st-d';
  }
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  // ── LOAD PROJECTS ─────────────────────────────────────
  async function loadProjects() {
    try {
      const res = await fetch('/api/admin-airdrop');
      if (!res.ok) throw new Error('Gagal fetch');
      projects = await res.json();
      renderProjectLinks();
    } catch(e) {
      const list = document.getElementById('proj-links-list');
      if (list) list.innerHTML = `<div style="font-family:var(--mono);font-size:0.65rem;color:var(--red);grid-column:1/-1;text-align:center;padding:2rem">${esc(e.message)}</div>`;
    }
  }

  // ── PROJECT LINKS ──────────────────────────────────────
  function setPLFilter(mode, btn) {
    _plFilter = mode;
    document.querySelectorAll('#proj-links-section .ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderProjectLinks();
  }

  function renderProjectLinks() {
    const list  = document.getElementById('proj-links-list');
    const count = document.getElementById('proj-links-count');
    if (!list) return;

    let filtered = [...projects];
    if (_plFilter === 'active')    filtered = filtered.filter(p => (p.status||'').toLowerCase().includes('active'));
    if (_plFilter === 'waitlist')  filtered = filtered.filter(p => (p.status||'').toLowerCase().includes('wait'));
    if (_plFilter === 'ended')     filtered = filtered.filter(p => (p.status||'').toLowerCase().includes('end') || (p.confirmation_status||'').toLowerCase().includes('ended'));
    if (_plFilter === 'confirmed') filtered = filtered.filter(p => (p.confirmation_status||'').toLowerCase().includes('confirmed'));
    if (_plFilter === 'potential') filtered = filtered.filter(p => (p.confirmation_status||'').toLowerCase().includes('potential'));
    if (_plFilter === 'nolink')    filtered = filtered.filter(p => !p.website_url);
    if (_plFilter === 'haslink')   filtered = filtered.filter(p => !!p.website_url);

    if (count) count.textContent = `${filtered.length}/${projects.length}`;

    if (!filtered.length) {
      list.innerHTML = `<div style="font-family:var(--mono);font-size:0.65rem;color:var(--text3);grid-column:1/-1;text-align:center;padding:2rem">Tidak ada proyek.</div>`;
      return;
    }

    list.innerHTML = filtered.map(p => {
      const hasLink = !!(p.website_url);
      const isLive  = p.published === true;
      const confVal = (p.confirmation_status||'').toLowerCase();
      const confCls = confVal.includes('confirmed') ? 'confirmed' : confVal.includes('potential') ? 'potential' : confVal.includes('ended') ? 'ended' : '';
      const confLbl = confVal.includes('confirmed') ? '✓ Conf' : confVal.includes('potential') ? '◈ Pot' : confVal.includes('ended') ? '✕ End' : '';

      return `
        <div style="background:var(--s2);border:1px solid ${hasLink?'var(--border2)':'rgba(239,68,68,0.15)'};
                    border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;
                    transition:border-color 0.2s;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);
                        background:var(--s3);display:flex;align-items:center;justify-content:center;
                        overflow:hidden;flex-shrink:0;font-size:1rem;">
              ${p.logo_url ? `<img src="${esc(p.logo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:7px" onerror="this.parentElement.innerHTML='🪂'">` : '🪂'}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
              <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;align-items:center;">
                <span class="proj-item-status ${getStCls(p.status)}">${esc(p.status||'TBA')}</span>
                <span class="live-dot ${isLive?'on':'off'}">${isLive?'● LIVE':'○ DRAFT'}</span>
                ${confCls ? `<span class="conf-badge ${confCls}">${confLbl}</span>` : ''}
              </div>
            </div>
          </div>
          ${hasLink
            ? `<a href="${esc(p.website_url)}" target="_blank" rel="noopener"
                  style="display:flex;align-items:center;justify-content:center;gap:6px;padding:0.5rem;
                         border-radius:6px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);
                         color:var(--accent);font-family:var(--mono);font-size:0.6rem;text-decoration:none;font-weight:700">
                🌐 Buka Website</a>`
            : `<div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:0.5rem;
                           border-radius:6px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);
                           color:var(--red);font-family:var(--mono);font-size:0.6rem;font-weight:700;">
                 ✕ Belum ada link</div>`}
        </div>`;
    }).join('');
  }

  // ── LOGIN PARTICLE CANVAS ─────────────────────────────
  (function initLoginParticles() {
    const canvas = document.getElementById('login-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const COLORS = ['#00e5a0','#00c8f0','#7c6dfa','#3b82f6'];
    const PARTICLE_COUNT = 80;
    let particles = [];
    let W, H, animId;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function randBetween(a, b) { return a + Math.random() * (b - a); }
    function createParticle() {
      return {
        x: randBetween(0, W), y: randBetween(0, H), r: randBetween(0.8, 2.5),
        vx: randBetween(-0.25, 0.25), vy: randBetween(-0.4, -0.1),
        alpha: randBetween(0.2, 0.8), color: COLORS[Math.floor(Math.random() * COLORS.length)],
        pulse: randBetween(0, Math.PI * 2),
      };
    }
    function init() { resize(); particles = Array.from({ length: PARTICLE_COUNT }, createParticle); }
    function drawHexagon(x, y, size) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const px = x + size * Math.cos(angle), py = y + size * Math.sin(angle);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
    }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0,229,160,${0.06 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      particles.forEach(p => {
        p.pulse += 0.02;
        const pulsedAlpha = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
        const pulsedR = p.r * (0.9 + 0.2 * Math.sin(p.pulse));
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pulsedR * 4);
        grd.addColorStop(0, p.color + Math.round(pulsedAlpha * 255).toString(16).padStart(2,'0'));
        grd.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(p.x, p.y, pulsedR * 4, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
        ctx.fillStyle = p.color + Math.round(pulsedAlpha * 255).toString(16).padStart(2,'0');
        if (p.r > 1.8) { drawHexagon(p.x, p.y, pulsedR * 1.5); ctx.fill(); }
        else { ctx.beginPath(); ctx.arc(p.x, p.y, pulsedR, 0, Math.PI * 2); ctx.fill(); }
        p.x += p.vx; p.y += p.vy;
        if (p.y < -10) { p.y = H + 5; p.x = randBetween(0, W); }
        if (p.x < -10) p.x = W + 5;
        if (p.x > W + 10) p.x = -5;
      });
      animId = requestAnimationFrame(draw);
    }
    function stopParticles() { if (animId) cancelAnimationFrame(animId); }
    init(); draw();
    window.addEventListener('resize', () => { resize(); });
    window._stopLoginParticles = stopParticles;
  })();

  loadProjects();
</script>

<script>
  const YOUR_CLIENT_ID = '1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com';

  async function handleCredentialResponse(response) {
    try {
      const res = await fetch('/api/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential }),
      });
      const result = await res.json();
      if (res.ok && result.success) {
        document.getElementById('login-section').style.display = 'none';
        if (window._stopLoginParticles) window._stopLoginParticles();
        document.getElementById('admin-content').classList.remove('hidden');
      } else {
        alert(`Akses ditolak: ${result.message || 'Unauthorized'}`);
        google.accounts.id.disableAutoSelect();
      }
    } catch(err) {
      alert('Verifikasi gagal. Coba lagi nanti.');
    }
  }

  window.onload = function() {
    google.accounts.id.initialize({ client_id: YOUR_CLIENT_ID, callback: handleCredentialResponse });
    google.accounts.id.renderButton(document.getElementById('g_id_onload'), { theme: 'outline', size: 'large' });
    google.accounts.id.prompt();
  };
</script>

</body>
</html>
