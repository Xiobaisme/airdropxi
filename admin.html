<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — AirdropXI</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }
    :root {
      --bg:      #07090b;
      --s1:      #0d1117;
      --s2:      #111820;
      --s3:      #161e28;
      --border:  #1c2733;
      --border2: #243040;
      --accent:  #00e5a0;
      --adim:    rgba(0,229,160,0.08);
      --aborder: rgba(0,229,160,0.2);
      --blue:    #3b82f6;
      --cyan:    #00c8f0;
      --purple:  #7c6dfa;
      --warn:    #f59e0b;
      --red:     #ef4444;
      --text:    #dce8f0;
      --text2:   #8aa0b4;
      --text3:   #4a6070;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Plus Jakarta Sans', sans-serif;
      --r:       10px;
    }

    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.015) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }

    /* ── LOGIN ── */
    #login-section {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center; background: var(--bg);
    }
    .login-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem; text-align: center; max-width: 380px; width: 90%;
    }
    .login-logo { font-family: var(--mono); font-size: 1.4rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; }
    .login-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .login-sub { font-size: 0.82rem; color: var(--text2); margin-bottom: 1.5rem; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,9,11,0.92); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 52px; padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo { font-family: var(--mono); font-size: 0.82rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .nav-badge {
      font-family: var(--mono); font-size: 0.58rem; font-weight: 700; padding: 0.2rem 0.55rem;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 4px; color: var(--red); letter-spacing: 0.08em;
    }

    /* ── LAYOUT ── */
    .wrap {
      position: relative; z-index: 1; max-width: 1160px; margin: 0 auto;
      padding: 1.25rem 1.25rem 5rem;
      display: grid; grid-template-columns: 290px 1fr; gap: 1.25rem;
    }
    @media (max-width: 800px) { .wrap { grid-template-columns: 1fr; } }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 0.875rem; }

    /* ── STATS STRIP ── */
    .stats-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-card {
      background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); }
    .stat-label { font-family: var(--mono); font-size: 0.5rem; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }
    .stat-value { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; }
    .stat-value.green { color: var(--accent); }
    .stat-value.blue  { color: var(--blue); }
    .stat-value.warn  { color: var(--warn); }
    .stat-value.cyan  { color: var(--cyan); }

    /* ── SEARCH ── */
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 0.75rem; pointer-events: none; }
    #search-input {
      width: 100%; background: var(--s1); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 0.72rem;
      padding: 0.55rem 0.75rem 0.55rem 2rem; outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text3); }
    .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text3); cursor: pointer;
      font-size: 0.65rem; padding: 3px 5px; border-radius: 4px; transition: color 0.15s; display: none;
    }
    .search-clear:hover { color: var(--text); }
    .search-clear.visible { display: block; }

    /* ── FILTER TABS ── */
    .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .ftab {
      font-family: var(--mono); font-size: 0.54rem; padding: 0.22rem 0.6rem; border-radius: 4px;
      cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text3);
      transition: all 0.15s; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .ftab:hover { border-color: var(--border2); color: var(--text2); }
    .ftab.active { background: var(--adim); border-color: var(--aborder); color: var(--accent); }
    .ftab.active.draft { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); color: var(--warn); }

    /* ── PANEL ── */
    .panel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .panel-head { display: flex; align-items: center; gap: 8px; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
    .ph-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); flex-shrink: 0; }
    .ph-title { font-family: var(--mono); font-size: 0.6rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
    .ph-count { font-family: var(--mono); font-size: 0.65rem; color: var(--accent); }

    /* ── PROJECT LIST ── */
    .proj-list { max-height: 440px; overflow-y: auto; }
    .proj-list::-webkit-scrollbar { width: 3px; }
    .proj-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .proj-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 0.65rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s; gap: 8px;
    }
    .proj-item:last-child { border-bottom: none; }
    .proj-item:hover { background: var(--s2); }
    .proj-item.active { background: var(--adim); border-left: 2px solid var(--accent); }
    .proj-item-info { flex: 1; min-width: 0; }
    .proj-item-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .proj-item-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .proj-item-status { font-family: var(--mono); font-size: 0.5rem; padding: 0.12rem 0.42rem; border-radius: 3px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
    .st-a { background: rgba(0,229,160,0.1);  color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
    .st-w { background: rgba(245,158,11,0.1); color: var(--warn);   border: 1px solid rgba(245,158,11,0.2); }
    .st-s { background: rgba(59,130,246,0.1); color: var(--blue);   border: 1px solid rgba(59,130,246,0.2); }
    .st-c { background: rgba(0,200,240,0.1);  color: var(--cyan);   border: 1px solid rgba(0,200,240,0.2); }
    .st-p { background: rgba(124,109,250,0.1);color: var(--purple); border: 1px solid rgba(124,109,250,0.2); }
    .st-d { background: var(--s3); color: var(--text3); border: 1px solid var(--border); }
    .live-dot { font-family: var(--mono); font-size: 0.48rem; padding: 0.1rem 0.38rem; border-radius: 3px; }
    .live-dot.on  { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
    .live-dot.off { background: var(--s3); color: var(--text3); border: 1px solid var(--border); }
    .conf-badge { font-family: var(--mono); font-size: 0.46rem; padding: 0.1rem 0.38rem; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
    .conf-badge.confirmed { background: rgba(0,200,240,0.1);   color: var(--cyan);   border: 1px solid rgba(0,200,240,0.2); }
    .conf-badge.potential { background: rgba(124,109,250,0.1); color: var(--purple); border: 1px solid rgba(124,109,250,0.2); }
    .conf-badge.ended     { background: rgba(100,100,100,0.1); color: var(--text3);  border: 1px solid rgba(100,100,100,0.2); }
    .list-empty { padding: 2rem 1rem; text-align: center; font-family: var(--mono); font-size: 0.65rem; color: var(--text3); }

    /* ── SHARE PILL ── */
    .share-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 0.12rem 0.5rem; background: rgba(24,119,242,0.1);
      border: 1px solid rgba(24,119,242,0.25); border-radius: 3px;
      color: #5b9cf6; font-family: var(--mono); font-size: 0.48rem;
      cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .share-pill:hover { background: rgba(24,119,242,0.22); color: #89b8ff; }

    .btn-new {
      width: 100%; padding: 0.7rem;
      background: var(--adim); border: 1px dashed var(--aborder);
      border-radius: 8px; color: var(--accent); font-family: var(--mono); font-size: 0.7rem;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
    }
    .btn-new:hover { background: rgba(0,229,160,0.14); }

    /* ── DRAFTS ── */
    .drafts-section { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .drafts-head {
      display: flex; align-items: center; gap: 8px; padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(245,158,11,0.04), transparent);
    }
    .drafts-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 6px var(--warn); flex-shrink: 0; }
    .draft-item {
      display: flex; align-items: center; gap: 10px; padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
    }
    .draft-item:last-child { border-bottom: none; }
    .draft-item:hover { background: var(--s2); }
    .draft-item-icon { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border2); background: var(--s3); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .draft-item-icon img { width: 100%; height: 100%; object-fit: cover; }
    .draft-item-info { flex: 1; min-width: 0; }
    .draft-item-name { font-size: 0.76rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .draft-item-sub { font-family: var(--mono); font-size: 0.5rem; color: var(--text3); margin-top: 2px; }

    /* ── FORM AREA ── */
    .form-area { display: flex; flex-direction: column; gap: 1rem; }
    .form-panel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
    .form-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;
      background: linear-gradient(105deg, rgba(0,229,160,0.03) 0%, transparent 60%);
    }
    .form-title { font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .edit-badge {
      font-family: var(--mono); font-size: 0.58rem; padding: 0.2rem 0.5rem;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25); border-radius: 4px; color: var(--blue);
    }
    .form-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-sec { padding: 1.25rem; border-bottom: 1px solid var(--border); }
    .form-sec:last-child { border-bottom: none; }
    .sec-lbl {
      font-family: var(--mono); font-size: 0.58rem; color: var(--text3);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
    }
    .sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; }
    .fg.c3 { grid-template-columns: 1fr 1fr 1fr; }
    .fg.c1 { grid-template-columns: 1fr; }
    @media (max-width: 600px) { .fg, .fg.c3 { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.s2 { grid-column: span 2; }
    label { font-family: var(--mono); font-size: 0.6rem; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; }
    label .req { color: var(--red); margin-left: 2px; }
    label .hint { color: var(--text3); font-size: 0.54rem; margin-left: 4px; text-transform: none; letter-spacing: 0; }
    input, select, textarea {
      width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 0.76rem;
      padding: 0.58rem 0.75rem; outline: none; transition: border-color 0.2s; resize: vertical;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    select option { background: var(--s2); }
    textarea { min-height: 90px; line-height: 1.5; }
    textarea.tall { min-height: 130px; }

    /* ── CONFIRM PICKER ── */
    .confirm-picker { display: flex; gap: 6px; }
    .confirm-opt {
      flex: 1; padding: 0.55rem 0.5rem; border-radius: 6px; border: 1px solid var(--border2);
      background: var(--s2); color: var(--text3); font-family: var(--mono); font-size: 0.62rem;
      font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s; letter-spacing: 0.04em;
    }
    .confirm-opt:hover { border-color: var(--border); }
    .confirm-opt.selected          { background: rgba(0,229,160,0.12);   border-color: var(--accent); color: var(--accent); }
    .confirm-opt.selected.potential{ background: rgba(124,109,250,0.12); border-color: var(--purple); color: var(--purple); }
    .confirm-opt.selected.confirmed{ background: rgba(0,200,240,0.12);   border-color: var(--cyan);   color: var(--cyan); }
    .confirm-opt.selected.ended    { background: rgba(100,100,100,0.12); border-color: var(--text3);  color: var(--text3); }

    /* ── BUTTONS ── */
    .btn-save, .btn-delete, .btn-cancel, .btn-upload-logo, .btn-clear-logo,
    .btn-add-testnet, .btn-add-roadmap, .btn-remove-testnet, .btn-remove-roadmap, .btn-fb {
      padding: 0.52rem 0.9rem; border-radius: 6px; border: 1px solid var(--border2);
      background: var(--s2); color: var(--text); font-family: var(--mono); font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-weight: 600; white-space: nowrap;
    }
    .btn-save    { background: var(--adim); border-color: var(--aborder); color: var(--accent); }
    .btn-save:hover { background: rgba(0,229,160,0.14); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-delete  { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: var(--red); }
    .btn-delete:hover { background: rgba(239,68,68,0.15); }
    .btn-cancel  { background: transparent; border-color: var(--border); color: var(--text2); }
    .btn-cancel:hover { border-color: var(--border2); color: var(--text); }
    .btn-upload-logo, .btn-clear-logo { padding: 0.4rem 0.7rem; font-size: 0.6rem; }
    .btn-add-testnet, .btn-add-roadmap { width: 100%; background: var(--adim); border-color: var(--aborder); color: var(--accent); }
    .btn-add-testnet:hover, .btn-add-roadmap:hover { background: rgba(0,229,160,0.14); }
    .btn-remove-testnet, .btn-remove-roadmap { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: var(--red); padding: 0.3rem 0.6rem; font-size: 0.58rem; }
    .btn-fb { background: rgba(24,119,242,0.1); border-color: rgba(24,119,242,0.25); color: #5b9cf6; }
    .btn-fb:hover { background: rgba(24,119,242,0.2); }

    /* ── LOGO UPLOAD ── */
    .logo-upload-wrap { display: flex; flex-direction: column; gap: 8px; }
    .logo-preview-row { display: flex; gap: 12px; align-items: flex-start; }
    .logo-preview-box {
      width: 80px; height: 80px; border-radius: 8px; border: 1px dashed var(--border2);
      background: var(--s2); display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0; overflow: hidden;
    }
    .logo-preview-box.has-img { border-style: solid; }
    .logo-preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .logo-upload-right { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .logo-url-display {
      font-family: var(--mono); font-size: 0.62rem; color: var(--text2);
      padding: 0.5rem; background: var(--s2); border-radius: 4px; border: 1px solid var(--border2);
      word-break: break-all; max-height: 60px; overflow-y: auto;
    }
    .logo-url-display.empty { color: var(--text3); }
    .logo-upload-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .logo-upload-status { font-family: var(--mono); font-size: 0.6rem; padding: 0.5rem; border-radius: 4px; display: none; }
    .logo-upload-status.uploading { display: block; background: rgba(59,130,246,0.1); color: var(--blue); }
    .logo-upload-status.success   { display: block; background: rgba(0,229,160,0.1);  color: var(--accent); }
    .logo-upload-status.error     { display: block; background: rgba(239,68,68,0.1);  color: var(--red); }
    .spinner {
      display: inline-block; width: 10px; height: 10px; border: 2px solid currentColor;
      border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TESTNET ── */
    .testnet-row { display: grid; grid-template-columns: 1fr 1fr 40px; gap: 8px; align-items: flex-end; }
    .tnet-label, .tnet-url {
      width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 0.76rem;
      padding: 0.58rem 0.75rem; outline: none; transition: border-color 0.2s;
    }
    .tnet-label:focus, .tnet-url:focus { border-color: var(--accent); }

    /* ── ROADMAP ── */
    .roadmap-card {
      background: var(--s2); border: 1px solid var(--border2); border-radius: 8px;
      padding: 1rem; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px;
    }
    .roadmap-card-header { display: flex; align-items: center; gap: 8px; }
    .roadmap-drag-handle { color: var(--text3); cursor: grab; font-size: 0.8rem; }
    .roadmap-phase-num { font-family: var(--mono); font-size: 0.6rem; color: var(--text3); flex: 1; }
    .roadmap-status-btn {
      padding: 0.3rem 0.6rem; border-radius: 4px; border: 1px solid var(--border2);
      background: transparent; color: var(--text3); font-family: var(--mono); font-size: 0.58rem;
      cursor: pointer; transition: all 0.15s; font-weight: 600; white-space: nowrap;
    }
    .roadmap-status-btn.planned     { border-color: rgba(100,100,100,0.3); color: var(--text3); }
    .roadmap-status-btn.in_progress { border-color: rgba(245,158,11,0.3);  color: var(--warn); }
    .roadmap-status-btn.done        { border-color: rgba(0,229,160,0.3);   color: var(--accent); }
    .roadmap-card-body { display: flex; flex-direction: column; gap: 10px; }
    .roadmap-card-body .field { gap: 5px; }
    .roadmap-card-body input, .roadmap-card-body textarea {
      width: 100%; background: var(--s3); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 0.76rem;
      padding: 0.58rem 0.75rem; outline: none; transition: border-color 0.2s;
    }
    .roadmap-card-body input:focus, .roadmap-card-body textarea:focus { border-color: var(--accent); }
    .roadmap-card-body textarea { min-height: 60px; }
    .roadmap-card-actions { display: flex; justify-content: flex-end; }
    .roadmap-empty { padding: 2rem 1rem; text-align: center; font-family: var(--mono); font-size: 0.65rem; color: var(--text3); }

    /* ── PUBLISH ── */
    .publish-section {
      padding: 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 1.5rem; flex-wrap: wrap;
    }
    .publish-toggle-wrap { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 250px; }
    .toggle-track {
      width: 50px; height: 26px; border-radius: 13px; position: relative;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0; border: 1px solid var(--border2);
    }
    .toggle-thumb {
      width: 22px; height: 22px; border-radius: 50%; background: var(--text2);
      position: absolute; top: 2px; transition: left 0.2s;
    }
    .publish-label { font-size: 0.85rem; font-weight: 600; }
    .publish-note { font-family: var(--mono); font-size: 0.6rem; color: var(--text3); }

    /* ── EMPTY FORM ── */
    .empty-form {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 3rem 2rem; text-align: center; gap: 1rem;
    }
    .empty-icon { font-size: 3rem; }
    .empty-text { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 2000;
      background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1.25rem; font-size: 0.8rem; color: var(--text);
      font-family: var(--mono); opacity: 0; transform: translateY(100px);
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show    { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.success { border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.08); color: var(--accent); }
    .toast.error   { border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.08);  color: var(--red); }

    /* ── MODAL (GitHub Token) ── */
    .modal {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-box {
      background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
      max-width: 400px; width: 100%; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-title { font-size: 0.95rem; font-weight: 700; }
    .modal-input {
      width: 100%; background: var(--s2); border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 0.76rem;
      padding: 0.58rem 0.75rem; outline: none; transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  </style>
</head>
<body>

<div id="login-section">
  <div class="login-card">
    <div class="login-logo">AirdropXI</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Login dengan Google untuk akses</div>
    <div id="g_id_onload"
      data-client_id="1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com"
      data-callback="handleCredentialResponse">
    </div>
  </div>
</div>

<div id="admin-content" class="hidden">
  <nav>
    <div class="nav-left">
      <a href="#" class="nav-logo">AirdropXI</a>
      <span class="nav-badge">ADMIN</span>
    </div>
  </nav>

  <div id="token-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">🔑 Setup GitHub Token</div>
      <input type="password" id="token-input" class="modal-input" placeholder="ghp_xxxxxxxxxxxx" spellcheck="false">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeTokenModal()">Batal</button>
        <button class="btn-save"   onclick="saveToken()">Simpan</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="sidebar">
      <div class="stats-strip">
        <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value green" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-label">Live</div><div class="stat-value blue"  id="stat-live">0</div></div>
        <div class="stat-card"><div class="stat-label">Draft</div><div class="stat-value warn"  id="stat-draft">0</div></div>
        <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value cyan" id="stat-confirmed">0</div></div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cari proyek..." spellcheck="false" oninput="onSearch(this.value)">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>

      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter('all',this)">Semua</button>
        <button class="ftab"        onclick="setFilter('live',this)">Live</button>
        <button class="ftab draft"  onclick="setFilter('draft',this)">Draft</button>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="ph-dot"></span>
          <span class="ph-title">Proyek</span>
          <span class="ph-count" id="proj-count">0/0</span>
        </div>
        <div class="proj-list" id="proj-list"></div>
      </div>

      <!-- ✅ TOMBOL DASHBOARD STATS (di atas Tambah Airdrop Baru) -->
      <button class="btn-new" onclick="showStats()"
        style="border-color:rgba(124,109,250,0.3);color:var(--purple);background:rgba(124,109,250,0.06)">
        📊 Dashboard Stats
      </button>

      <button class="btn-new" onclick="newForm()">➕ Tambah Airdrop Baru</button>

      <div id="drafts-section" class="drafts-section" style="display:none">
        <div class="drafts-head">
          <span class="drafts-dot"></span>
          <span class="ph-title" style="color:var(--warn)">Belum Dipublish</span>
          <span class="ph-count"  style="color:var(--warn)" id="drafts-count">0</span>
        </div>
        <div id="drafts-list"></div>
      </div>

      <button class="btn-new" onclick="openTokenModal()"
        style="border-color:rgba(59,130,246,0.3);color:var(--blue);background:rgba(59,130,246,0.06)">
        🔑 Setup GitHub Token
      </button>
      <!-- TOMBOL UPDATE EXCHANGE DETAILS (ditempatkan di sidebar, bukan di modal) -->
      <button class="btn-new" onclick="showExchangePanel()"
       style="border-color:rgba(0,229,160,0.3);color:var(--accent);background:rgba(0,229,160,0.06)">
       🔄 Update Exchange Details
    </button>
    </div>

    <div class="form-area" id="form-area">
      <div class="panel">
        <div class="empty-form">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Pilih proyek di kiri untuk edit,<br>atau klik "Tambah Airdrop Baru"</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  const GH_OWNER      = 'Xiobaisme';
  const GH_REPO       = 'airdropxi';
  const GH_BRANCH     = 'main';
  const GH_LOGOS_PATH = 'assets/logos';
  let _adminGoogleToken = null;

  const STATUS_OPTIONS = ['Active','Waitlist','Season 1','Season 2','Season 3','Season 4','Season 5','Seed Round','Private Round','Potential','Confirmed','Testnet','Mainnet','Listing / Selesai','Ended','TBA'];
  const CONFIRM_OPTIONS = [
    { value: 'potential', label: '◈ Potential', cls: 'potential' },
    { value: 'confirmed', label: '✓ Confirmed', cls: 'confirmed' },
    { value: 'ended',     label: '✕ Ended',     cls: 'ended'     },
    { value: 'tba',       label: '— TBA',       cls: 'tba'       },
  ];

  // ── GITHUB TOKEN ──────────────────────────────────────
  function getGHToken() { return localStorage.getItem('gh_token_airdropxi') || ''; }
  function openTokenModal() {
    const modal = document.getElementById('token-modal');
    const input = document.getElementById('token-input');
    modal.classList.remove('hidden');
    const existing = getGHToken();
    if (existing) input.value = existing;
    input.focus();
  }
  function closeTokenModal() { document.getElementById('token-modal').classList.add('hidden'); }
  function saveToken() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) { showToast('Token tidak boleh kosong!', 'error'); return; }
    if (!val.startsWith('ghp_') && !val.startsWith('github_pat_')) {
      if (!confirm('Token terlihat tidak valid. Simpan tetap?')) return;
    }
    localStorage.setItem('gh_token_airdropxi', val);
    closeTokenModal();
    showToast('✓ Token disimpan!', 'success');
  }
  document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveToken(); });

  // ── GITHUB IMAGE UPLOAD ───────────────────────────────
  async function uploadImageToGitHub(file, projectName) {
    const token = getGHToken();
    if (!token) { openTokenModal(); throw new Error('GitHub token belum diset. Isi token dulu!'); }
    const ext      = file.name.split('.').pop().toLowerCase();
    const safeName = (projectName || 'logo').toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    const filename = `${safeName}-${Date.now()}.${ext}`;
    const filePath = `${GH_LOGOS_PATH}/${filename}`;
    const base64   = await fileToBase64(file);
    let sha = null;
    try {
      const checkRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`, { headers: { Authorization: `token ${token}` } });
      if (checkRes.ok) { const ex = await checkRes.json(); sha = ex.sha; }
    } catch(e) {}
    const body = { message: `Upload logo: ${filename}`, content: base64, branch: GH_BRANCH };
    if (sha) body.sha = sha;
    const res = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`,
      { method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('Token tidak valid atau expired.');
      if (res.status === 403) throw new Error('Token tidak punya akses repo.');
      throw new Error(err.message || `GitHub API error ${res.status}`);
    }
    const data = await res.json();
    return data.content.download_url || `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${filePath}`;
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Gagal baca file'));
      reader.readAsDataURL(file);
    });
  }

  // ── LOGO UPLOAD ───────────────────────────────────────
  let pendingLogoUrl = null;
  function initLogoUpload(existingUrl) { pendingLogoUrl = existingUrl || null; updateLogoPreview(existingUrl); }
  function updateLogoPreview(url) {
    const box     = document.getElementById('logo-preview-box');
    const urlDisp = document.getElementById('logo-url-display');
    if (!box || !urlDisp) return;
    if (url) {
      box.innerHTML = `<img src="${esc(url)}" onerror="this.parentElement.innerHTML='🖼️'">`;
      box.classList.add('has-img');
      urlDisp.textContent = url;
      urlDisp.classList.remove('empty');
    } else {
      box.innerHTML = '🖼️';
      box.classList.remove('has-img');
      urlDisp.textContent = 'Belum ada logo';
      urlDisp.classList.add('empty');
    }
  }
  function triggerLogoUpload() { const i = document.getElementById('logo-file-input'); if (i) i.click(); }
  async function handleLogoFileChange(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const allowed = ['image/png','image/jpeg','image/jpg','image/webp','image/svg+xml','image/gif'];
    if (!allowed.includes(file.type)) { showToast('Format tidak didukung.', 'error'); return; }
    if (file.size > 2 * 1024 * 1024) { showToast('File terlalu besar. Maks 2MB.', 'error'); return; }
    const statusEl  = document.getElementById('logo-upload-status');
    const uploadBtn = document.getElementById('btn-upload-logo');
    statusEl.className = 'logo-upload-status uploading';
    statusEl.innerHTML = '<span class="spinner"></span> Mengupload ke GitHub...';
    if (uploadBtn) uploadBtn.disabled = true;
    try {
      const projectName = document.getElementById('f-name')?.value?.trim() || 'project';
      const rawUrl = await uploadImageToGitHub(file, projectName);
      pendingLogoUrl = rawUrl;
      updateLogoPreview(rawUrl);
      statusEl.className   = 'logo-upload-status success';
      statusEl.textContent = '✓ Upload berhasil! Klik Simpan untuk menyimpan.';
      showToast('✓ Gambar berhasil diupload!', 'success');
    } catch(err) {
      statusEl.className   = 'logo-upload-status error';
      statusEl.textContent = '✕ ' + err.message;
      showToast('Upload gagal: ' + err.message, 'error');
    } finally {
      if (uploadBtn) uploadBtn.disabled = false;
      e.target.value = '';
    }
  }
  function clearLogo() {
    pendingLogoUrl = null; updateLogoPreview(null);
    const statusEl = document.getElementById('logo-upload-status');
    if (statusEl) { statusEl.className = 'logo-upload-status'; statusEl.textContent = ''; }
  }

  // ── STATE ─────────────────────────────────────────────
  let projects   = [];
  let editingId  = null;
  let searchQ    = '';
  let filterMode = 'all';

  // ── LOAD LIST ─────────────────────────────────────────
  async function loadProjects() {
    try {
      const res = await fetch('/api/admin-airdrop');
      if (!res.ok) throw new Error('Gagal fetch');
      projects = await res.json();
      updateStats(); renderList(); renderDrafts();
    } catch(e) {
      document.getElementById('proj-list').innerHTML = `<div class="list-empty" style="color:var(--red)">${e.message}</div>`;
    }
  }

  function updateStats() {
    const total     = projects.length;
    const live      = projects.filter(p => p.published === true).length;
    const draft     = projects.filter(p => !p.published).length;
    const confirmed = projects.filter(p => (p.confirmation_status||'').toLowerCase().includes('confirmed')).length;
    document.getElementById('stat-total').textContent     = total;
    document.getElementById('stat-live').textContent      = live;
    document.getElementById('stat-draft').textContent     = draft;
    document.getElementById('stat-confirmed').textContent = confirmed;
  }

  function getFilteredProjects() {
    let list = projects;
    if (filterMode === 'live')  list = list.filter(p => p.published === true);
    if (filterMode === 'draft') list = list.filter(p => !p.published);
    if (searchQ.trim()) {
      const q = searchQ.toLowerCase();
      list = list.filter(p =>
        (p.name||'').toLowerCase().includes(q) ||
        (p.status||'').toLowerCase().includes(q) ||
        (p.tags||'').toLowerCase().includes(q) ||
        (p.confirmation_status||'').toLowerCase().includes(q)
      );
    }
    return list;
  }

  function renderList() {
    const list     = document.getElementById('proj-list');
    const filtered = getFilteredProjects();
    document.getElementById('proj-count').textContent = filtered.length + '/' + projects.length;
    if (!projects.length) { list.innerHTML = '<div class="list-empty">Belum ada proyek.</div>'; return; }
    if (!filtered.length) { list.innerHTML = '<div class="list-empty">Tidak ada hasil.</div>'; return; }
    list.innerHTML = filtered.map(p => {
      const isLive  = p.published === true;
      const confVal = (p.confirmation_status||'').toLowerCase();
      const confCls = confVal.includes('confirmed') ? 'confirmed' : confVal.includes('potential') ? 'potential' : confVal.includes('ended') ? 'ended' : '';
      const confLbl = confVal.includes('confirmed') ? '✓ Confirmed' : confVal.includes('potential') ? '◈ Potential' : confVal.includes('ended') ? '✕ Ended' : '';
      return `
        <div class="proj-item ${editingId == p.id ? 'active' : ''}" onclick="loadEdit(${p.id})">
          <div class="proj-item-info">
            <div class="proj-item-name">${esc(p.name)}</div>
            <div class="proj-item-badges">
              <span class="proj-item-status ${getStCls(p.status)}">${esc(p.status||'TBA')}</span>
              <span class="live-dot ${isLive?'on':'off'}">${isLive?'● LIVE':'○ DRAFT'}</span>
              ${confCls ? `<span class="conf-badge ${confCls}">${confLbl}</span>` : ''}
              <button class="share-pill" onclick="event.stopPropagation();openFbShare(${p.id})" title="Share ke Facebook">📘 FB</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderDrafts() {
    const draftList = projects.filter(p => !p.published);
    const section   = document.getElementById('drafts-section');
    const listEl    = document.getElementById('drafts-list');
    const countEl   = document.getElementById('drafts-count');
    if (!draftList.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    countEl.textContent   = draftList.length;
    listEl.innerHTML = draftList.slice(0,5).map(p => `
      <div class="draft-item" onclick="loadEdit(${p.id})">
        <div class="draft-item-icon">
          ${p.logo_url ? `<img src="${esc(p.logo_url)}" onerror="this.parentElement.textContent='🪂'">` : '🪂'}
        </div>
        <div class="draft-item-info">
          <div class="draft-item-name">${esc(p.name)}</div>
          <div class="draft-item-sub">${esc(p.status||'TBA')} · Belum dipublish</div>
        </div>
      </div>`).join('');
    if (draftList.length > 5)
      listEl.innerHTML += `<div style="padding:0.5rem 1rem;font-family:var(--mono);font-size:0.55rem;color:var(--text3);text-align:center">+${draftList.length-5} draft lainnya di list atas</div>`;
  }

  // ── SEARCH & FILTER ───────────────────────────────────
  function onSearch(val) {
    searchQ = val;
    document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
    renderList();
  }
  function clearSearch() {
    searchQ = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    renderList();
  }
  function setFilter(mode, btn) {
    filterMode = mode;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  // ── HELPERS ───────────────────────────────────────────
  function getStCls(s) {
    const l = (s||'').toLowerCase();
    if (l.includes('active') || l.includes('mainnet')) return 'st-a';
    if (l.includes('wait'))       return 'st-w';
    if (l.includes('season'))     return 'st-s';
    if (l.includes('confirmed') || l.includes('testnet')) return 'st-c';
    if (l.includes('potential'))  return 'st-p';
    return 'st-d';
  }
  function newForm()    { editingId = null; renderList(); renderForm(null); }
  function loadEdit(id) {
    editingId = id; renderList();
    fetch(`/api/admin-airdrop?id=${id}`)
      .then(r => r.json())
      .then(data => { if (data.error) { showToast(data.error,'error'); return; } renderForm(data); refreshRoadmapNums(); })
      .catch(e => showToast('Gagal load: ' + e.message, 'error'));
  }

  // ── FACEBOOK SHARE ────────────────────────────────────
  function openFbShare(id) {
    fetch(`/api/admin-airdrop?id=${id}`)
      .then(r => r.json())
      .then(p => _renderFbModal(p))
      .catch(() => {
        const p = projects.find(x => x.id == id) || {};
        _renderFbModal(p);
      });
  }

  function _renderFbModal(p) {
    const name   = p.name || '—';
    const slug   = name.toLowerCase().replace(/[^a-z0-9]/g,'');
    const raised = p.RaisedID || p.RaisedEN || 'Undisclosed';
    const cat    = p.tags    || 'Crypto / Web3';
    const net    = p.network || 'TBA';
    const status = p.status  || 'TBA';
    const desc   = (p.descriptionID || p.descriptionEN || 'Proyek airdrop menarik!').trim();
    const id     = p.id;

    const caption = `🚀 ${name}\n\n${desc}\n\n💰 ${raised}\n📂 ${cat}\n🌐 ${net}\n📍 ${status}\n\nSelengkapnya di AirdropXI\n\n#airdrop #crypto #web3 #${slug}`;
    const ogUrl   = `https://airdropxi.vercel.app/api/og?id=${id}`;
    const fbUrl   = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(ogUrl)}`;

    document.getElementById('fb-mini-modal')?.remove();

    const modal = document.createElement('div');
    modal.id = 'fb-mini-modal';
    modal.style.cssText = `position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:1rem`;
    modal.innerHTML = `
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:480px;width:100%;display:flex;flex-direction:column;gap:1rem">
        <div style="font-family:var(--mono);font-size:0.7rem;color:var(--accent);font-weight:700">📘 Share FB — ${esc(name)}</div>
        <textarea id="fb-caption-text" style="width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.68rem;padding:0.75rem;min-height:180px;outline:none;resize:vertical" spellcheck="false">${caption}</textarea>
        <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">1️⃣ Klik <strong style="color:var(--accent)">Copy Caption</strong> → 2️⃣ Klik <strong style="color:#5b9cf6">Buka Facebook</strong> → 3️⃣ Paste di kolom FB</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="document.getElementById('fb-mini-modal').remove()" style="padding:0.5rem 0.9rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--mono);font-size:0.62rem;cursor:pointer">✕ Tutup</button>
          <button onclick="
            const ta=document.getElementById('fb-caption-text');
            ta.select();
            navigator.clipboard.writeText(ta.value).catch(()=>{document.execCommand('copy')});
            this.textContent='✓ Copied!';
            setTimeout(()=>this.textContent='📋 Copy Caption',2000)
          " style="padding:0.5rem 0.9rem;border-radius:6px;border:1px solid rgba(0,229,160,0.3);background:rgba(0,229,160,0.1);color:var(--accent);font-family:var(--mono);font-size:0.62rem;cursor:pointer;font-weight:700">📋 Copy Caption</button>
          <button onclick="window.open('${fbUrl}','_blank','width=600,height=500')" style="padding:0.5rem 0.9rem;border-radius:6px;border:1px solid rgba(24,119,242,0.3);background:rgba(24,119,242,0.1);color:#5b9cf6;font-family:var(--mono);font-size:0.62rem;cursor:pointer;font-weight:700">📘 Buka Facebook</button>
        </div>
      </div>`;
    modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  // ── DASHBOARD STATS ───────────────────────────────────
  async function showStats() {
    editingId = null; renderList();
    document.getElementById('form-area').innerHTML = `
      <div class="panel">
        <div class="panel-head">
          <span class="ph-dot" style="background:var(--purple);box-shadow:0 0 6px var(--purple)"></span>
          <span class="ph-title">Dashboard Stats</span>
        </div>
        <div id="stats-content" style="padding:1.25rem">
          <div style="font-family:var(--mono);font-size:0.65rem;color:var(--text3)">⏳ Loading...</div>
        </div>
      </div>`;

    const byStatus = {}, byConfirm = {}, byNetwork = {}, byTag = {};

    projects.forEach(p => {
      const s = p.status || 'TBA';
      byStatus[s] = (byStatus[s] || 0) + 1;
      const c = p.confirmation_status || 'unknown';
      byConfirm[c] = (byConfirm[c] || 0) + 1;
      const n = p.network || 'Unknown';
      byNetwork[n] = (byNetwork[n] || 0) + 1;
      (p.tags || '').split(',').forEach(t => {
        const tag = t.trim().toLowerCase();
        if (tag) byTag[tag] = (byTag[tag] || 0) + 1;
      });
    });

    const topViewed = [...projects]
      .filter(p => p.view_count > 0)
      .sort((a,b) => (b.view_count||0) - (a.view_count||0))
      .slice(0, 5);

    const sortedStatus  = Object.entries(byStatus).sort((a,b) => b[1]-a[1]);
    const sortedConfirm = Object.entries(byConfirm).sort((a,b) => b[1]-a[1]);
    const sortedNetwork = Object.entries(byNetwork).sort((a,b) => b[1]-a[1]).slice(0,8);
    const sortedTags    = Object.entries(byTag).sort((a,b) => b[1]-a[1]).slice(0,10);

    const bar = (label, val, max, color) => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="font-family:var(--mono);font-size:0.58rem;color:var(--text2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(label)}</div>
        <div style="flex:1;background:var(--s3);border-radius:3px;height:8px;overflow:hidden">
          <div style="width:${Math.round((val/max)*100)}%;background:${color};height:100%;border-radius:3px"></div>
        </div>
        <div style="font-family:var(--mono);font-size:0.58rem;color:var(--text3);width:24px;text-align:right">${val}</div>
      </div>`;

    const card = (title, color, content) => `
      <div style="background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:1rem;display:flex;flex-direction:column;gap:10px">
        <div style="font-family:var(--mono);font-size:0.58rem;color:${color};letter-spacing:0.1em;text-transform:uppercase">${title}</div>
        ${content}
      </div>`;

    document.getElementById('stats-content').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        ${card('🏆 Most Viewed', 'var(--warn)',
          topViewed.length
            ? topViewed.map((p,i) => `
              <div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="loadEdit(${p.id})">
                <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3);width:16px">#${i+1}</div>
                <div style="flex:1;font-size:0.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>
                <div style="font-family:var(--mono);font-size:0.6rem;color:var(--warn)">${p.view_count} views</div>
              </div>`).join('')
            : '<div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">Belum ada data view</div>'
        )}
        ${card('📊 By Status', 'var(--accent)',
          sortedStatus.length ? sortedStatus.map(([s,v]) => bar(s, v, sortedStatus[0][1], 'var(--accent)')).join('') : '<div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">Belum ada data</div>'
        )}
        ${card('✓ By Confirmation', 'var(--cyan)',
          sortedConfirm.length ? sortedConfirm.map(([s,v]) => bar(s, v, sortedConfirm[0][1], 'var(--cyan)')).join('') : '<div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">Belum ada data</div>'
        )}
        ${card('🌐 By Network', 'var(--blue)',
          sortedNetwork.length ? sortedNetwork.map(([s,v]) => bar(s, v, sortedNetwork[0][1], 'var(--blue)')).join('') : '<div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">Belum ada data</div>'
        )}
        ${card('🏷️ Top Tags', 'var(--purple)',
          sortedTags.length ? sortedTags.map(([s,v]) => bar(s, v, sortedTags[0][1], 'var(--purple)')).join('') : '<div style="font-family:var(--mono);font-size:0.6rem;color:var(--text3)">Belum ada data</div>'
        )}
      </div>`;
  }

  // ── RENDER FORM ───────────────────────────────────────

        <div class="form-sec">
          <div class="sec-lbl">Info Dasar</div>

            <div class="field"><label>Tags <span class="hint">pisah koma</span></label><input id="f-tags" type="text" placeholder="DeFi, AI, Layer2" value="${esc(d.tags||'')}"></div>

          <div style="margin-top:0.875rem">
            <label style="display:block;margin-bottom:8px">Confirmation Status<span class="hint">— tampil sebagai badge di guide page</span></label>
            <div class="confirm-picker" id="confirm-picker">

                <button type="button" class="confirm-opt ${opt.cls} ${confirmVal===opt.value||(!confirmVal&&opt.value==='potential')?'selected '+opt.cls:''}"

            <div class="field"><label>Total Raised (EN) <span class="hint">e.g. $600M</span></label><input id="f-raiseden" type="text" placeholder="$600M" value="${esc(d.RaisedEN||'')}"></div>

        <div class="form-sec">

          <div class="fg c1">
            <div class="field"><label>Tugas (ID)</label><textarea id="f-tasksid" class="tall" placeholder="1. Daftar di website | Kunjungi https://... dan klik Sign Up">${esc(d.tasksID||'')}</textarea></div>
            <div class="field"><label>Tasks (EN)</label><textarea id="f-tasksen" class="tall" placeholder="1. Register | Visit https://... and click Sign Up">${esc(d.tasksEN||'')}</textarea></div>

          <div class="roadmap-builder" id="roadmap-builder">
            ${roadmapItems.length ? roadmapItems.map((item,i)=>roadmapCard(i,item)).join('') : '<div class="roadmap-empty">Belum ada fase. Klik tombol di bawah untuk menambah.</div>'}

          <button class="btn-add-roadmap" onclick="addRoadmapCard()" style="margin-top:10px">＋ Tambah Fase</button>

          <div class="fg c1">
            <div class="field"><label>FAQ (ID)</label><textarea id="f-faqid" class="tall" placeholder="Q: Apa itu airdrop ini? | A: Program distribusi token gratis.">${esc(d.faqID||'')}</textarea></div>
            <div class="field"><label>FAQ (EN)</label><textarea id="f-faqen" class="tall" placeholder="Q: What is this? | A: A free token distribution program.">${esc(d.faqEN||'')}</textarea></div>
          </div>
        </div>

        <div class="form-sec">
          <div class="sec-lbl">Tokenomics</div>
          <div class="fg">
            <div class="field"><label>Ticker / Symbol</label><input id="f-ticker"  type="text" placeholder="BTC / ETH"        value="${esc(d.ticker||'')}"></div>
            <div class="field"><label>Total Supply</label>  <input id="f-supply"  type="text" placeholder="1,000,000,000"    value="${esc(d.total_supply||'')}"></div>
            <div class="field"><label>Network</label>        <input id="f-network" type="text" placeholder="Ethereum / Solana" value="${esc(d.network||'')}"></div>
            <div class="field"><label>TGE / Listing Date</label><input id="f-tge"  type="text" placeholder="Q3 2026 / TBA"   value="${esc(d.tge_date||'')}"></div>
            <div class="field" style="grid-column:span 2">
              <label>Logo Proyek <span class="hint">PNG/JPG/WEBP/SVG, maks 2MB</span></label>
              <div class="logo-upload-wrap">
                <div class="logo-preview-row">
                  <div class="logo-preview-box" id="logo-preview-box">🖼️</div>
                  <div class="logo-upload-right">
                    <div class="logo-url-display empty" id="logo-url-display">Belum ada logo</div>
                    <div class="logo-upload-btns">
                      <input type="file" id="logo-file-input" accept="image/*" style="display:none" onchange="handleLogoFileChange(event)">
                      <button type="button" class="btn-upload-logo" id="btn-upload-logo" onclick="triggerLogoUpload()">⬆ Upload Gambar</button>
                      <button type="button" class="btn-clear-logo"  onclick="clearLogo()">✕ Hapus</button>
                    </div>
                  </div>
                </div>
                <div class="logo-upload-status" id="logo-upload-status"></div>
              </div>
            </div>
            <input type="hidden" id="f-logo">
          </div>
        </div>

        <div class="form-sec">
          <div class="sec-lbl">Sosial Media</div>
          <div class="fg">
            <div class="field"><label>Twitter / X</label>  <input id="f-twitter"   type="url" placeholder="https://x.com/..."                    value="${esc(d.twitter||'')}"></div>
            <div class="field"><label>Discord</label>       <input id="f-discord"   type="url" placeholder="https://discord.gg/..."               value="${esc(d.discord||'')}"></div>
            <div class="field"><label>Telegram</label>      <input id="f-telegram"  type="url" placeholder="https://t.me/..."                     value="${esc(d.telegram||'')}"></div>
            <div class="field"><label>LinkedIn</label>      <input id="f-linkedin"  type="url" placeholder="https://linkedin.com/company/..."     value="${esc(d.linkedin||'')}"></div>
            <div class="field"><label>YouTube</label>       <input id="f-youtube"   type="url" placeholder="https://youtube.com/@..."             value="${esc(d.youtube||'')}"></div>
            <div class="field"><label>Instagram</label>     <input id="f-instagram" type="url" placeholder="https://instagram.com/..."            value="${esc(d.instagram||'')}"></div>
          </div>
        </div>

        <div class="form-sec">
          <div class="form-actions">
            <button class="btn-save" id="btn-save-bottom" onclick="saveForm()">${isEdit ? '💾 Simpan Perubahan' : '➕ Tambah Proyek'}</button>

          </div>
        </div>
      </div>`;

    initLogoUpload(d.logo_url || null);
    if (!testnetLinks.length) {
      const builder = document.getElementById('testnet-builder');
      if (builder) builder.innerHTML = testnetRow(0,'','');
    }
  }

  // ── CONFIRMATION STATUS PICKER ────────────────────────
  function selectConfirm(value) {
    document.getElementById('f-confirmation-status').value = value;
    document.querySelectorAll('.confirm-opt').forEach(btn => {
      const isThis = btn.dataset.value === value;
      btn.className = 'confirm-opt ' + btn.dataset.value + (isThis ? ' selected ' + btn.dataset.value : '');
    });
  }

  // ── PUBLISH TOGGLE ────────────────────────────────────
  function togglePublish() {
    const cb    = document.getElementById('f-published');
    const track = document.getElementById('toggle-track');
    const thumb = document.getElementById('toggle-thumb');
    const label = document.getElementById('publish-label');
    if (!cb) return;
    cb.checked = !cb.checked;
    const on = cb.checked;
    track.style.background = on ? 'var(--accent)' : 'var(--border2)';
    thumb.style.left       = on ? '23px' : '3px';
    label.style.color      = on ? 'var(--accent)' : 'var(--warn)';
    label.textContent      = on ? '✓ Published — Tampil di index publik' : '○ Draft — Tidak tampil di index';
  }

  // ── TESTNET ───────────────────────────────────────────
  function testnetRow(i, label, url) {
    return `<div class="testnet-row" id="trow-${i}">
      <input type="text" placeholder="Label (e.g. Testnet App)" value="${esc(label)}" class="tnet-label">
      <input type="url"  placeholder="https://..." value="${esc(url)}" class="tnet-url">
      <button class="btn-remove-testnet" onclick="removeTestnetRow(${i})" title="Hapus">✕</button>
    </div>`;
  }
  function addTestnetRow() {
    const builder = document.getElementById('testnet-builder');
    if (!builder) return;
    if (builder.querySelectorAll('.testnet-row').length >= 5) { showToast('Maksimal 5 link', 'error'); return; }
    builder.insertAdjacentHTML('beforeend', testnetRow(Date.now(),'',''));
  }
  function removeTestnetRow(i) { document.getElementById(`trow-${i}`)?.remove(); }
  function getTestnetLinks() {
    const builder = document.getElementById('testnet-builder');
    if (!builder) return null;
    const links = [];
    builder.querySelectorAll('.testnet-row').forEach(row => {
      const label = row.querySelector('.tnet-label')?.value?.trim() || '';
      let url     = row.querySelector('.tnet-url')?.value?.trim()   || '';
      if (url) {
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
        links.push({ label: label || url, url });
      }
    });
    return links.length ? JSON.stringify(links) : null;
  }

  // ── ROADMAP ───────────────────────────────────────────
  const RM_STATUSES = ['planned','in_progress','done'];
  const RM_LABELS   = { planned: '○ Planned', in_progress: '⟳ In Progress', done: '✓ Done' };

  function roadmapCard(i, item) {
    item = item || {};
    const status = RM_STATUSES.includes(item.status) ? item.status : 'planned';
    return `<div class="roadmap-card" id="rcard-${i}">
      <div class="roadmap-card-header">
        <span class="roadmap-drag-handle">⠿</span>
        <span class="roadmap-phase-num">FASE —</span>
        <button class="roadmap-status-btn ${status}" id="rstatus-${i}" data-status="${status}" onclick="cycleRoadmapStatus(${i})">${RM_LABELS[status]}</button>
      </div>
      <div class="roadmap-card-body">
        <div class="field"><label>Phase Label <span class="hint">e.g. Phase 1</span></label><input type="text" class="rm-phase-label" placeholder="Phase 1" value="${esc(item.phase_label||'')}"></div>
        <div class="field"><label>Phase Title <span class="req">*</span></label><input type="text" class="rm-phase-title" placeholder="Testnet Launch" value="${esc(item.phase_title||'')}"></div>
        <div class="field"><label>Description <span class="hint">opsional</span></label><textarea class="rm-phase-desc" placeholder="Deskripsi singkat fase ini...">${esc(item.phase_desc||'')}</textarea></div>
        <div class="field"><label>Source URL</label><input type="url" class="rm-source-url" placeholder="https://..." value="${esc(item.source_url||'')}"></div>
        <div class="field"><label>Source Label</label><input type="text" class="rm-source-label" placeholder="Official Roadmap" value="${esc(item.source_label||'Official Roadmap')}"></div>
      </div>
      <div class="roadmap-card-actions"><button class="btn-remove-roadmap" onclick="removeRoadmapCard(${i})">✕ Hapus Fase</button></div>
    </div>`;
  }
  function cycleRoadmapStatus(i) {
    const btn  = document.getElementById(`rstatus-${i}`);
    if (!btn) return;
    const next = RM_STATUSES[(RM_STATUSES.indexOf(btn.dataset.status||'planned') + 1) % RM_STATUSES.length];
    btn.dataset.status = next;
    btn.className      = `roadmap-status-btn ${next}`;
    btn.textContent    = RM_LABELS[next];
  }
  function addRoadmapCard() {
    const builder = document.getElementById('roadmap-builder');
    if (!builder) return;
    builder.querySelector('.roadmap-empty')?.remove();
    if (builder.querySelectorAll('.roadmap-card').length >= 20) { showToast('Maksimal 20 fase', 'error'); return; }
    builder.insertAdjacentHTML('beforeend', roadmapCard(Date.now(), {}));
    refreshRoadmapNums();
  }
  function removeRoadmapCard(i) {
    document.getElementById(`rcard-${i}`)?.remove();
    refreshRoadmapNums();
    const builder = document.getElementById('roadmap-builder');
    if (builder && !builder.querySelectorAll('.roadmap-card').length)
      builder.innerHTML = '<div class="roadmap-empty">Belum ada fase. Klik tombol di bawah untuk menambah.</div>';
  }
  function refreshRoadmapNums() {
    document.getElementById('roadmap-builder')?.querySelectorAll('.roadmap-card').forEach((card, idx) => {
      const el = card.querySelector('.roadmap-phase-num');
      if (el) el.textContent = `FASE ${idx + 1}`;
    });
  }
  function getRoadmapItems() {
    const builder = document.getElementById('roadmap-builder');
    if (!builder) return [];
    const items = [];
    builder.querySelectorAll('.roadmap-card').forEach((card, idx) => {
      const phase_label  = card.querySelector('.rm-phase-label')?.value?.trim()  || '';
      const phase_title  = card.querySelector('.rm-phase-title')?.value?.trim()  || '';
      const phase_desc   = card.querySelector('.rm-phase-desc')?.value?.trim()   || null;
      const source_url   = card.querySelector('.rm-source-url')?.value?.trim()   || null;
      const source_label = card.querySelector('.rm-source-label')?.value?.trim() || 'Official Roadmap';
      const statusBtn    = card.querySelector('.roadmap-status-btn');
      const status       = statusBtn?.dataset?.status || 'planned';
      if (!phase_title && !phase_label) return;
      items.push({ phase_label, phase_title, phase_desc, status, source_url, source_label, sort_order: idx });
    });
    return items;
  }

  function cancelForm() {
    editingId = null; renderList(); pendingLogoUrl = null;
    document.getElementById('form-area').innerHTML = `
      <div class="panel">
        <div class="empty-form">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Pilih proyek di kiri untuk edit,<br>atau klik "Tambah Airdrop Baru"</div>
        </div>
      </div>`;
  }

  // ── SAVE ──────────────────────────────────────────────
  async function saveForm() {
    const name = document.getElementById('f-name')?.value?.trim();
    if (!name) { showToast('Nama proyek wajib diisi!', 'error'); return; }
    const payload = {
      name,
      status:              document.getElementById('f-status')?.value                || null,
      confirmation_status: document.getElementById('f-confirmation-status')?.value  || 'potential',
      published:           document.getElementById('f-published')?.checked           || false,
      link:                document.getElementById('f-link')?.value?.trim()          || null,
      tags:                document.getElementById('f-tags')?.value?.trim()          || null,
      RaisedID:            document.getElementById('f-raisedid')?.value?.trim()      || null,
      RaisedEN:            document.getElementById('f-raiseden')?.value?.trim()      || null,
      tasksID:             document.getElementById('f-tasksid')?.value?.trim()       || null,
      tasksEN:             document.getElementById('f-tasksen')?.value?.trim()       || null,
      descriptionID:       document.getElementById('f-descid')?.value?.trim()        || null,
      descriptionEN:       document.getElementById('f-descen')?.value?.trim()        || null,
      ticker:              document.getElementById('f-ticker')?.value?.trim()        || null,
      total_supply:        document.getElementById('f-supply')?.value?.trim()        || null,
      network:             document.getElementById('f-network')?.value?.trim()       || null,
      tge_date:            document.getElementById('f-tge')?.value?.trim()           || null,
      logo_url:            pendingLogoUrl || null,
      twitter:             document.getElementById('f-twitter')?.value?.trim()       || null,
      discord:             document.getElementById('f-discord')?.value?.trim()       || null,
      telegram:            document.getElementById('f-telegram')?.value?.trim()      || null,
      linkedin:            document.getElementById('f-linkedin')?.value?.trim()      || null,
      youtube:             document.getElementById('f-youtube')?.value?.trim()       || null,
      instagram:           document.getElementById('f-instagram')?.value?.trim()     || null,
      faqID:               document.getElementById('f-faqid')?.value?.trim()         || null,
      faqEN:               document.getElementById('f-faqen')?.value?.trim()         || null,
      testnet_links:       getTestnetLinks(),
      _roadmap:            getRoadmapItems(),
    };
    ['btn-save','btn-save-bottom'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.disabled = true; el.innerHTML = '<span class="spinner"></span> Menyimpan...'; }
    });
    try {
      const isNew = !editingId;
      const res = await fetch(
        editingId ? `/api/admin-airdrop?id=${editingId}` : '/api/admin-airdrop',
        { method: editingId ? 'PATCH' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
      );
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || `HTTP ${res.status}`);
      showToast(editingId ? '✓ Berhasil diupdate!' : '✓ Proyek ditambahkan!', 'success');
      await loadProjects();
      if (isNew && Array.isArray(result) && result[0]) { editingId = result[0].id; loadEdit(editingId); }
    } catch(e) {
      showToast('Error: ' + e.message, 'error');
      ['btn-save','btn-save-bottom'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.disabled = false; el.innerHTML = editingId ? '💾 Simpan' : '➕ Tambah'; }
      });
    }
  }

  // ── DELETE ────────────────────────────────────────────
  async function deleteProject(id) {
    const p = projects.find(x => x.id == id);
    if (!confirm(`Hapus "${p?.name || id}"?\nTindakan ini tidak bisa dibatalkan.`)) return;
    try {
      const res = await fetch(`/api/admin-airdrop?id=${id}`, { method: 'DELETE' });
      if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error || 'Gagal hapus'); }
      showToast('✓ Proyek dihapus', 'success');
      editingId = null; pendingLogoUrl = null;
      await loadProjects(); cancelForm();
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
  }

  // ── TOAST & UTIL ──────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3200);
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadProjects();
</script>

<script>
  const YOUR_CLIENT_ID = '1041020002267-qj0oaoco5idr8obsfsemcm1n9tihue0p.apps.googleusercontent.com';

  async function handleCredentialResponse(response) {
    try {
      _adminGoogleToken = response.credential;
      const res = await fetch('/api/verify-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: response.credential }),
      });
      const result = await res.json();
      if (res.ok && result.success) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').classList.remove('hidden');
        if (!localStorage.getItem('gh_token_airdropxi'))
          setTimeout(() => showToast('💡 Setup GitHub Token untuk enable upload gambar!', 'success'), 800);
      } else {
        alert(`Akses ditolak: ${result.message || 'Unauthorized'}`);
        google.accounts.id.disableAutoSelect();
      }
    } catch(err) {
      alert('Verifikasi gagal. Coba lagi nanti.');
    }
  }
  
// ─────────────────────────────────────────────────────────
// PANEL EDIT EXCHANGE DETAILS (tanpa mengganggu airdrop)
// ─────────────────────────────────────────────────────────
let exchangeListData = [];      // menyimpan data exchange + details
let currentEditExchangeId = null; // exchange_id yang sedang diedit

async function showExchangePanel() {
  // Reset state airdrop agar tidak bentrok (tapi tidak menghapus data)
  editingId = null;
  currentEditExchangeId = null;
  // Load data exchanges
  await loadExchangeList();
  // Tampilkan UI list dan form kosong
  renderExchangePanel();
}

async function loadExchangeList() {
  try {
    const res = await fetch('/api/admin-airdrop?type=exchange-details');
    if (!res.ok) throw new Error('Gagal fetch exchange details');
    exchangeListData = await res.json();
    // data sudah berisi: id (uuid), exchange_id, exchange_name, about, website, twitter, dll
  } catch(e) {
    exchangeListData = [];
    console.error(e);
    showToast('Gagal load exchange: ' + e.message, 'error');
  }
}

function renderExchangePanel() {
  const formArea = document.getElementById('form-area');
  if (!exchangeListData.length) {
    formArea.innerHTML = `<div class="panel"><div class="empty-form">Tidak ada data exchange. Pastikan tabel exchanges sudah diisi.</div></div>`;
    return;
  }

  // Buat tampilan dua kolom: daftar exchange di kiri, form edit di kanan
  formArea.innerHTML = `
    <div style="display:grid; grid-template-columns: 280px 1fr; gap: 1rem;">
      <!-- Daftar exchange -->
      <div class="panel" style="overflow:auto; max-height:70vh;">
        <div class="panel-head">
          <span class="ph-dot" style="background:var(--accent)"></span>
          <span class="ph-title">Daftar Exchange</span>
          <span class="ph-count">${exchangeListData.length}</span>
        </div>
        <div id="exchange-list-panel" style="max-height:500px; overflow-y:auto;">
          ${exchangeListData.map(ex => `
            <div class="proj-item ${currentEditExchangeId === ex.exchange_id ? 'active' : ''}" 
                 onclick="selectExchangeForEdit(${ex.exchange_id})">
              <div class="proj-item-info">
                <div class="proj-item-name">${esc(ex.exchange_name)}</div>
                <div class="proj-item-badges">
                  <span class="proj-item-status st-c">${ex.website ? '🌐' : '⚙️'}</span>
                  <span class="live-dot ${ex.about ? 'on' : 'off'}">${ex.about ? '●' : '○'}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Form edit detail -->
      <div class="panel" id="exchange-edit-panel">
        <div class="empty-form">
          <div class="empty-icon">🖊️</div>
          <div class="empty-text">Klik salah satu exchange di samping untuk mengedit detailnya</div>
        </div>
      </div>
    </div>
  `;
}

async function selectExchangeForEdit(exchangeId) {
  currentEditExchangeId = exchangeId;
  // Cari data exchange yang dipilih
  const exchange = exchangeListData.find(e => e.exchange_id === exchangeId);
  if (!exchange) return;
  // Update active state di list (refresh list panel saja)
  const listContainer = document.getElementById('exchange-list-panel');
  if (listContainer) {
    listContainer.innerHTML = exchangeListData.map(ex => `
      <div class="proj-item ${currentEditExchangeId === ex.exchange_id ? 'active' : ''}" 
           onclick="selectExchangeForEdit(${ex.exchange_id})">
        <div class="proj-item-info">
          <div class="proj-item-name">${esc(ex.exchange_name)}</div>
          <div class="proj-item-badges">
            <span class="proj-item-status st-c">${ex.website ? '🌐' : '⚙️'}</span>
            <span class="live-dot ${ex.about ? 'on' : 'off'}">${ex.about ? '●' : '○'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }
  // Render form edit
  renderExchangeEditForm(exchange);
}

function renderExchangeEditForm(ex) {
  const editPanel = document.getElementById('exchange-edit-panel');
  if (!editPanel) return;
  editPanel.innerHTML = `
    <div class="form-header">
      <div class="form-title">✏️ Edit: ${esc(ex.exchange_name)}</div>
      <div class="form-actions">
        <button class="btn-save" id="btn-save-exchange-detail" onclick="saveExchangeDetail(${ex.exchange_id})">💾 Simpan</button>
      </div>
    </div>
    <div class="form-sec">
      <div class="sec-lbl">About Exchange</div>
      <textarea id="exchange-about-field" rows="5" placeholder="Deskripsi lengkap exchange...">${esc(ex.about || '')}</textarea>
    </div>
    <div class="form-sec">
      <div class="sec-lbl">Website & Social Media</div>
      <div class="fg">
        <div class="field"><label>Website</label><input id="exchange-website-field" type="url" value="${esc(ex.website || '')}"></div>
        <div class="field"><label>Twitter</label><input id="exchange-twitter-field" type="url" value="${esc(ex.twitter || '')}"></div>
        <div class="field"><label>Telegram</label><input id="exchange-telegram-field" type="url" value="${esc(ex.telegram || '')}"></div>
        <div class="field"><label>Discord</label><input id="exchange-discord-field" type="url" value="${esc(ex.discord || '')}"></div>
        <div class="field"><label>Instagram</label><input id="exchange-instagram-field" type="url" value="${esc(ex.instagram || '')}"></div>
        <div class="field"><label>Facebook</label><input id="exchange-facebook-field" type="url" value="${esc(ex.facebook || '')}"></div>
        <div class="field"><label>LinkedIn</label><input id="exchange-linkedin-field" type="url" value="${esc(ex.linkedin || '')}"></div>
        <div class="field"><label>GitHub</label><input id="exchange-github-field" type="url" value="${esc(ex.github || '')}"></div>
        <div class="field"><label>YouTube</label><input id="exchange-youtube-field" type="url" value="${esc(ex.youtube || '')}"></div>
        <div class="field"><label>Medium</label><input id="exchange-medium-field" type="url" value="${esc(ex.medium || '')}"></div>
      </div>
    </div>
  `;
}

async function saveExchangeDetail(exchangeId) {
  const payload = {
    about:     document.getElementById('exchange-about-field')?.value?.trim() || null,
    website:   document.getElementById('exchange-website-field')?.value?.trim() || null,
    twitter:   document.getElementById('exchange-twitter-field')?.value?.trim() || null,
    telegram:  document.getElementById('exchange-telegram-field')?.value?.trim() || null,
    discord:   document.getElementById('exchange-discord-field')?.value?.trim() || null,
    instagram: document.getElementById('exchange-instagram-field')?.value?.trim() || null,
    facebook:  document.getElementById('exchange-facebook-field')?.value?.trim() || null,
    linkedin:  document.getElementById('exchange-linkedin-field')?.value?.trim() || null,
    github:    document.getElementById('exchange-github-field')?.value?.trim() || null,
    youtube:   document.getElementById('exchange-youtube-field')?.value?.trim() || null,
    medium:    document.getElementById('exchange-medium-field')?.value?.trim() || null,
  };
  const btn = document.getElementById('btn-save-exchange-detail');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
  try {
    const res = await fetch(`/api/admin-airdrop?type=exchange-details&exchange_id=${exchangeId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Gagal simpan');
    }
    showToast('✓ Detail exchange tersimpan!', 'success');
    // Refresh data exchangeListData
    await loadExchangeList();
    // Refresh tampilan panel (tetap pilih exchange yang sama)
    await selectExchangeForEdit(exchangeId);
    // Refresh daftar exchange di panel kiri (optional, sudah di-selectExchangeForEdit)
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '💾 Simpan'; }
  }
}
  
  window.onload = function() {
    google.accounts.id.initialize({ client_id: YOUR_CLIENT_ID, callback: handleCredentialResponse });
    google.accounts.id.renderButton(document.getElementById('g_id_onload'), { theme: 'outline', size: 'large' });
    google.accounts.id.prompt();
  };
</script>
