<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchanges - AirdropXI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desain Grid Background agar sama dengan Home */
        body {
            background-color: #0a0a0a;
            background-image: linear-gradient(to right, #121212 1px, transparent 1px),
                              linear-gradient(to bottom, #121212 1px, transparent 1px);
            background-size: 40px 40px;
            cursor: auto !important;
        }
        .neo-border { border: 1px solid rgba(34, 197, 94, 0.2); }
        .neo-text { text-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        
        /* Dark/Light Mode Logic */
        body.light-mode { background-color: #f4f4f4; color: #1a1a1a; background-image: none; }
        body.light-mode .neo-border { border-color: #ddd; }
        body.light-mode .bg-zinc-900\/10 { background-color: #fff; }
    </style>
</head>
<body class="text-white font-sans min-h-screen">

    <div class="container mx-auto p-6 max-w-6xl">
        <div class="flex justify-between items-center mb-10">
            <a href="index.html" class="flex items-center gap-2 group">
                <span class="text-green-500 font-bold">←</span>
                <span class="text-[10px] uppercase tracking-[0.2em] group-hover:text-green-500 transition" id="txt-back">Back to Home</span>
            </a>
            <div class="flex gap-4">
                <button onclick="toggleLang()" class="text-[10px] border border-zinc-800 px-2 py-1 rounded hover:border-green-500 transition" id="btn-lang">ID | EN</button>
                <button onclick="toggleTheme()" class="text-[10px] border border-zinc-800 px-2 py-1 rounded hover:border-green-500 transition" id="btn-theme">🌙</button>
            </div>
        </div>

        <h1 class="text-3xl font-black text-white mb-2 uppercase italic neo-text" id="main-title">Exchange Markets</h1>
        <p class="text-zinc-500 text-[10px] mb-8 tracking-widest uppercase" id="sub-title">Real-time Cryptocurrency Exchange Data</p>

        <div class="flex flex-wrap gap-4 mb-8">
            <button onclick="switchTab('cex')" id="tab-cex" class="px-6 py-2 bg-green-500 text-black text-[10px] font-bold uppercase tracking-wider rounded-full shadow-[0_0_15px_rgba(34,197,94,0.3)]">CEX</button>
            <button onclick="switchTab('dex')" id="tab-dex" class="px-6 py-2 border border-zinc-800 text-zinc-500 text-[10px] font-bold uppercase tracking-wider rounded-full hover:border-green-500 transition">DEX</button>
        </div>

        <div id="exchanges-container" class="bg-zinc-900/10 neo-border rounded-xl p-1 backdrop-blur-sm">
            <div class="py-20 text-center animate-pulse text-zinc-500 font-mono text-[10px]">SYNCING WITH BLOCKCHAIN...</div>
        </div>

        <div class="mt-20 border-t border-zinc-900 pt-10 pb-20 text-center">
            <div class="flex justify-center gap-4 mb-6">
                <a href="#" class="px-6 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-xs font-bold hover:border-green-500 transition">Twitter</a>
                <a href="#" class="px-6 py-2 bg-zinc-900 border border-zinc-800 rounded-full text-xs font-bold hover:border-green-500 transition">Telegram</a>
            </div>
            <p class="text-zinc-500 text-xs mb-8">© 2026 Xiobaiishikii — Stay Safe & Keep Grinding ⚡</p>
            <p class="text-[9px] text-zinc-700 uppercase tracking-widest mb-10">DYOR: Content for educational purposes only.</p>
            <a href="index.html" class="inline-block px-8 py-3 border border-green-500 text-green-500 text-xs font-bold rounded-full hover:bg-green-500 hover:text-black transition">← BACK TO HOME</a>
        </div>
    </div>

    <script src="js/exchanges.js"></script>
</body>
</html>
