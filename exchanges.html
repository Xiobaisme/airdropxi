<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Cryptocurrency Exchanges</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: black;
      background-image: linear-gradient(rgba(0,255,100,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,100,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="text-white">

  <div class="max-w-6xl mx-auto px-6 py-12">

    <!-- TITLE -->
    <h1 class="text-4xl font-extrabold tracking-wider">
      <span class="text-green-400">PASAR</span> BURSA
    </h1>
    <p class="text-green-400/70 text-sm mt-2 tracking-widest">
      DATA REAL-TIME BURSA CRYPTOCURRENCY
    </p>

    <!-- TAB -->
    <div class="flex gap-3 mt-6">
      <button class="px-5 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-400/30">
        CEX
      </button>
      <button class="px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20">
        DEX
      </button>
    </div>

    <!-- CONTAINER -->
    <div class="relative mt-10 p-6 rounded-2xl border border-green-500/20 bg-black/40 backdrop-blur-xl shadow-[0_0_40px_rgba(34,197,94,0.15)]">

      <!-- LOADING -->
      <div id="loading" class="text-center text-green-400 py-10">
        Loading data...
      </div>

      <!-- ERROR -->
      <div id="error" class="hidden text-center text-red-400 py-10">
        Gagal ambil data 😢
      </div>

      <!-- TABLE -->
      <table id="table" class="w-full text-sm text-left text-gray-300 hidden">
        <thead class="text-xs uppercase text-green-400 border-b border-green-500/20">
          <tr>
            <th class="py-4">Rank</th>
            <th>Exchange</th>
            <th>Negara</th>
            <th>Kelebihan</th>
            <th>Cocok Untuk</th>
          </tr>
        </thead>

        <tbody id="tbody" class="divide-y divide-green-500/10"></tbody>
      </table>

    </div>
  </div>

  <script>
    async function loadData() {
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const table = document.getElementById("table");
      const tbody = document.getElementById("tbody");

      try {
        const res = await fetch("/api/exchanges");

        if (!res.ok) throw new Error("API Error");

        const data = await res.json();

        loading.classList.add("hidden");
        table.classList.remove("hidden");

        tbody.innerHTML = "";

        data.forEach((item, i) => {
          const row = `
            <tr class="hover:bg-green-500/5 transition duration-300 hover:scale-[1.01]">
              <td class="py-4">${item.rank || i+1}</td>

              <td class="flex items-center gap-3 py-4">
                <div class="w-8 h-8 rounded-full bg-green-500/10 border border-green-400/20"></div>
                <span class="font-semibold text-white tracking-wide">${item.name}</span>
              </td>

              <td>${item.country}</td>

              <td class="text-gray-400">${item.advantage}</td>

              <td>
                <span class="px-3 py-1 text-xs rounded-full border border-green-400/30 text-green-300 bg-green-500/10">
                  ${item.suitable}
                </span>
              </td>
            </tr>
          `;

          tbody.innerHTML += row;
        });

      } catch (err) {
        console.error(err);
        loading.classList.add("hidden");
        error.classList.remove("hidden");
      }
    }

    loadData();
  </script>

</body>
</html>
