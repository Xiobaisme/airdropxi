<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pasar Bursa</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: black;
      background-image: linear-gradient(rgba(0,255,100,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,100,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="text-white">

<div class="max-w-6xl mx-auto px-6 py-12">

  <!-- 🔙 BACK BUTTON -->
  <div class="mb-6">
    <a href="/" 
      class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-400/30 text-green-400 hover:bg-green-500/10 transition">
      
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>

      <span id="backText">Kembali</span>
    </a>
  </div>

  <!-- HEADER -->
  <div class="flex justify-between items-center">
    <div>
      <h1 id="title" class="text-4xl font-extrabold"></h1>
      <p id="subtitle" class="text-green-400/70 text-sm mt-2"></p>
    </div>

    <button onclick="toggleLang()" 
      class="px-4 py-2 rounded-full border border-green-400/30 text-green-400 hover:bg-green-500/10">
      <span id="langBtn">EN</span>
    </button>
  </div>

  <!-- TAB -->
  <div class="flex gap-3 mt-6">
    <button id="cexTab" class="px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20">
      CEX
    </button>
    <button id="dexTab" class="px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20">
      DEX
    </button>
  </div>

  <script>
  const cex = document.getElementById("cexTab");
  const dex = document.getElementById("dexTab");

  const greyClass = "px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20";
  
  const greenClass = "px-5 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-400/30";

  cex.onclick = function() {
    cex.className = greenClass;
    dex.className = greyClass;
  };

  dex.onclick = function() {
    dex.className = greenClass;
    cex.className = greyClass;
  };
</script>
  
  <!-- CONTAINER -->
  <div class="mt-10 p-6 rounded-2xl border border-green-500/20 bg-black/40 backdrop-blur-xl">

    <div id="loading" class="text-center text-green-400 py-10"></div>
    <div id="error" class="hidden text-center text-red-400 py-10"></div>

    <table id="table" class="w-full text-sm text-left text-gray-300 hidden">
      <thead class="text-xs uppercase text-green-400 border-b border-green-500/20">
        <tr>
          <th id="thRank" class="py-4"></th>
          <th id="thExchange"></th>
          <th id="thCountry"></th>
          <th id="thAdvantage"></th>
          <th id="thSuitable"></th>
        </tr>
      </thead>
      <tbody id="tbody" class="divide-y divide-green-500/10"></tbody>
    </table>

  </div>
</div>

<script>
// 🌐 LANGUAGE
let currentLang = "id";

const lang = {
  id: {
    title: "<span class='text-green-400'>PASAR</span> BURSA",
    subtitle: "DATA REAL-TIME BURSA CRYPTO",
    loading: "Mengambil data...",
    error: "Gagal ambil data 😢",
    rank: "Rank",
    exchange: "Exchange",
    country: "Negara",
    advantage: "Kelebihan",
    suitable: "Cocok Untuk",
    back: "Kembali",
    btn: "EN"
  },
  en: {
    title: "<span class='text-green-400'>MARKET</span> EXCHANGES",
    subtitle: "REAL-TIME CRYPTO EXCHANGE DATA",
    loading: "Loading...",
    error: "Failed to fetch 😢",
    rank: "Rank",
    exchange: "Exchange",
    country: "Country",
    advantage: "Features",
    suitable: "Best For",
    back: "Back",
    btn: "ID"
  }
};

function applyLang() {
  const t = lang[currentLang];

  title.innerHTML = t.title;
  subtitle.innerText = t.subtitle;
  loading.innerText = t.loading;
  error.innerText = t.error;

  thRank.innerText = t.rank;
  thExchange.innerText = t.exchange;
  thCountry.innerText = t.country;
  thAdvantage.innerText = t.advantage;
  thSuitable.innerText = t.suitable;

  backText.innerText = t.back;
  langBtn.innerText = t.btn;
}

function toggleLang() {
  currentLang = currentLang === "id" ? "en" : "id";
  applyLang();
}

// 📊 DATA
let allData = [];
let currentType = "cex";

// 🔥 MAP SESUAI SUPABASE
function mapData(item, i) {
  return {
    rank: item.rank ?? i + 1,
    name: item.exchange_name,
    country: item.country,
    advantage: item.key_features,
    suitable: item.best_for,
    type: item.type,
    logo: item.logo_url
  };
}

// 🎯 RENDER
function renderData() {
  const tbody = document.getElementById("tbody");

  const filtered = allData
    .map(mapData)
    .filter(item => item.type === currentType);

  tbody.innerHTML = "";

  filtered.forEach(item => {
    tbody.innerHTML += `
      <tr class="hover:bg-green-500/5 transition duration-300 hover:scale-[1.01]">
        <td class="py-4">${item.rank}</td>

        <td class="flex items-center gap-3 py-4">
          ${
            item.logo
              ? `<img src="${item.logo}" class="w-8 h-8 rounded-full"/>`
              : `<div class="w-8 h-8 rounded-full bg-green-500/10 border border-green-400/20"></div>`
          }
          <span class="font-semibold text-white">${item.name}</span>
        </td>

        <td>${item.country}</td>
        <td class="text-gray-400">${item.advantage}</td>

        <td>
          <span class="px-3 py-1 text-xs rounded-full border border-green-400/30 text-green-300 bg-green-500/10">
            ${item.suitable}
          </span>
        </td>
      </tr>
    `;
  });
}

// 🚀 FETCH
async function loadData() {
  try {
    const res = await fetch("https://airdropxi.vercel.app/api/exchanges");

    if (!res.ok) throw new Error();

    const data = await res.json();

    if (!data.length) {
      loading.innerText = "Data kosong 😢";
      return;
    }

    allData = data;

    loading.classList.add("hidden");
    table.classList.remove("hidden");

    renderData();

  } catch (err) {
    console.error(err);
    loading.classList.add("hidden");
    error.classList.remove("hidden");
  }
}

// 🎛️ TAB
cexTab.onclick = () => {
  currentType = "cex";
  renderData();
};

dexTab.onclick = () => {
  currentType = "dex";
  renderData();
};

// INIT
applyLang();
window.onload = loadData;

</script>

</body>
</html>
