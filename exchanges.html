<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasar Bursa Crypto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: black;
            background-image: linear-gradient(rgba(0,255,100,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,100,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="text-white">

<div class="max-w-6xl mx-auto px-6 py-12">

    <!-- BACK BUTTON -->
    <div class="mb-6">
        <a href="/" class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-400/30 text-green-400 hover:bg-green-500/10 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
            <span id="backText">Kembali</span>
        </a>
    </div>

    <!-- HEADER -->
    <div class="flex justify-between items-center">
        <div>
            <h1 id="title" class="text-4xl font-extrabold"></h1>
            <p id="subtitle" class="text-green-400/70 text-sm mt-2"></p>
        </div>
        <button onclick="toggleLang()" class="px-4 py-2 rounded-full border border-green-400/30 text-green-400 hover:bg-green-500/10">
            <span id="langBtn">EN</span>
        </button>
    </div>

    <!-- TAB -->
    <div class="flex gap-3 mt-6">
        <button id="cexTab" class="px-5 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-400/30">CEX</button>
        <button id="dexTab" class="px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20">DEX</button>
    </div>

    <!-- CONTAINER -->
    <div class="mt-10 p-6 rounded-2xl border border-green-500/20 bg-black/40 backdrop-blur-xl">
        <div id="loading" class="text-center text-green-400 py-10"></div>
        <div id="error" class="hidden text-center text-red-400 py-10"></div>
        <table id="table" class="w-full text-sm text-left text-gray-300 hidden">
            <thead class="text-xs uppercase text-green-400 border-b border-green-500/20">
                <tr>
                    <th id="thRank" class="py-4"></th>
                    <th id="thExchange"></th>
                    <th id="thCountry"></th>
                    <th id="thAdvantage"></th>
                    <th id="thSuitable"></th>
                </tr>
            </thead>
            <tbody id="tbody" class="divide-y divide-green-500/10"></tbody>
        </table>
    </div>

    <!-- SOCIAL MEDIA FOOTER -->
    <div class="mt-16 pt-8 border-t border-green-500/20 text-center">
        <div class="flex justify-center gap-6 mb-4">
            <a href="https://twitter.com/xiobai06" target="_blank" class="flex items-center gap-2 px-5 py-2 rounded-full bg-black/40 border border-green-400/30 text-green-400 hover:bg-green-500/10 hover:scale-105 transition-all duration-300">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                <span>xiobai06</span>
            </a>
            <a href="https://t.me/Xiobaiishikii" target="_blank" class="flex items-center gap-2 px-5 py-2 rounded-full bg-black/40 border border-green-400/30 text-green-400 hover:bg-green-500/10 hover:scale-105 transition-all duration-300">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.6-1.38-.97-2.23-1.56-.99-.67-.35-1.04.22-1.64.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.08-.2-.09-.06-.22-.04-.31-.02-.13.02-2.18 1.38-3.16 2.01-.3.2-.57.3-.81.3-.27 0-.7-.13-1.04-.24-.42-.13-.76-.23-.81-.48-.03-.16.12-.33.34-.48.78-.54 3.26-2.11 4.62-2.98 2.2-1.4 2.66-1.64 2.96-1.65.07 0 .21.02.3.12.07.08.1.2.08.33z"/>
                </svg>
                <span>Xiobaiishikii</span>
            </a>
        </div>
        <div class="text-gray-500 text-xs space-y-2">
            <p>AirdropXI</p>
            <p>© 2026 Xiobailishiki — Stay Safe & Keep Grinding</p>
            <p class="text-yellow-500/60">DYOR: CONTENT FOR EDUCATIONAL PURPOSES ONLY.</p>
        </div>
    </div>

</div>

<script>
// LANGUAGE
let currentLang = "id";

const lang = {
  id: {
    title: "<span class='text-green-400'>PASAR</span> BURSA",
    subtitle: "DATA REAL-TIME BURSA CRYPTO",
    loading: "Mengambil data...",
    error: "Gagal ambil data 😢",
    rank: "Rank",
    exchange: "Exchange",
    country: "Negara",
    advantage: "Kelebihan",
    suitable: "Cocok Untuk",
    back: "Kembali",
    btn: "EN"
  },
  en: {
    title: "<span class='text-green-400'>MARKET</span> EXCHANGES",
    subtitle: "REAL-TIME CRYPTO EXCHANGE DATA",
    loading: "Loading...",
    error: "Failed to fetch 😢",
    rank: "Rank",
    exchange: "Exchange",
    country: "Country",
    advantage: "Features",
    suitable: "Best For",
    back: "Back",
    btn: "ID"
  }
};

function applyLang() {
  const t = lang[currentLang];
  title.innerHTML = t.title;
  subtitle.innerText = t.subtitle;
  loading.innerText = t.loading;
  error.innerText = t.error;
  thRank.innerText = t.rank;
  thExchange.innerText = t.exchange;
  thCountry.innerText = t.country;
  thAdvantage.innerText = t.advantage;
  thSuitable.innerText = t.suitable;
  backText.innerText = t.back;
  langBtn.innerText = t.btn;
}

function toggleLang() {
  currentLang = currentLang === "id" ? "en" : "id";
  applyLang();
}

// DATA
let allData = [];
let currentType = "cex";

const cexTabBtn = document.getElementById("cexTab");
const dexTabBtn = document.getElementById("dexTab");
const greyClass = "px-5 py-2 rounded-full bg-black/30 text-gray-400 border border-gray-600/20";
const greenClass = "px-5 py-2 rounded-full bg-green-500/20 text-green-400 border border-green-400/30";

function mapData(item, i) {
  return {
    rank: item.rank ?? i + 1,
    name: item.exchange_name,
    country: item.country,
    advantage: item.key_features,
    suitable: item.best_for,
    type: item.type,
    logo: item.logo_url
  };
}

function renderData() {
  const tbody = document.getElementById("tbody");
  const filtered = allData.map(mapData).filter(item => item.type === currentType);
  tbody.innerHTML = "";
  filtered.forEach(item => {
    tbody.innerHTML += `
      <tr class="hover:bg-green-500/5 transition duration-300">
        <td class="py-4">${item.rank}</td>
        <td class="flex items-center gap-3 py-4">
          ${item.logo ? `<img src="${item.logo}" class="w-8 h-8 rounded-full"/>` : `<div class="w-8 h-8 rounded-full bg-green-500/10 border border-green-400/20"></div>`}
          <span class="font-semibold text-white">${item.name}</span>
        </td>
        <td class="py-4">${item.country}</td>
        <td class="py-4 text-gray-400">${item.advantage}</td>
        <td class="py-4"><span class="px-3 py-1 text-xs rounded-full border border-green-400/30 text-green-300 bg-green-500/10">${item.suitable}</span></td>
      </tr>
    `;
  });
}

async function loadData() {
  try {
    const res = await fetch("https://airdropxi.vercel.app/api/exchanges");
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data.length) { loading.innerText = "Data kosong 😢"; return; }
    allData = data;
    loading.classList.add("hidden");
    table.classList.remove("hidden");
    renderData();
  } catch (err) {
    console.error(err);
    loading.classList.add("hidden");
    error.classList.remove("hidden");
  }
}

function setActiveTab(type) {
  if (type === "cex") {
    cexTabBtn.className = greenClass;
    dexTabBtn.className = greyClass;
    currentType = "cex";
  } else {
    dexTabBtn.className = greenClass;
    cexTabBtn.className = greyClass;
    currentType = "dex";
  }
  renderData();
}

cexTabBtn.onclick = () => setActiveTab("cex");
dexTabBtn.onclick = () => setActiveTab("dex");

applyLang();
window.onload = loadData;
setActiveTab("cex");
</script>

</body>
</html>
