        /* ── CSS VARIABLES ── */
        :root {

        [data-theme="light"] {

        /* BASE RESET */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);

            overflow-x: hidden;
            cursor: default;

        [data-theme="light"] body { cursor: default; }

        /* BACKGROUND CANVAS + NOISE GRID (seperti AirdropXI) */

            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s;

        body::after {

            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        /* GRID BACKGROUND (seperti yang kamu minta) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--bg2) 1px, transparent 1px),

<script>
async function subscribeEmail() {
  const input = document.getElementById('sub-email');
  const msg = document.getElementById('sub-msg');
  const email = input.value.trim();
  if (!email || !email.includes('@')) { msg.style.display='block'; msg.style.color='#ff2d55'; msg.textContent='✕ Masukkan email yang valid'; return; }
  msg.style.display='block'; msg.style.color='var(--text2)'; msg.textContent='Mendaftarkan...';
  try {
    const r = await fetch('/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email}) });
    const d = await r.json();
    if (r.ok) { msg.style.color='var(--green)'; msg.textContent='✓ Berhasil! Kamu akan dapat notif airdrop baru.'; input.value=''; }
    else if (r.status===409) { msg.style.color='#f59e0b'; msg.textContent='⚠ Email sudah terdaftar.'; }
    else { msg.style.color='#ff2d55'; msg.textContent='✕ '+(d.error||'Gagal, coba lagi.'); }
  } catch(e) { msg.style.color='#ff2d55'; msg.textContent='✕ Gagal konek ke server.'; }
}
</script>

            loading = true;
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=${page}&sparkline=false`);
                const data = await res.json();
                if (data.length > 0) {
                    data.forEach(coin => {
                        const unlocked = coin.total_supply ? Math.round((coin.circulating_supply / coin.total_supply) * 100) : 100;
                        const isLiquid = unlocked > 90;
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><div style="display:flex; align-items:center; gap:10px;"><img src="${coin.image}" width="24" height="24" style="border-radius:50%;"> <b>${coin.name}</b></div></td>
                            <td style="font-weight:700;">$${coin.current_price?.toLocaleString() || '0'}</td>
                            <td style="color:${coin.price_change_percentage_24h >= 0 ? '#00e87a' : '#ff4d6d'}">
                                ${coin.price_change_percentage_24h >= 0 ? '▲' : '▼'} ${Math.abs(coin.price_change_percentage_24h || 0).toFixed(2)}%
                            </td>
                            <td style="color:var(--text2)">$${(coin.market_cap || 0).toLocaleString()}</td>
                            <td>
                                <div style="font-size:11px; font-weight:600; font-family:'JetBrains Mono',monospace;">${unlocked}%</div>
                                <div class="prog-bg"><div class="prog-fill" style="width:${unlocked}%"></div></div>
                            </td>
                            <td>
                                <span class="status-badge" data-liquid="${isLiquid}" style="color:${isLiquid ? '#00e87a' : '#00c8f0'}">
                                    ${isLiquid ? i18n[currentLang].status[0] : i18n[currentLang].status[1]}
                                </span>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                    page++;
                }
            } catch (err) {
                console.error("CoinGecko error:", err);
            }
            loading = false;
        }

        // Infinite scroll observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !loading) loadCoins();
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('loading-sentinel'));

        // Search filter
        document.getElementById('tokenSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#token-tbody tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        // Initialize
        setLang('en');
        loadCoins();

        // Optional: Simple canvas effect (glow)
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            function draw() {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(0,232,122,0.02)';
                for (let i = 0; i < 60; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
