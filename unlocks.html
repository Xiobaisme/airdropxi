<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Token Unlocks | AirdropXI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --emerald: #10b981; 
            --rose: #f43f5e;
            --dark-bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.6); 
            --border: rgba(16, 185, 129, 0.2); 
        }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 24px; }
        
        /* Header & Live Status */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .header h1 { font-size: 26px; margin: 0; font-weight: 700; }
        .live-indicator { font-size: 12px; color: var(--emerald); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--emerald); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 100px; }
        .card-title { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Table Layout */
        .table-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .search-bar { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; background: #0f172a; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 8px; outline: none; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 16px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; transition: background 0.3s; }

        /* Dynamic Colors */
        .price-up { color: var(--emerald); font-weight: 600; }
        .price-down { color: var(--rose); font-weight: 600; }
        
        /* Progress Bars */
        .prog-bg { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 5px; width: 120px; }
        .prog-fill { height: 100%; background: var(--emerald); box-shadow: 0 0 10px var(--emerald); transition: width 1s ease-in-out; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Token Unlocks & Vesting</h1>
            <p style="color: #94a3b8; margin: 5px 0 0 0;">Monitoring real-time Altcoin emission untuk Tuan Regi.</p>
        </div>
        <div class="live-indicator">
            <div class="dot"></div> LIVE MARKET DATA
        </div>
    </div>

    <div class="summary-grid">
        <div class="card">
            <div class="card-title">Top Altcoin Mover</div>
            <div id="top-mover" style="font-size: 18px; font-weight: 700;">--</div>
        </div>
        <div class="card">
            <div class="card-title">Market Sentiment</div>
            <div id="sentiment" style="font-size: 18px; font-weight: 700; color: var(--emerald);">Bullish</div>
        </div>
        <div class="card">
            <div class="card-title">Avg. Unlocked %</div>
            <div id="avg-unlock" style="font-size: 18px; font-weight: 700;">--</div>
        </div>
    </div>

    <div class="table-section">
        <div class="search-bar">
            <input type="text" id="tokenSearch" class="search-input" placeholder="Filter Altcoins (e.g. Arb, Op, Sui)...">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Price (USD)</th>
                    <th>24h Change</th>
                    <th>Market Cap</th>
                    <th>Circulation (Unlocked)</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="unlock-table-body">
                </tbody>
        </table>
    </div>

    <script>
        async function updateDashboard() {
            const tableBody = document.getElementById('unlock-table-body');
            try {
                const res = await fetch('/api/unlocks');
                const data = await res.json();

                if (data.error) return;

                // Sort by biggest price change for Summary Card
                const sorted = [...data].sort((a, b) => b.change_24h - a.change_24h);
                document.getElementById('top-mover').innerHTML = 
                    `<span style="color:var(--emerald)">${sorted[0].symbol}</span> +${sorted[0].change_24h}%`;

                // Calculate average unlock
                const avg = (data.reduce((acc, curr) => acc + parseFloat(curr.unlocked_percent), 0) / data.length).toFixed(1);
                document.getElementById('avg-unlock').innerText = `${avg}%`;

                tableBody.innerHTML = data.map(coin => `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img src="${coin.img}" width="28" style="border-radius:50%">
                                <div>
                                    <div style="font-weight:700;">${coin.name}</div>
                                    <div style="color:#64748b; font-size:11px;">${coin.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-family: monospace; font-size: 15px;">$${coin.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="${coin.change_24h >= 0 ? 'price-up' : 'price-down'}">
                            ${coin.change_24h >= 0 ? '▲' : '▼'} ${Math.abs(coin.change_24h)}%
                        </td>
                        <td style="color:#94a3b8;">$${coin.market_cap}</td>
                        <td>
                            <div style="font-size:11px; margin-bottom:4px;">${coin.unlocked_percent}%</div>
                            <div class="prog-bg"><div class="prog-fill" style="width: ${coin.unlocked_percent}%"></div></div>
                        </td>
                        <td>
                            <span style="background:rgba(16,185,129,0.1); color:var(--emerald); padding:4px 8px; border-radius:4px; font-size:11px; font-weight:600;">
                                ${coin.unlocked_percent > 90 ? 'Full Circ' : 'Vesting'}
                            </span>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Update failed", err);
            }
        }

        // Search Filter
        document.getElementById('tokenSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#unlock-table-body tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        // Run Every 30 Seconds for Real-time feel
        updateDashboard();
        setInterval(updateDashboard, 30000); 
    </script>
</body>
</html>
