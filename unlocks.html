<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100+ Altcoin Monitoring | AirdropXI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --rose: #f43f5e; --dark-bg: #020617; --card-bg: rgba(15, 23, 42, 0.6); --border: rgba(16, 185, 129, 0.2); }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 24px; }
        
        .header { margin-bottom: 25px; }
        .header h1 { font-size: 26px; font-weight: 700; color: #fff; margin: 0; }
        
        /* Table Design */
        .table-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .search-area { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; background: #0f172a; border: 1px solid #1e293b; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 16px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }

        /* Real-time Indicator */
        .price-up { color: var(--emerald); font-weight: 600; }
        .price-down { color: var(--rose); font-weight: 600; }
        
        .prog-bar { height: 6px; background: #1e293b; border-radius: 10px; width: 100px; margin-top: 4px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Token Unlocks & Vesting</h1>
        <p style="color:#94a3b8; font-size: 14px;">Monitoring 100+ Altcoins secara real-time untuk Tuan Regi.</p>
    </div>

    <div class="table-container">
        <div class="search-area">
            <input type="text" id="tokenSearch" class="search-input" placeholder="Cari Altcoin (Contoh: SUI, ARB, OP)...">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Price</th>
                    <th>24h Change</th>
                    <th>Market Cap</th>
                    <th>Unlocked</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="unlock-table-body">
                </tbody>
        </table>
    </div>

    <script>
        async function fetchTokens() {
            const tbody = document.getElementById('unlock-table-body');
            try {
                // Fetch data dari API Tuan dengan cache-buster
                const res = await fetch('/api/unlocks?t=' + Date.now());
                const data = await res.json();

                tbody.innerHTML = data.map(coin => `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <img src="${coin.img}" width="24" height="24" style="border-radius:50%">
                                <div>
                                    <div style="font-weight:700;">${coin.name}</div>
                                    <div style="color:#64748b; font-size:11px;">${coin.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-family:monospace;">$${coin.price.toLocaleString()}</td>
                        <td class="${coin.change_24h >= 0 ? 'price-up' : 'price-down'}">
                            ${coin.change_24h > 0 ? '▲' : '▼'} ${coin.change_24h}%
                        </td>
                        <td style="color:#94a3b8;">$${coin.market_cap}</td>
                        <td>
                            <div style="font-size:11px; margin-bottom:2px;">${coin.unlocked_percent}%</div>
                            <div class="prog-bar"><div class="prog-fill" style="width: ${coin.unlocked_percent}%"></div></div>
                        </td>
                        <td>
                            <span style="font-size:11px; color:var(--emerald); background:rgba(16,185,129,0.1); padding:3px 8px; border-radius:4px;">
                                ${coin.unlocked_percent > 95 ? 'Market Ready' : 'Vesting'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--rose);">Gagal sinkronisasi data Altcoin.</td></tr>`;
            }
        }

        // Pencarian instan
        document.getElementById('tokenSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#unlock-table-body tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        fetchTokens();
    </script>
</body>
</html>
