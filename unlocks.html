<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Unlocks | AirdropXI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --emerald: #10b981; 
            --dark-bg: #020617; 
            --card-bg: rgba(15, 23, 42, 0.6); 
            --border: rgba(16, 185, 129, 0.2); 
        }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 24px; }
        
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 26px; margin: 0; font-weight: 700; color: #fff; }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 8px; }

        /* Summary Cards Grid */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 14px; font-weight: 600; color: #94a3b8; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        /* Bar Chart */
        .chart-container { display: flex; align-items: flex-end; gap: 8px; height: 60px; }
        .bar { flex: 1; border-radius: 4px; background: #1e293b; }
        .bar.active { background: var(--emerald); box-shadow: 0 0 15px var(--emerald); }

        /* Table Structure */
        .table-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .filter-bar { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        .search-input { background: #0f172a; border: 1px solid #1e293b; color: #fff; padding: 10px; border-radius: 8px; flex: 1; outline: none; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 16px; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; font-size: 14px; }

        .coin-cell { display: flex; align-items: center; gap: 12px; }
        .coin-cell img { width: 30px; height: 30px; border-radius: 50%; }
        
        /* Progress Bar */
        .prog-wrap { width: 130px; }
        .prog-bg { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
        .prog-fill { height: 100%; background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
        
        .price-up { color: var(--emerald); }
        .price-down { color: #ef4444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Token Unlocks & Vesting</h1>
        <p>Monitoring real-time emisi token untuk strategi trading Tuan Regi.</p>
    </div>

    <div class="summary-grid">
        <div class="card">
            <div class="card-title">TGE Unlocks <span style="color:var(--emerald)">●</span></div>
            <div id="tge-data" style="font-size: 13px; color: #94a3b8;">Syncing market data...</div>
        </div>
        <div class="card">
            <div class="card-title">Token Unlock Dynamics 24H</div>
            <div class="chart-container">
                <div class="bar" style="height: 40%;"></div>
                <div class="bar" style="height: 60%;"></div>
                <div class="bar active" style="height: 100%;"></div>
                <div class="bar" style="height: 80%;"></div>
                <div class="bar" style="height: 50%;"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Upcoming High Impact 7D</div>
            <div id="impact-data" style="font-size: 13px; color: #94a3b8;">Analyzing schedule...</div>
        </div>
    </div>

    <div class="table-section">
        <div class="filter-bar">
            <input type="text" id="tokenSearch" class="search-input" placeholder="Search tokens by name or symbol...">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Price</th>
                    <th>24h Chg</th>
                    <th>Market Cap</th>
                    <th>Circulation (Unlocked)</th>
                    <th>Next Unlock</th>
                </tr>
            </thead>
            <tbody id="unlock-table-body">
                <tr><td colspan="6" style="text-align:center; padding:50px;">🔄 Mengambil data stabil...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            const tableBody = document.getElementById('unlock-table-body');
            try {
                // Memanggil API yang sudah diubah ke CoinGecko untuk kestabilan
                const res = await fetch('/api/unlocks');
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                tableBody.innerHTML = data.map(coin => `
                    <tr>
                        <td>
                            <div class="coin-cell">
                                <img src="${coin.img}">
                                <div>
                                    <div style="font-weight:700;">${coin.name}</div>
                                    <div style="color:#64748b; font-size:11px;">${coin.symbol}</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-weight:600;">$${coin.price.toLocaleString()}</td>
                        <td class="${coin.change_24h >= 0 ? 'price-up' : 'price-down'}">
                            ${coin.change_24h}%
                        </td>
                        <td style="color:#94a3b8;">$${coin.market_cap}</td>
                        <td>
                            <div class="prog-wrap">
                                <div class="prog-bg">
                                    <div class="prog-fill" style="width: ${coin.unlocked_percent}%"></div>
                                </div>
                                <span style="font-size:10px; color:var(--emerald); font-weight:600;">${coin.unlocked_percent}% Unlocked</span>
                            </div>
                        </td>
                        <td>
                            <div style="font-weight:600;">${coin.next_unlock_date}</div>
                            <div style="font-size:10px; color:#64748b;">${coin.next_unlock_amount}</div>
                        </td>
                    </tr>
                `).join('');

                // Update summary text
                document.getElementById('tge-data').innerText = `Trending TGE: ${data[0].name} (${data[0].symbol})`;
                document.getElementById('impact-data').innerHTML = `Potential Volatility: <span style="color:var(--emerald)">High</span>`;

            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#ef4444; padding:50px;">❌ ${err.message}</td></tr>`;
            }
        }

        // Fitur Pencarian
        document.getElementById('tokenSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#unlock-table-body tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });

        loadData();
    </script>
</body>
</html>
